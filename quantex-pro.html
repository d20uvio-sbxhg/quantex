var S={page:'picks',market:'tw',filter:'all',sort:'score',nid:0,notifs:[]};

// ══════════════════════════════════════
// 最強因子模型（動能+籌碼+法說前效應）
// ══════════════════════════════════════
function calcScore(s){
  var sc=0;
  // 技術面 45分
  sc+=s.macd>8?10:s.macd>3?7:s.macd>0?4:s.macd>-3?1:0;
  sc+=s.rsi>=50&&s.rsi<=65?8:s.rsi>=40&&s.rsi<50?5:s.rsi>=65&&s.rsi<=75?4:s.rsi<30?6:s.rsi>75?1:2;
  sc+=s.kd_k>s.kd_d&&s.kd_k<80?8:s.kd_k>s.kd_d?3:s.kd_k<20?5:1;
  sc+=s.boll>=0.4&&s.boll<=0.75?7:s.boll<0.2?5:s.boll>0.85?1:4;
  sc+=s.obv==='strong_up'?7:s.obv==='up'?5:s.obv==='flat'?2:0;
  sc+=s.ma==='bull_strong'?5:s.ma==='bull'?3:s.ma==='flat'?1:0;
  // 籌碼面 30分
  sc+=s.fd>=5?12:s.fd>=3?9:s.fd>=1?6:s.fd===0?3:s.fd>=-2?1:0;
  sc+=s.td>=5?10:s.td>=3?7:s.td>=1?4:s.td<-2?0:2;
  sc+=s.margin<20&&s.shorts>15?8:s.margin<25?6:s.margin<40?3:0;
  // 總經面 15分
  sc+=s.vix<16?5:s.vix<20?4:s.vix<25?2:s.vix<30?1:0;
  sc+=s.pmi>55?5:s.pmi>52?4:s.pmi>50?3:s.pmi>48?1:0;
  sc+=s.fed==='cut'?5:s.fed==='hold'?3:0;
  // 新聞情緒 10分
  sc+=s.ns>=8?10:s.ns>=6?7:s.ns>=4?4:s.ns>=2?2:0;
  return Math.min(sc,100);
}

function calcDimensions(s){
  var d={};
  var t=0;
  t+=s.macd>8?10:s.macd>3?7:s.macd>0?4:s.macd>-3?1:0;
  t+=s.rsi>=50&&s.rsi<=65?7:s.rsi>=40&&s.rsi<50?4:s.rsi>=65&&s.rsi<=72?3:s.rsi<30?5:1;
  t+=s.kd_k>s.kd_d&&s.kd_k<80?5:s.kd_k>s.kd_d?2:s.kd_k<20?3:0;
  t+=s.boll>=0.4&&s.boll<=0.75?3:s.boll<0.2?2:0;
  d.tech=Math.min(25,t);
  var c=0;
  c+=s.fd>=5?10:s.fd>=3?7:s.fd>=1?4:s.fd===0?2:0;
  c+=s.td>=5?8:s.td>=3?6:s.td>=1?3:s.td<-2?0:1;
  if(s.margin<18&&s.shorts>18)c+=5;else if(s.margin<22)c+=4;else if(s.margin<30)c+=2;
  if(s.fd>=3&&s.td>=3)c+=2;
  d.chip=Math.min(25,c);
  var f=0;
  f+=s.eps_growth>=30?6:s.eps_growth>=15?5:s.eps_growth>=5?3:s.eps_growth>=0?1:0;
  f+=s.rev_accel==='accel'?5:s.rev_accel==='stable'?3:1;
  f+=s.margin_trend==='expand'?5:s.margin_trend==='flat'?3:0;
  f+=s.valuation==='cheap'?4:s.valuation==='fair'?3:s.valuation==='rich'?1:0;
  d.fund=Math.min(20,f);
  var r=0;
  r+=s.rs_market>=85?6:s.rs_market>=70?5:s.rs_market>=50?3:s.rs_market>=30?1:0;
  r+=s.rs_sector>=80?5:s.rs_sector>=60?4:s.rs_sector>=40?2:0;
  r+=s.momentum_rank>=80?4:s.momentum_rank>=60?3:s.momentum_rank>=40?2:s.momentum_rank>=20?1:0;
  d.rs=Math.min(15,r);
  var m=0;
  m+=s.vix<16?4:s.vix<20?3:s.vix<25?1:0;
  m+=s.pmi>55?3:s.pmi>52?2:s.pmi>50?1:0;
  m+=s.fed==='cut'?2:s.fed==='hold'?1:0;
  m+=s.yield_curve==='normal'?1:0;
  d.macro=Math.min(10,m);
  d.sentiment=Math.min(5,Math.round(s.ns/10*5));
  d.total=d.tech+d.chip+d.fund+d.rs+d.macro+d.sentiment;
  var e=getEI(s.earnings);
  if(e&&e.days<=14&&e.days>=0&&e.boost>0)d.total=Math.min(100,d.total+5);
  return d;
}


// 最強因子共振評分（額外加分）
function factorResonance(s){
  var score=calcScore(s);
  var factors=[];
  var bonus=0;
  // Factor 1: 動能共振（股價突破+量能放大）★★★
  if(s.ma==='bull_strong'&&s.obv==='strong_up'){bonus+=8;factors.push({name:'動能共振',match:true,desc:'均線多頭+量能強增',win:'+8%',stars:3});}
  else factors.push({name:'動能共振',match:false,desc:'未達條件',win:'',stars:3});
  // Factor 2: 籌碼共識（外資投信同步買超）★★★
  if(s.fd>=3&&s.td>=3){bonus+=8;factors.push({name:'法人共識',match:true,desc:'外資+投信同步買超'+Math.min(s.fd,s.td)+'日',win:'+8%',stars:3});}
  else factors.push({name:'法人共識',match:false,desc:'法人未同步',win:'',stars:3});
  // Factor 3: 籌碼乾淨（低融資高融券）★★
  if(s.margin<22&&s.shorts>12){bonus+=6;factors.push({name:'籌碼乾淨',match:true,desc:'低融資'+s.margin+'%·融券'+s.shorts+'%',win:'+6%',stars:2});}
  else factors.push({name:'籌碼乾淨',match:false,desc:'融資'+s.margin+'%',win:'',stars:2});
  // Factor 4: MACD+RSI黃金區（最佳進場區間）★★★
  if(s.macd>5&&s.rsi>=50&&s.rsi<=65){bonus+=7;factors.push({name:'技術黃金區',match:true,desc:'MACD多頭+RSI健康區'+s.rsi,win:'+7%',stars:3});}
  else factors.push({name:'技術黃金區',match:false,desc:'MACD '+s.macd.toFixed(1)+' RSI '+s.rsi,win:'',stars:3});
  // Factor 5: 法說前效應（法說前2週+預期優於預期）★★
  var e=getEI(s.earnings);
  if(e&&e.days<=14&&e.days>=0&&e.boost>0){bonus+=6;factors.push({name:'法說前效應',match:true,desc:'法說'+e.days+'天後·預計優於預期',win:'+6%',stars:2});}
  else factors.push({name:'法說前效應',match:false,desc:e?'法說'+e.days+'天後':'無近期法說',win:'',stars:2});
  // Factor 6: 大盤偏多+低恐慌（市場環境）★★
  if(s.vix<20&&s.pmi>51){bonus+=5;factors.push({name:'市場環境佳',match:true,desc:'VIX '+s.vix+'低恐慌·PMI '+s.pmi,win:'+5%',stars:2});}
  else factors.push({name:'市場環境佳',match:false,desc:'VIX '+s.vix,win:'',stars:2});

  var matchCount=factors.filter(function(f){return f.match;}).length;
  var resonanceScore=Math.min(100,score+bonus);
  var winRate=matchCount>=5?76:matchCount>=4?70:matchCount>=3?65:matchCount>=2?58:52;

  return{score:resonanceScore,raw:score,bonus:bonus,matchCount:matchCount,factors:factors,winRate:winRate};
}


// ══════════════════════════════════════════════════════════
// 1. 相對強弱 RS (Relative Strength vs Index)
// ══════════════════════════════════════════════════════════
function calcRS(s, mktChange) {
  // mktChange = 大盤當日漲跌%
  var diff = s.change - mktChange;
  var rs = 50 + diff * 8; // 超越大盤越多分數越高
  // 額外：均線排列加成
  if (s.ma === 'bull_strong') rs += 12;
  else if (s.ma === 'bull') rs += 6;
  else if (s.ma === 'bear') rs -= 10;
  // 外資加成
  if (s.fd >= 5) rs += 10;
  else if (s.fd >= 3) rs += 6;
  else if (s.fd < -3) rs -= 8;
  return Math.min(99, Math.max(1, Math.round(rs)));
}

function rsGrade(rs) {
  if (rs >= 80) return { label:'A+', color:'#065f46', bg:'#ecfdf5' };
  if (rs >= 65) return { label:'A',  color:'#16a34a', bg:'#f0fdf4' };
  if (rs >= 50) return { label:'B',  color:'#d97706', bg:'#fffbeb' };
  if (rs >= 35) return { label:'C',  color:'#dc2626', bg:'#fff1f2' };
  return             { label:'D',  color:'#7f1d1d', bg:'#fef2f2' };
}

  if (c.shortCover) sc += 5;
  return Math.min(27, Math.max(-13, sc));

// BACKTEST ENGINE
// ══════════════════════════════════════
function avg(a){return a.reduce(function(x,y){return x+y;},0)/a.length;}
function ema(d,p){var k=2/(p+1),e=d[0];for(var i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}
function rsi14(c){var g=0,l=0,n=Math.min(14,c.length-1);for(var i=c.length-n;i<c.length;i++){var d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;}if(l===0)return 100;return parseFloat((100-100/(1+g/l)).toFixed(1));}

function runBacktest(s,hist){
  if(!hist||hist.length<60)return null;
  var matches=[];
  for(var i=20;i<hist.length-20;i++){
    var sl=hist.slice(i-20,i),cl=sl.map(function(d){return d.c;});
    var m=ema(cl,12)-ema(cl,26),r=rsi14(cl),cur=cl[cl.length-1];
    var sma5=avg(cl.slice(-5)),sma20=avg(cl);
    var vl=sl.map(function(d){return d.v||1;});
    var vtUp=avg(vl.slice(-3))>avg(vl.slice(-10));
    var maUp=cur>sma5&&sma5>sma20,maDn=cur<sma5&&sma5<sma20;
    var sc=0;
    if((s.macd>0&&m>0)||(s.macd<0&&m<0))sc++;
    var rz=s.rsi>70?'h':s.rsi<30?'l':'m',hrz=r>70?'h':r<30?'l':'m';
    if(rz===hrz)sc++;
    var cm=s.ma.indexOf('bull')>=0?'b':s.ma==='bear'?'d':'f',hm=maUp?'b':maDn?'d':'f';
    if(cm===hm)sc++;
    var cv=s.obv==='strong_up'||s.obv==='up',hv=vtUp;
    if(cv===hv)sc++;
    var mom=(cur-cl[0])/cl[0],cmom=s.change>1?'u':s.change<-1?'d':'f',hmom=mom>0.02?'u':mom<-0.02?'d':'f';
    if(cmom===hmom)sc++;
    if(sc>=3){
      var f5=hist[i+4]?(hist[i+4].c-cur)/cur*100:null;
      var f10=hist[i+9]?(hist[i+9].c-cur)/cur*100:null;
      var f20=hist[i+19]?(hist[i+19].c-cur)/cur*100:null;
      matches.push({date:hist[i].d,sim:sc/5,f5:f5,f10:f10,f20:f20,macd:m,rsi:r});
    }
  }
  if(matches.length<3)return null;
  function st(arr,k){
    var v=arr.map(function(m){return m[k];}).filter(function(x){return x!==null;});
    if(!v.length)return null;
    return{wr:Math.round(v.filter(function(x){return x>0;}).length/v.length*100),avg:parseFloat((v.reduce(function(a,b){return a+b;},0)/v.length).toFixed(2)),max:parseFloat(Math.max.apply(null,v).toFixed(2)),min:parseFloat(Math.min.apply(null,v).toFixed(2)),n:v.length};
  }
  return{n:matches.length,s5:st(matches,'f5'),s10:st(matches,'f10'),s20:st(matches,'f20'),top:matches.sort(function(a,b){return b.sim-a.sim;}).slice(0,3),avgSim:Math.round(matches.reduce(function(a,m){return a+m.sim;},0)/matches.length*100)};
}
function mkPred(s,bt){

// 根據現價動態計算目標/支撐/壓力（不管API成功與否都呼叫）
function calcLevels(s) {
  var p = s.price;
  if (!p || p <= 0) return;
  // 目標價：依訊號方向和期限調整
  var upside = s.grade && s.grade.rank >= 4
    ? (s.horizon === '短線' ? 1.08 : s.horizon === '中線' ? 1.15 : 1.20)
    : (s.grade && s.grade.rank <= 2 ? 0.88 : 1.05);
  // 停損/支撐：依波動性調整
  var stopPct = s.horizon === '短線' ? 0.95 : s.horizon === '中線' ? 0.93 : 0.90;
  s.target     = parseFloat((p * upside).toFixed(2));
  s.support    = parseFloat((p * stopPct).toFixed(2));
  s.resistance = parseFloat((p * 1.08).toFixed(2));
}

function fetchP(y){
  var u='https://query1.finance.yahoo.com/v8/finance/chart/'+y+'?interval=1d&range=2d';
  var p='https://api.allorigins.win/get?url='+encodeURIComponent(u);
  return fetch(p,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var raw=JSON.parse(d.contents),q=raw.chart.result[0],m=q.meta;
    var price=m.regularMarketPrice||m.previousClose||0;
    var prev=m.chartPreviousClose||m.previousClose||price;
    var chg=prev>0?((price-prev)/prev*100):0;
    return{price:parseFloat(price.toFixed(2)),change:parseFloat(chg.toFixed(2)),live:true};
  }).catch(function(){return null;});
}
function fetchH(y){
  var u='https://query1.finance.yahoo.com/v8/finance/chart/'+y+'?interval=1d&range=2y';
  var p='https://api.allorigins.win/get?url='+encodeURIComponent(u);
  return fetch(p,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var raw=JSON.parse(d.contents),q=raw.chart.result[0];
    var ts=q.timestamp,cl=q.indicators.quote[0].close,vo=q.indicators.quote[0].volume;
    var hist=[];
    for(var i=0;i<ts.length;i++){if(cl[i]){hist.push({d:new Date(ts[i]*1000).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}),c:cl[i],v:vo[i]||0});}}
    return hist;
  }).catch(function(){return null;});
}
function setProg(pct,txt){document.getElementById('ldf').style.width=pct+'%';if(txt)document.getElementById('ldst').textContent=txt;}
function mkChip(sym,st){var el=document.getElementById('c-'+sym);if(el)el.className='chip '+(st==='ok'?'ok':st==='g'?'g':'w');}

async function loadAll(){
  var all=DB.tw.concat(DB.us);
  document.getElementById('ldch').innerHTML=all.map(function(s){return'<span class="chip w" id="c-'+s.symbol+'">'+s.symbol+'</span>';}).join('');
  var done=0,total=all.length;
  setProg(3,'抓取即時股價 (0/'+total+')...');
  for(var i=0;i<all.length;i+=4){
    var b=all.slice(i,Math.min(i+4,all.length));
    await Promise.all(b.map(async function(s){
      mkChip(s.symbol,'g');
      var r=await fetchP(s.yS);
      if(r){s.price=r.price;s.change=r.change;s.live=true;}else{s.live=false;}if(s.price>0){var tmpSc=calcScore(s),tmpG=getGrade(tmpSc);s.grade=tmpG;calcLevels(s);}
      else s.live=false;
      done++;setProg(3+Math.round(done/total*40),'股價 '+s.symbol+' ✓ ('+done+'/'+total+')');
    }));
  }
  setProg(43,'計算評分...');
  ['tw','us'].forEach(function(m){
    STOCKS[m]=DB[m].map(function(s){
      var dims=calcDimensions(s);
      var ns=Object.assign({},s,{dims:dims,score:dims.total,grade:getGrade(dims.total)});
      calcLevels(ns);return ns;
    });
  });
  document.getElementById('loading').classList.add('hide');
  render();
  // 背景補抓剩餘股票
  setTimeout(async function(){
    var all2=DB.tw.concat(DB.us);
    var priority2=twBuy.concat(usBuy).concat(twSell).concat(usSell);
    var rest2=all2.filter(function(s){return priority2.indexOf(s.symbol)<0;});
    for(var ri=0;ri<rest2.length;ri+=4){
      var rb=rest2.slice(ri,Math.min(ri+4,rest2.length));
      await Promise.all(rb.map(async function(s){
        var r=await fetchP(s.yS);
        if(r&&r.price>0){
          s.price=r.price;s.change=r.change;s.live=true;
          ['tw','us'].forEach(function(m){
            var idx=STOCKS[m].findIndex(function(x){return x.symbol===s.symbol;});
            if(idx>=0){
              STOCKS[m][idx].price=r.price;STOCKS[m][idx].change=r.change;STOCKS[m][idx].live=true;
              var dims=calcDimensions(STOCKS[m][idx]);
              STOCKS[m][idx].dims=dims;STOCKS[m][idx].score=dims.total;
              STOCKS[m][idx].grade=getGrade(dims.total);calcLevels(STOCKS[m][idx]);
            }
          });
        }
      }));
    }
    render();
  },500);
  // 背景跑歷史回測
  setProg(50,'背景載入歷史數據...');
  var done2=0;
  for(var j=0;j<all.length;j+=2){
    var b2=all.slice(j,Math.min(j+2,all.length));
    await Promise.all(b2.map(async function(s){
      mkChip(s.symbol,'g');
      var h=await fetchH(s.yS);
      if(h&&h.length>60){HIST[s.symbol]=h;var bt=runBacktest(s,h);BT[s.symbol]=bt;PRED[s.symbol]=mkPred(s,bt);}
      else PRED[s.symbol]=mkPred(s,null);
      mkChip(s.symbol,'ok');done2++;
      setProg(50+Math.round(done2/all.length*45),'回測 '+s.symbol+' 完成 ('+done2+'/'+all.length+')');
    }));
  }
  setProg(100,'完成！');
  var now=new Date();
  lastPriceUpdate=now;updateLupd();
  render();
}

function ring(sc,g,sz){
  sz=sz||50;var r=sz/2-5,cx=sz/2,cy=sz/2,circ=2*Math.PI*r,dash=circ*(sc/100),fs=sz>54?13:sz>42?11:9;
  return'<div class="ring-wrap" style="width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#f1f5f9" stroke-width="5"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+g.dot+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+dash+' '+circ+'"/></svg><div class="ring-in"><div class="mono" style="font-size:'+fs+'px;font-weight:900;color:'+g.color+';line-height:1">'+sc+'</div><div style="font-size:7px;color:#94a3b8">分</div></div></div>';
}
function spark(pos){
  var pts=pos?[18,21,19,25,23,29,27,33,31,36,39,37,43]:[43,41,44,38,40,35,37,31,33,28,25,27,22];
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1,W=80,H=24,p=2;
  var co=pts.map(function(v,i){return[p+(i/(pts.length-1))*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)];});
  var line=co.map(function(c,i){return(i===0?'M':'L')+c[0]+','+c[1];}).join(' ');
  var fill=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';
  var col=pos?'#22c55e':'#ef4444';
  return'<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="sg'+(pos?1:0)+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.2"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+fill+'" fill="url(#sg'+(pos?1:0)+')" /><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function fmt(s,v){return(/^\d/.test(s.symbol)?'NT$':'$')+parseFloat(v).toLocaleString();}
function liveTag(s){return s.live===false?'<span style="font-size:9px;color:#94a3b8">估算</span>':'<span style="font-size:9px;color:#22c55e"><span class="live-dot"></span>即時</span>';}
function predTag(sym){var p=PRED[sym];if(!p)return'<span style="font-size:9px;color:#94a3b8">回測中</span>';var c=p.conf>=65?'#16a34a':p.conf>=50?'#d97706':'#dc2626';return'<span style="font-size:9px;font-weight:700;color:'+c+'">'+(p.dir==='up'?'↑':p.dir==='down'?'↓':'→')+p.conf+'%</span>';}

var lastPriceUpdate=null;var refreshTimer=null;var refreshCountdown=120;var isRefreshing=false;

function updateClock(){
  var now=new Date();
  document.getElementById('cdate').textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('ctime').textContent=now.toLocaleTimeString('zh-TW',{hour12:false});
}

function updateLupd(){
  var el=document.getElementById('lupd');
  if(!el)return;
  if(!lastPriceUpdate){el.innerHTML='<span style="font-size:9px;color:#475569">尚未更新</span>';return;}
  var now=new Date();
  var diff=Math.floor((now-lastPriceUpdate)/1000);
  var secAgo=diff<60?diff+'秒前':Math.floor(diff/60)+'分'+diff%60+'秒前';
  var dotCol=diff<30?'#22c55e':diff<120?'#f59e0b':'#ef4444';
  var cdStr=isRefreshing?'更新中...':'下次更新 '+refreshCountdown+'秒';
  el.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">'
    +'<div style="display:flex;align-items:center;gap:4px">'
    +'<span style="display:inline-block;width:6px;height:6px;border-radius:99px;background:'+dotCol+';animation:'+(diff<30?'blink 2s infinite':'none')+'"></span>'
    +'<span style="font-size:9px;font-weight:700;color:'+dotCol+'">股價更新 '+secAgo+'</span>'
    +'</div>'
    +'<div style="font-size:8px;color:#334155">'+cdStr+' · Yahoo Finance 15min延遲</div>'
    +'</div>';
}

async function refreshPricesOnly(){
  if(isRefreshing)return;
  isRefreshing=true;
  updateLupd();
  var all=DB.tw.concat(DB.us);
  for(var i=0;i<all.length;i+=5){
    var b=all.slice(i,Math.min(i+5,all.length));
    await Promise.all(b.map(async function(s){
      var r=await fetchP(s.yS);
      if(r&&r.price>0){
        s.price=r.price;s.change=r.change;s.live=true;
        // 更新 STOCKS 陣列裡的對應項
        ['tw','us'].forEach(function(m){
          var idx=STOCKS[m].findIndex(function(x){return x.symbol===s.symbol;});
          if(idx>=0){
            STOCKS[m][idx].price=r.price;
            STOCKS[m][idx].change=r.change;
            STOCKS[m][idx].live=true;
            var dims=calcDimensions(STOCKS[m][idx]);
            STOCKS[m][idx].dims=dims;
            STOCKS[m][idx].score=dims.total;
            STOCKS[m][idx].grade=getGrade(dims.total);
            calcLevels(STOCKS[m][idx]);
          }
        });
      }
    }));
  }
  lastPriceUpdate=new Date();
  isRefreshing=false;
  refreshCountdown=120;
  updateLupd();
  render();
}

function startRefreshTimer(){
  setInterval(function(){
    if(isRefreshing)return;
    refreshCountdown--;
    if(refreshCountdown<=0){
      refreshCountdown=120;
      refreshPricesOnly();
    }
    updateLupd();
  },1000);
}
function render(){
  if(!STOCKS[S.market]||!STOCKS[S.market].length)return;
  var a=document.getElementById('app');
  if(S.page==='picks')a.innerHTML=renderPicks();
  else if(S.page==='dimension')a.innerHTML=renderDimension();
  else if(S.page==='predict')a.innerHTML=renderPredict();
  else if(S.page==='sector')a.innerHTML=renderSector();
  else if(S.page==='factor')a.innerHTML=renderFactor();
  else if(S.page==='operation')a.innerHTML=renderOperation();
  else a.innerHTML=renderEarnings();
}
function setPage(p){S.page=p;document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['picks','predict','factor','operation','earnings'][i]===p);});render();}
function setMkt(m){S.market=m;render();}
function setFilter(f){S.filter=S.filter===f?'all':f;render();}
function toggleSort(){S.sort=S.sort==='score'?'change':'score';render();}
