button{font-family:inherit;cursor:pointer;border:none;outline:none;}
button:active{transform:scale(.97);}
.mono{font-family:Menlo,"JetBrains Mono",monospace;}
#hdr{background:#0f172a;position:sticky;top:0;z-index:100;padding:calc(11px + env(safe-area-inset-top)) 14px 11px;box-shadow:0 2px 12px rgba(0,0,0,.3);}

.tab{flex:1;flex-shrink:0;padding:6px 4px;border-radius:8px;font-size:17px;font-weight:700;color:#475569;background:transparent;white-space:nowrap;}
.tab.active{background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.15);}
#app{max-width:640px;margin:0 auto;padding:12px 14px calc(70px + env(safe-area-inset-bottom));}
.mkt-row{display:flex;gap:8px;margin-bottom:12px;}
.mkt-btn{flex:1;padding:10px;border-radius:12px;font-size:18px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#94a3b8;}
.mkt-btn.on{border-color:#2563eb;background:#eff6ff;color:#2563eb;}
.card{background:#fff;border-radius:16px;padding:16px 15px;margin-bottom:8px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.04);cursor:pointer;animation:fadeUp .3s ease both;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-weight:900;font-size:14px;white-space:nowrap;border:1.5px solid;}
.badge.lg{padding:4px 12px;font-size:12px;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cbar{height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
.cfill{height:100%;border-radius:99px;}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:9000;align-items:flex-end;justify-content:center;}
#modal-bg.open{display:flex;}
#modal{background:#f8fafc;border-radius:22px 22px 0 0;width:100%;max-width:580px;max-height:94vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .3s ease;}
.mhandle{width:40px;height:4px;background:#e2e8f0;border-radius:99px;margin:12px auto 0;}
.mbody{padding:13px 15px calc(40px + env(safe-area-inset-bottom));}
#loading{position:fixed;inset:0;background:#0f172a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#loading.hide{display:none;}
.ld-bar{width:260px;height:5px;background:#1e293b;border-radius:99px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:99px;transition:width .4s ease;}
.step-box{width:260px;display:flex;flex-direction:column;gap:6px;}
.step-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#1e293b;border-radius:10px;border:1px solid #334155;}
.step-row.active{border-color:#22c55e;}
.step-row.done{border-color:#064e3b;background:#052e16;}
.live-dot{display:inline-block;width:5px;height:5px;background:#22c55e;border-radius:99px;margin-right:3px;animation:blink 2s infinite;}
.sb{background:#0f172a;border-radius:16px;padding:13px;margin-bottom:11px;}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.sc{text-align:center;padding:7px 3px;background:#1e293b;border-radius:9px;cursor:pointer;border:1.5px solid transparent;}
.fr{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:9px;scrollbar-width:none;}
.fr::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:5px 12px;border-radius:99px;font-size:16px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#94a3b8;white-space:nowrap;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.pbox{background:#fff;border-radius:10px;padding:9px 11px;border:1px solid #e2e8f0;text-align:center;}
#pp{position:fixed;top:calc(12px + env(safe-area-inset-top));right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:270px;}
.pc{background:#fff;border-radius:11px;border:1.5px solid;border-left:4px solid;padding:9px 11px;box-shadow:0 4px 18px rgba(0,0,0,.11);animation:slideIn .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>

function apiFetch(url, timeout){
  timeout = timeout || 12000;
  var ctrl = new AbortController();
  var t = setTimeout(function(){ctrl.abort();}, timeout);
  return fetch(url, {cache:'no-store', signal:ctrl.signal})
    .then(function(r){clearTimeout(t); return r.json();})
    .catch(function(){clearTimeout(t); return null;});
}

function fetchQuotes(ySymbols){
  return apiFetch(WORKER+'/yahoo?symbols='+encodeURIComponent(ySymbols.join(',')))
    .then(function(d){
      var map = {};
      if(d && d.quoteResponse && d.quoteResponse.result){
        d.quoteResponse.result.forEach(function(q){map[q.symbol] = q;});
      }
      return map;
    }).catch(function(){return {};});
}

// 回測引擎
// ══════════════════════════════════════
function avgArr(a){return a.reduce(function(x,y){return x+y;},0)/a.length;}
function emaArr(d,p){var k=2/(p+1),e=d[0];for(var i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}

function calcRSI(closes, period){
  period = period || 14;
  if(closes.length < period+1) return 50;
  var gains=0, losses=0;
  for(var i=closes.length-period; i<closes.length; i++){
    var d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  if(losses===0) return 100;
  return +(100-100/(1+gains/losses)).toFixed(1);
}

function detectScenario(closes, vols, rsi, adx, pos52, macdDir, macdSlope){
  if(!closes || closes.length < 20) return 'TREND_CONTINUATION';
  var n = closes.length;

  // 計算各指標
  var momentum10 = n>=11 ? (closes[n-1]-closes[n-11])/closes[n-11]*100 : 0;
  var recentVols = vols ? vols.slice(-5).filter(function(v){return v>0;}) : [];
  var longVols = vols ? vols.slice(-20).filter(function(v){return v>0;}) : [];
  var volRatio = (recentVols.length && longVols.length) ?
    (recentVols.reduce(function(a,b){return a+b;})/recentVols.length) /
    (longVols.reduce(function(a,b){return a+b;})/longVols.length) : 1;

  // 連漲天數
  var upDays = 0;
  for(var i=n-1;i>n-6&&i>0;i--){
    if(closes[i]>closes[i-1]) upDays++; else break;
  }

  // Scenario 判斷（優先順序重要）
  // 1. 過熱回調（最高優先）
  if(rsi > 75 && volRatio > 2 && upDays >= 3) return 'OVERHEATED';

  // 2. 牛市突破
  if(pos52 > 80 && adx > 25 && macdDir === 1 && macdSlope === 1) return 'BULL_BREAKOUT';

  // 3. 熊市反彈
  if(rsi < 35 && volRatio < 0.8 && pos52 < 30) return 'BEAR_BOUNCE';

  // 4. 盤整突破
  if(adx > 20 && volRatio > 1.8 && Math.abs(momentum10) > 3) return 'RANGE_BREAKOUT';

  // 5. 趨勢延續
  if(macdDir === 1 && macdSlope === 1 && pos52 > 40) return 'TREND_CONTINUATION';

  // 預設：趨勢延續
  return 'TREND_CONTINUATION';
}

// 舊版 Regime（向後相容）
function detectRegime(closes, vols){
  if(!closes || closes.length < 20) return 'UNKNOWN';
  var n = closes.length;
  var vol = vols ? vols.slice(-5).filter(function(v){return v>0;}) : [];
  var avgVol = vol.length ? vol.reduce(function(a,b){return a+b;})/vol.length : 0;
  var momentum = n>=21 ? (closes[n-1]-closes[n-11])/closes[n-11]*100 : 0;
  if(avgVol > 0){
    var longAvgVol = vols ? vols.slice(-20).filter(function(v){return v>0;}) : [];
    var longAvg = longAvgVol.length ? longAvgVol.reduce(function(a,b){return a+b;})/longAvgVol.length : avgVol;
    if(avgVol > longAvg * 1.5) return 'HIGH_VOL';
  }
  if(momentum > 3) return 'TREND_UP';
  if(momentum < -3) return 'TREND_DOWN';
  return 'RANGE';
}

// ══════════════════════════════════════
// Alpha 計算（Quant v7 公式）
// alpha = 0.4×momentum + 0.3×imbalance + 0.2×return + 0.1×volume
// ══════════════════════════════════════
function calcAlpha(q, inst, scenario){
  if(!q || !q.regularMarketPrice) return 0;
  var momentum = (q.fiftyTwoWeekChangePercent||0)*100;
  var ret = q.regularMarketChangePercent||0;
  var vol = q.regularMarketVolume||1;
  var avgVol = q.averageDailyVolume3Month||1;
  var volScore = Math.min(2, vol/avgVol);

  var imbalance = 0;
  if(inst){
    var fn = inst.foreign_net||0;
    var tn = inst.trust_net||0;
    imbalance = Math.max(-1, Math.min(1, (fn+tn)/100000));
  } else {
    imbalance = ret > 0 ? Math.min(1, (volScore-1)*0.5) : Math.max(-1, (1-volScore)*0.5);
  }

  // 動態權重：根據 Scenario 調整
  var w = scenario && SCENARIOS[scenario] ?
    SCENARIOS[scenario].alphaWeights :
    {momentum:0.4, imbalance:0.3, ret:0.2, vol:0.1};

  var alpha = w.momentum*(momentum/50) + w.imbalance*imbalance + w.ret*(ret/5) + w.vol*(volScore-1);
  return Math.max(-1, Math.min(1, alpha));
}

// ══════════════════════════════════════
// Sharpe Ratio 計算（回測結果品質評估）
// ══════════════════════════════════════
function calcSharpe(returns){
  if(!returns || returns.length < 5) return null;
  var n = returns.length;
  var mean = returns.reduce(function(a,b){return a+b;})/n;
  var variance = returns.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/n;
  var stddev = Math.sqrt(variance);
  if(stddev === 0) return null;
  // 年化 Sharpe（假設10天報酬，年化252/10=25.2）
  var annualFactor = Math.sqrt(25.2);
  return +(mean/stddev*annualFactor).toFixed(2);
}

// ══════════════════════════════════════
// 流動性評估（Liquidity Score）
// 低流動性股票評分打折
// ══════════════════════════════════════
function calcLiquidity(q){
  if(!q) return 0.5;
  var price = q.regularMarketPrice||0;
  var vol = q.regularMarketVolume||0;
  var avgVol = q.averageDailyVolume3Month||1;
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;

  // 近似 spread = 52週範圍 / 當前價格（越小越有流動性）
  var spread = price > 0 ? (high52-low52)/price : 1;

  // 成交量流動性（日均量越大越好）
  var volLiq = Math.min(1, avgVol/1000000); // 百萬股為基準

  // 台股用成交金額近似（張數×價格）
  var isTW = price < 10000; // 台股股價通常較低
  if(isTW) volLiq = Math.min(1, (avgVol*price*1000)/1000000000); // 10億為基準

  // 綜合流動性 0-1
  var liquidity = volLiq * 0.7 + (1-Math.min(1,spread)) * 0.3;
  return +liquidity.toFixed(2);
}

// ══════════════════════════════════════
// Portfolio Allocation（建議倉位比例）
// weight = alpha / volatility（Quant v7）
// ══════════════════════════════════════
function calcPosition(alphaVal, riskData, liquidity, totalScore){
  if(!riskData || riskData.dailyVol === 0) return null;
  var vol = riskData.dailyVol/100; // 轉回小數
  if(vol === 0) return null;

  // 基礎倉位（alpha / vol）
  var rawWeight = alphaVal / (vol + 0.001);

  // 正規化到 0-1
  var weight = Math.max(0, Math.min(1, (rawWeight + 2) / 4));

  // 流動性折扣（低流動性股票建議降低倉位）
  weight = weight * (0.5 + liquidity * 0.5);

  // 評分調整（綜合分越高，倉位越高）
  weight = weight * (totalScore / 100);

  // 建議倉位百分比（最高20%，避免過度集中）
  var pct = Math.min(20, Math.max(1, Math.round(weight * 20)));

  return {
    pct: pct,
    liquidity: liquidity,
    rawAlpha: +alphaVal.toFixed(3)
  };
}

// ══════════════════════════════════════
// Feedback Loop（預測記錄，供未來校正）
// ══════════════════════════════════════
var FEEDBACK = {}; // {symbol: {predictedAt, price, score, bt_wr}}

function recordPrediction(symbol, price, score, btWr, grade, scenario, btSharpe){
  FEEDBACK[symbol] = {predictedAt:Date.now(), price:price, score:score, btWr:btWr};
  try{
    var key = 'qx_feedback';
    var existing = JSON.parse(localStorage.getItem(key)||'{}');
    var dateKey = new Date().toISOString().slice(0,10);
    if(!existing[dateKey]) existing[dateKey] = {};
    // 記錄完整預測數據
    existing[dateKey][symbol] = {
      price: price,           // 預測當日收盤價
      score: score,           // 即時分
      btWr: btWr,             // 回測勝率
      grade: grade||'',       // 強買/買入/觀察/減碼/強賣
      scenario: scenario||'', // 市場情境
      sharpe: btSharpe||null, // Sharpe ratio
      ts: Date.now()          // 時間戳
    };
    var dates = Object.keys(existing).sort();
    while(dates.length > 60){ delete existing[dates.shift()]; } // 保留60天
    localStorage.setItem(key, JSON.stringify(existing));
  }catch(e){}
}

// 更新預測結果（回顧實際漲跌）
function updatePredictionOutcome(symbol, actualPrice){
  try{
    var key = 'qx_feedback';
    var existing = JSON.parse(localStorage.getItem(key)||'{}');
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    var cutoffStr = cutoff.toISOString().slice(0,10);
    Object.keys(existing).forEach(function(dateKey){
      if(dateKey > cutoffStr) return; // 只更新超過1天的記錄
      if(existing[dateKey][symbol] && !existing[dateKey][symbol].actual){
        existing[dateKey][symbol].actual = actualPrice;
        existing[dateKey][symbol].actualDate = new Date().toISOString().slice(0,10);
        var predPrice = existing[dateKey][symbol].price;
        existing[dateKey][symbol].ret = predPrice > 0 ?
          +((actualPrice-predPrice)/predPrice*100).toFixed(2) : null;
      }
    });
    localStorage.setItem(key, JSON.stringify(existing));
  }catch(e){}
}

function getFeedbackStats(){
  try{
    var existing = JSON.parse(localStorage.getItem('qx_feedback')||'{}');
    var dates = Object.keys(existing).sort();
    if(dates.length < 2) return null;
    // 計算上次預測的準確率（有多少強買後來漲了）
    var total=0, correct=0;
    dates.slice(-7).forEach(function(d){
      Object.keys(existing[d]).forEach(function(sym){
        var rec = existing[d][sym];
        total++;
        if(rec.score >= 70 && rec.btWr >= 60) correct++;
      });
    });
    return {total:total, days:dates.length, avgScore:correct};
  }catch(e){return null;}
}

// ══════════════════════════════════════
// 最佳進出場預測引擎
// ══════════════════════════════════════
function predictEntryExit(hist, scenario, curPrice){
  if(!hist || hist.length < 30 || !scenario || !SCENARIOS[scenario]) return null;
  var cfg = SCENARIOS[scenario];
  var closes = hist.map(function(d){return d.c;});
  var n = closes.length;

  // 找最佳進場點：在回測匹配點後幾天進場勝率最高
  var entryStats = [0,1,2,3,4,5].map(function(delay){
    var wins=0, total=0;
    for(var i=20;i<n-cfg.holdDays-delay;i++){
      var entryPrice = closes[i+delay];
      var exitPrice = closes[i+delay+cfg.holdDays];
      if(entryPrice && exitPrice){
        total++;
        if(exitPrice > entryPrice) wins++;
      }
    }
    return total>5 ? {delay:delay, wr:Math.round(wins/total*100), n:total} : null;
  }).filter(Boolean);

  // 找最佳進場延遲
  var bestEntry = entryStats.reduce(function(best, cur){
    return (!best || cur.wr > best.wr) ? cur : best;
  }, null);

  // 最佳出場點：找最大化風險調整報酬的持有天數
  var holdStats = [3,5,7,10,15,20].map(function(days){
    var returns=[];
    for(var i=20;i<n-days;i++){
      if(closes[i] && closes[i+days]){
        returns.push((closes[i+days]-closes[i])/closes[i]*100);
      }
    }
    if(returns.length < 5) return null;
    var avg = returns.reduce(function(a,b){return a+b;})/returns.length;
    var std = Math.sqrt(returns.reduce(function(a,b){return a+Math.pow(b-avg,2);},0)/returns.length);
    var sharpe = std>0 ? avg/std*Math.sqrt(252/days) : 0;
    var wr = returns.filter(function(r){return r>0;}).length/returns.length*100;
    return {days:days, avg:+avg.toFixed(1), wr:Math.round(wr), sharpe:+sharpe.toFixed(2)};
  }).filter(Boolean);

  var bestExit = holdStats.reduce(function(best, cur){
    return (!best || cur.sharpe > best.sharpe) ? cur : best;
  }, null);

  // 動態停損/目標價（基於波動度 + Scenario 設定）
  var recentVol = 0;
  if(n >= 20){
    var rets = [];
    for(var j=n-20;j<n;j++) if(closes[j]&&closes[j-1]) rets.push((closes[j]-closes[j-1])/closes[j-1]);
    var meanR = rets.reduce(function(a,b){return a+b;})/rets.length;
    var varR = rets.reduce(function(a,b){return a+Math.pow(b-meanR,2);},0)/rets.length;
    recentVol = Math.sqrt(varR);
  }

  var dynSL = Math.max(cfg.slPct, recentVol * 2.5);  // 至少2.5倍日波動
  var dynTP = Math.max(cfg.tpPct, dynSL * 2.5);       // 風報比至少1:2.5

  return {
    scenario: scenario,
    scenarioName: cfg.name,
    bestEntryDelay: bestEntry ? bestEntry.delay : 0,
    bestEntryWR: bestEntry ? bestEntry.wr : null,
    bestHoldDays: bestExit ? bestExit.days : cfg.holdDays,
    bestHoldSharpe: bestExit ? bestExit.sharpe : null,
    bestHoldWR: bestExit ? bestExit.wr : null,
    dynSL: +dynSL.toFixed(3),
    dynTP: +dynTP.toFixed(3),
    stopLoss: +(curPrice*(1-dynSL)).toFixed(2),
    takeProfit: +(curPrice*(1+dynTP)).toFixed(2),
    entrySignal: cfg.entrySignal,
    recentVol: +(recentVol*100).toFixed(2)
  };
}

// ══════════════════════════════════════
// Risk Engine（動態停損/目標價）
// 參考 Quant Trading System v7
// ══════════════════════════════════════
function calcRisk(q, score){
  var price = q ? (q.regularMarketPrice||0) : 0;
  if(!price) return null;

  // 計算 VaR 近似（用52週波動度）
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;
  var annualVol = (high52-low52)/(price*Math.sqrt(252)||1);
  var dailyVol = annualVol/Math.sqrt(252);
  var var95 = price * dailyVol * 1.645; // 95% VaR

  // Drawdown 估算（從52週高點跌落幅度）
  var drawdown = high52 > 0 ? (high52-price)/high52 : 0;

  // Risk 狀態
  var riskState = 'OK';
  if(drawdown > 0.25) riskState = 'DELEVER';  // 從高點跌超過25%
  else if(dailyVol > 0.04) riskState = 'HIGH_RISK'; // 日波動>4%

  // 動態停損（根據波動度調整）
  var slPct = Math.max(0.05, Math.min(0.15, dailyVol * 10));
  var tpPct = slPct * (score>=70 ? 2.5 : score>=50 ? 2.0 : 1.5);

  return {
    riskState: riskState,
    drawdown: +(drawdown*100).toFixed(1),
    var95: +var95.toFixed(2),
    dailyVol: +(dailyVol*100).toFixed(1),
    slPct: +slPct.toFixed(3),
    tpPct: +tpPct.toFixed(3),
    stopLoss: +(price*(1-slPct)).toFixed(2),
    takeProfit: +(price*(1+tpPct)).toFixed(2),
  };
}

function calcADX(closes, period){
  period = period || 14;
  if(closes.length < period*2) return 25; // default neutral
  var trs=[];
  for(var i=1;i<closes.length;i++){
    var h=closes[i], l=closes[i]*0.985, pc=closes[i-1];
    trs.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
  }
  var dx=[];
  for(var j=period;j<trs.length;j++){
    var atr=trs.slice(j-period,j).reduce(function(a,b){return a+b;})/period;
    if(atr===0){dx.push(0);continue;}
    var ph=Math.max.apply(null,closes.slice(j-period+1,j+1));
    var pl=Math.min.apply(null,closes.slice(j-period+1,j+1));
    var pdm=Math.max(ph-closes[j-1],0);
    var ndm=Math.max(closes[j-1]-pl,0);
    var pdi=pdm/atr*100, ndi=ndm/atr*100;
    var sum=pdi+ndi;
    dx.push(sum===0?0:Math.abs(pdi-ndi)/sum*100);
  }
  if(!dx.length) return 25;
  return +(dx.slice(-period).reduce(function(a,b){return a+b;})/Math.min(period,dx.length)).toFixed(1);
}

function calcVolRatio(vols){
  if(!vols||vols.length<10) return 1;
  var recent=vols[vols.length-1]||0;
  var avg=vols.slice(-10,-1).filter(function(v){return v>0;});
  if(!avg.length) return 1;
  return recent/(avg.reduce(function(a,b){return a+b;})/avg.length);
}

function getMktState(mktHist, dateIdx){
  // 取得某日的大盤狀態：趨勢方向 + 動能
  if(!mktHist || mktHist.length < 20) return null;
  var idx = Math.min(dateIdx, mktHist.length-1);
  if(idx < 20) return null;
  var closes = mktHist.slice(Math.max(0,idx-60), idx+1).map(function(d){return d.c;});
  var cur = closes[closes.length-1];
  var ma20 = closes.slice(-20).reduce(function(a,b){return a+b;})/20;
  var ma60 = closes.length>=60 ? closes.reduce(function(a,b){return a+b;})/closes.length : ma20;
  var mom20 = closes.length>=21 ? (cur-closes[closes.length-21])/closes[closes.length-21]*100 : 0;
  return {
    aboveMa20: cur > ma20,
    aboveMa60: cur > ma60,
    mom20: mom20,
    trend: cur>ma20&&ma20>ma60?'bull': cur<ma20&&ma20<ma60?'bear':'flat'
  };
}

function runBacktest(sym, hist, mktHist){
  if(!hist || hist.length < 40) return null;
  var closes = hist.map(function(d){return d.c;});
  var vols = hist.map(function(d){return d.v||0;});
  var n = closes.length;

  // 計算當前狀態
  var curCloses = closes.slice(-20);
  var curE12 = emaArr(curCloses, 12);
  var curE26 = emaArr(curCloses, 26);
  var curMacd = curE12 - curE26;
  // MACD 方向 + 斜率（修正一）
  var curMacdDir = curMacd > 0 ? 1 : -1;
  var curMacdSlope = curCloses.length >= 3 ?
    ((emaArr(curCloses.slice(-1),12)-emaArr(curCloses.slice(-2,-1),12)) > 0 ? 1 : -1) : 0;

  var curRSI = calcRSI(closes.slice(-20));

  // 52週位置用真正的過去250天（修正二）
  var w52 = 250;
  var cur52Slice = closes.slice(Math.max(0, n-w52));
  var curMn52 = Math.min.apply(null, cur52Slice);
  var curMx52 = Math.max.apply(null, cur52Slice);
  var curPos52 = curMx52 > curMn52 ? (closes[n-1]-curMn52)/(curMx52-curMn52)*100 : 50;

  // 動能用10天（修正四）
  var curMom10 = n >= 11 ? (closes[n-1]-closes[n-11])/closes[n-11]*100 : 0;

  // 當前 Regime（用個股數據）
  var curRegime = detectRegime(closes.slice(-30), vols.slice(-30));

  // 成交量趨勢（修正五）
  var curVolTrend = (function(){
    var r5 = vols.slice(-5).filter(function(v){return v>0;});
    var r10 = vols.slice(-10,-5).filter(function(v){return v>0;});
    if(!r5.length||!r10.length) return 0;
    var avg5 = r5.reduce(function(a,b){return a+b;})/r5.length;
    var avg10 = r10.reduce(function(a,b){return a+b;})/r10.length;
    return avg5>avg10*1.2?1:avg5<avg10*0.8?-1:0;
  })();

  // 大盤狀態
  var curMkt = getMktState(mktHist, mktHist?mktHist.length-1:0);

  var matches = [];
  for(var i=30; i<n-20; i++){
    var sl = closes.slice(i-20, i);
    var vl = vols.slice(i-10, i);

    // 1. MACD 方向+斜率（修正一）
    var e12 = emaArr(sl, 12);
    var e26 = emaArr(sl, 26);
    var macd = e12 - e26;
    var macdDir = macd > 0 ? 1 : -1;
    var prevSl = closes.slice(i-21, i-1);
    var prevE12 = emaArr(prevSl, 12);
    var prevE26 = emaArr(prevSl, 26);
    var prevMacd = prevE12 - prevE26;
    var macdSlope = macd > prevMacd ? 1 : -1;

    // 2. RSI
    var rsi = calcRSI(sl);

    // 3. 真正52週位置（修正二）
    var hist52 = closes.slice(Math.max(0, i-w52), i);
    var mn52 = Math.min.apply(null, hist52);
    var mx52 = Math.max.apply(null, hist52);
    var pos52 = mx52>mn52 ? (sl[sl.length-1]-mn52)/(mx52-mn52)*100 : 50;

    // 4. 10天動能（修正四）
    var mom10 = i>=11 ? (closes[i-1]-closes[i-11])/closes[i-11]*100 : 0;

    // 5. 成交量趨勢（修正五）
    var vl5 = vols.slice(Math.max(0,i-5),i).filter(function(v){return v>0;});
    var vl10 = vols.slice(Math.max(0,i-10),i-5).filter(function(v){return v>0;});
    var volTrend = 0;
    if(vl5.length&&vl10.length){
      var avg5=vl5.reduce(function(a,b){return a+b;})/vl5.length;
      var avg10=vl10.reduce(function(a,b){return a+b;})/vl10.length;
      volTrend = avg5>avg10*1.2?1:avg5<avg10*0.8?-1:0;
    }

    // 大盤比對（修正三：改用日期比例但加誤差容忍）
    var mktSim = 15; // 預設中性
    if(curMkt && mktHist && mktHist.length > 0){
      var mktIdx = Math.round(i/n * mktHist.length);
      mktIdx = Math.max(20, Math.min(mktHist.length-1, mktIdx));
      var histMkt = getMktState(mktHist, mktIdx);
      if(histMkt){
        mktSim = 0;
        if(curMkt.trend === histMkt.trend) mktSim += 15;
        else if(curMkt.trend !== 'flat' && histMkt.trend !== 'flat') mktSim += 5; // 同方向但不同強度
        if(curMkt.aboveMa20 === histMkt.aboveMa20) mktSim += 10;
        var mktMomZone = function(m){return m>3?'up':m>-3?'flat':'dn';};
        if(mktMomZone(curMkt.mom20) === mktMomZone(histMkt.mom20)) mktSim += 5;
      }
    }

    // Regime 比對（必要條件：同一市場環境下的案例才有參考價值）
    var histRegime = detectRegime(closes.slice(Math.max(0,i-30),i), vols.slice(Math.max(0,i-30),i));
    // Regime 不同時大幅降低相似度
    var regimeMult = (curRegime === histRegime) ? 1.0 :
                     (curRegime.replace('_UP','').replace('_DOWN','') === histRegime.replace('_UP','').replace('_DOWN','')) ? 0.7 : 0.4;

    // 計算相似度
    var sim = 0;
    // MACD 方向（20分）+ 斜率（10分）
    if(curMacdDir === macdDir) sim += 20;
    if(curMacdSlope === macdSlope) sim += 10;
    // RSI 區間（15分）+ 接近程度（10分）
    var rsiZone = function(r){return r>=70?'ob':r>=55?'uh':r>=45?'mid':r>=30?'lh':'os';};
    if(rsiZone(curRSI) === rsiZone(rsi)) sim += 15;
    if(Math.abs(curRSI-rsi) < 8) sim += 10;
    else if(Math.abs(curRSI-rsi) < 15) sim += 5;
    // 52週位置（20分）
    if(Math.abs(curPos52-pos52) < 10) sim += 20;
    else if(Math.abs(curPos52-pos52) < 20) sim += 12;
    else if(Math.abs(curPos52-pos52) < 35) sim += 5;
    // 10天動能（15分）
    var momZone = function(m){return m>5?'up':m>1?'mup':m>-1?'flat':m>-5?'mdn':'dn';};
    if(momZone(curMom10) === momZone(mom10)) sim += 15;
    // 成交量趨勢（10分）
    if(curVolTrend === volTrend) sim += 10;

    // 總相似度：個股技術80% + 大盤20%，再乘以 Regime 係數
    var mktNorm = Math.round(mktSim / 30 * 100);
    var totalSim = Math.round((sim * 0.8 + mktNorm * 0.2) * regimeMult);

    if(totalSim >= 30){
      var f5  = hist[i+4]  ? (hist[i+4].c  - hist[i].c)/hist[i].c*100 : null;
      var f10 = hist[i+9]  ? (hist[i+9].c  - hist[i].c)/hist[i].c*100 : null;
      var f20 = hist[i+19] ? (hist[i+19].c - hist[i].c)/hist[i].c*100 : null;
      var volConfirm = (volTrend===1&&mom10>0)||(volTrend===-1&&mom10<0);
      // 動態出場：等動能反轉（Alpha<0.3等效：連跌或跌破進場5%）
      var dynExit = null;
      for(var ex=3; ex<=25; ex++){
        if(i+ex < n){
          var exMom = ex>=3 ? (closes[i+ex]-closes[i+ex-3])/closes[i+ex-3]*100 : 0;
          if(exMom < -2 || closes[i+ex] < closes[i]*0.95){
            dynExit = {days:ex, ret:(closes[i+ex]-closes[i])/closes[i]*100};
            break;
          }
        }
      }
      // MA Cross
      var maSlice = closes.slice(Math.max(0,i-50),i);
      var ma10v = maSlice.length>=10 ? maSlice.slice(-10).reduce(function(a,b){return a+b;})/10 : closes[i-1];
      var ma50v = maSlice.length>=20 ? maSlice.reduce(function(a,b){return a+b;})/maSlice.length : closes[i-1];
      var maCross = ma10v >= ma50v ? 1 : -1;
      // Breakout 20日高點
      var high20 = Math.max.apply(null, closes.slice(Math.max(0,i-20),i));
      var isBreakout = closes[i-1] > high20*0.98;

      matches.push({f5:f5, f10:f10, f20:f20, sim:totalSim, regime:histRegime,
        volConfirm:volConfirm, dynExit:dynExit, maCross:maCross, isBreakout:isBreakout});
    }
  }
  if(matches.length < 2) return null;

  function weightedStat(arr, key){
    var items=arr.map(function(m){return{v:m[key],w:m.sim};}).filter(function(x){return x.v!==null;});
    if(!items.length)return null;
    var totalW=items.reduce(function(a,b){return a+b.w;},0);
    var wavg=items.reduce(function(a,b){return a+b.v*b.w;},0)/totalW;
    var wr=Math.round(items.filter(function(x){return x.v>0;}).length/items.length*100);
    var variance=items.reduce(function(a,b){return a+Math.pow(b.v-wavg,2);},0)/items.length;
    var stddev=+Math.sqrt(variance).toFixed(1);
    return{wr:wr,avg:+wavg.toFixed(1),n:items.length,stddev:stddev};
  }

  var s10 = weightedStat(matches,'f10');
  var s5 = weightedStat(matches,'f5');
  var s20 = weightedStat(matches,'f20');

  // 動態出場統計（訊號反轉驅動）
  var dynExitMatches = matches.filter(function(m){
    return m.dynExit && typeof m.dynExit === 'object' &&
           typeof m.dynExit.ret === 'number' && !isNaN(m.dynExit.ret) &&
           typeof m.dynExit.days === 'number';
  });
  var dynStat = null;
  if(dynExitMatches.length >= 3){
    try{
      var dynRets = dynExitMatches.map(function(m){return m.dynExit.ret;});
      var dynDays = dynExitMatches.map(function(m){return m.dynExit.days;});
      var dynAvgRet = +(dynRets.reduce(function(a,b){return a+b;})/dynRets.length).toFixed(1);
      var dynAvgDays = Math.round(dynDays.reduce(function(a,b){return a+b;})/dynDays.length);
      var dynWr = Math.round(dynRets.filter(function(r){return r>0;}).length/dynRets.length*100);
      dynStat = {avgRet:dynAvgRet, avgDays:dynAvgDays, wr:dynWr, n:dynExitMatches.length};
    }catch(e){}
  }

  // MA Cross 勝率
  var maBullMatches = matches.filter(function(m){return m.maCross===1;});
  var maBullStat = maBullMatches.length>=3 ? weightedStat(maBullMatches,'f10') : null;

  // Breakout 勝率
  var breakoutMatches = matches.filter(function(m){return m.isBreakout;});
  var breakoutStat = breakoutMatches.length>=3 ? weightedStat(breakoutMatches,'f10') : null;

  // Sharpe Ratio
  var sharpe = null;
  if(s10 && s10.n >= 5){
    var returns10 = matches.map(function(m){return m.f10;}).filter(function(v){return v!==null;});
    sharpe = calcSharpe(returns10);
  }

  // Regime-specific 勝率（分別統計各市場環境下的勝率）
  var regimeStats = {};
  ['TREND_UP','TREND_DOWN','HIGH_VOL','RANGE'].forEach(function(reg){
    var regMatches = matches.filter(function(m){return m.regime===reg;});
    if(regMatches.length >= 3){
      regimeStats[reg] = weightedStat(regMatches,'f10');
    }
  });

  // 成交量確認信號（量增且方向一致的案例勝率）
  var volConfirmed = matches.filter(function(m){return m.volConfirm;});
  var volConfirmStat = volConfirmed.length >= 3 ? weightedStat(volConfirmed,'f10') : null;

  return{
    s5:s5, s10:s10, s20:s20,
    n:matches.length,
    avgSim:Math.round(matches.reduce(function(a,m){return a+m.sim;},0)/matches.length),
    mktFiltered:!!(mktHist&&mktHist.length>0),
    sharpe:sharpe,
    regime:curRegime,
    regimeStats:regimeStats,
    volConfirmStat:volConfirmStat,
    dynStat:dynStat,
    maBullStat:maBullStat,
    breakoutStat:breakoutStat
  };
}


async function fetchAndBacktest(symbol, ySymbol, isTW){

  if(status==='loading') return '<span style="font-size:11px;color:#60a5fa;font-style:italic">⏳ 下載歷史數據...</span>';
  if(status==='fail') return '<span style="font-size:15px;color:#94a3b8">📊 樣本不足</span>';

    var col = s10.wr>=65?'#16a34a':s10.wr>=55?'#22c55e':s10.wr>=45?'#f59e0b':'#ef4444';
    var dir = s10.avg>=0?'↑':'↓';
    var stable = s10.stddev<3?'🟢':s10.stddev<6?'🟡':'🔴';
    var stableText = s10.stddev<3?'穩定':s10.stddev<6?'波動中':'分散';
    var mktTag = bt.mktFiltered ? '📊' : '';
    var reliab = s10.n>=60?'✅可靠':s10.n>=30?'🟡中等':s10.n>=10?'🟠偏少':'⚠️極少';
    var sharpeTag = bt.sharpe!==null&&bt.sharpe!==undefined ?
      ' <span style="font-size:13px;color:'+(bt.sharpe>=1.5?'#16a34a':bt.sharpe>=0.5?'#f59e0b':'#ef4444')+'">Sharpe '+bt.sharpe+'</span>' : '';
    var regimeTag = bt.regime ? ' <span style="font-size:12px;color:#94a3b8">'+
      ({TREND_UP:'📈趨勢',TREND_DOWN:'📉跌勢',HIGH_VOL:'🔥高量',RANGE:'↔盤整',UNKNOWN:''}[bt.regime]||'')+'</span>' : '';
    // 動態出場標籤
    var dynTag = '';
    if(bt.dynStat && bt.dynStat.n >= 3){
      var dynCol = bt.dynStat.wr>=60?'#16a34a':bt.dynStat.wr>=45?'#f59e0b':'#ef4444';
      dynTag = ' <span style="font-size:12px;color:'+dynCol+'">動態出場'+bt.dynStat.avgDays+'天·'+bt.dynStat.wr+'%</span>';
    }
    return '<span style="font-size:17px;font-weight:700;color:'+col+'">'+reliab+' '+s10.n+'筆·勝率'+s10.wr+'%·'+dir+Math.abs(s10.avg)+'%</span>'
      +' <span style="font-size:15px;color:#94a3b8">'+stable+stableText+(mktTag?' '+mktTag:'')+'</span>'
      +sharpeTag+regimeTag+dynTag;
  }
  return '';
}

function scoreStock(q, inst, marg){
  if(!q || !q.regularMarketPrice) return 30;
  var score = 50;
  var price = q.regularMarketPrice || 0;
  var chg = q.regularMarketChangePercent || 0;
  var chg52 = (q.fiftyTwoWeekChangePercent || 0) * 100;
  var vol = q.regularMarketVolume || 1;
  var avgVol = q.averageDailyVolume3Month || 1;
  var low52 = q.fiftyTwoWeekLow || price;
  var high52 = q.fiftyTwoWeekHigh || price;
  var pos52 = high52 > low52 ? (price - low52) / (high52 - low52) * 100 : 50;
  var volR = vol / avgVol;

  // 1. 技術動能（-15 ~ +30）
  score += Math.max(-8, Math.min(8, chg * 2.5));
  if(pos52 >= 70) score += 12;
  else if(pos52 >= 50) score += 6;
  else if(pos52 >= 30) score += 1;
  else score -= 6;
  if(volR >= 2 && chg > 0) score += 10;
  else if(volR >= 1.5 && chg > 0) score += 6;
  else if(volR >= 1.2) score += 2;

  // 2. 年度動能（-8 ~ +8）
  if(chg52 >= 50) score += 8;
  else if(chg52 >= 20) score += 5;
  else if(chg52 >= 0) score += 2;
  else if(chg52 >= -20) score -= 3;
  else score -= 8;

  // 3. 基本面（0 ~ +20）


  var revG = q.revenueGrowth || 0;
  if(revG >= 0.3) score += 6;
  else if(revG >= 0.1) score += 3;
  else if(revG >= 0) score += 1;
  else score -= 2;

  var epsG = q.earningsGrowth || 0;
  if(epsG >= 0.3) score += 5;
  else if(epsG >= 0.1) score += 2;
  else if(epsG < -0.2) score -= 4;

  var pe = q.trailingPE || 0;
  if(pe > 0 && pe < 15) score += 3;
  else if(pe >= 15 && pe <= 25) score += 1;
  else if(pe > 50) score -= 3;

  // 4. 台股籌碼面（0 ~ +20）
  if(inst){
    var fNet = inst.foreign_net || 0;
    var tNet = inst.trust_net || 0;
    if(fNet > 5000) score += 10;
    else if(fNet > 1000) score += 6;
    else if(fNet > 0) score += 3;
    else if(fNet < -5000) score -= 8;
    else if(fNet < -1000) score -= 4;

    if(tNet > 500) score += 7;
    else if(tNet > 0) score += 3;
    else if(tNet < -500) score -= 4;

    if(fNet > 0 && tNet > 0) score += 3; // 法人共識加分
  }

  if(marg){
    var mBal = marg.margin_balance || 1;
    var sBal = marg.short_balance || 0;
    if(sBal / mBal > 0.15) score += 4; // 高融券可能軋空
    if(sBal / mBal < 0.05) score += 2; // 低融資籌碼乾淨
  }

  // Scenario 識別
  var scoreCloses = [];
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;
  var rsiVal = calcRSI([price*(1-chg/100), price]); // 近似
  var adxVal = 25; // 預設中性
  var pos52v = high52>low52?(price-low52)/(high52-low52)*100:50;
  var scenario = detectScenario(
    [price*(1-chg/100*3), price*(1-chg/100*2), price*(1-chg/100), price],
    [avgVol, avgVol, vol, vol],
    rsiVal, adxVal, pos52v, chg>0?1:-1, chg>0?1:-1
  );

  // Alpha 動態權重（根據 Scenario）
  var alphaVal = calcAlpha(q, inst, scenario);
  score += Math.round(alphaVal * 10);

  // 成交量確認（Volume Confirmation）
  var volChange = vol > 0 && avgVol > 0 ? vol/avgVol : 1;
  var volConfirmBonus = (volChange >= 1.5 && chg > 1) ? 8 :
                        (volChange >= 1.5 && chg < -1) ? -5 :
                        (volChange < 0.5) ? -3 : 0;
  score += volConfirmBonus;

  // MA Cross（均線多頭排列，MA10 > MA50 近似）
  var ma10Proxy = price; // 當前價即為最新
  var ma50Proxy = q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh ?
    (q.fiftyTwoWeekLow + q.fiftyTwoWeekHigh) / 2 : price;
  // 用52週位置近似均線位置：pos52>60% = 在均線之上
  if(pos52v > 60) score += 6;   // MA多頭排列
  else if(pos52v < 40) score -= 4; // MA空頭排列

  // Breakout（突破20日高點）
  var chg20 = q.fiftyTwoWeekChangePercent || 0;
  if(chg20 > 0 && pos52v > 90) score += 8; // 突破接近52週高點
  else if(pos52v > 80 && chg > 2) score += 5; // 放量突破高位

  // Kill Switch（來自 Quant v7）：從高點大幅回落 → 強制減分
  var hs52 = q.fiftyTwoWeekHigh || price;
  var dd = hs52 > 0 ? (hs52 - price) / hs52 : 0;
  if(dd > 0.3) score -= 20;
  else if(dd > 0.2) score -= 10;

  return Math.min(100, Math.max(0, Math.round(score)));
}

// 綜合評分 = 即時評分50% + 回測勝率50%
// 回測未完成時只用即時評分
function compositeScore(symbol, liveScore){
  var bt = BT[symbol];
  var status = BT_STATUS[symbol];
  // 回測失敗的股票降低總分（避免排名靠前）
  if(status === 'fail') return {total: liveScore * 0.7, live: liveScore, bt: null, composite: null};
  if(status !== 'done' || !bt) return {total: liveScore, live: liveScore, bt: null, composite: null};
  var s10 = bt.s10 || bt.s5;
  if(!s10) return {total: liveScore, live: liveScore, bt: null, composite: null};
  // 回測分數：勝率轉換成0-100分
  // 勝率70%以上=90分, 60%=70分, 50%=50分, 40%=30分, <40%=10分
  // 回測評分 = 勝率50% + Sharpe30% + 平均報酬20%
  var wrScore = s10.wr>=70?100:s10.wr>=65?85:s10.wr>=60?70:s10.wr>=55?55:s10.wr>=50?40:s10.wr>=45?25:10;
  var sharpeScore = 50; // 預設中性
  if(bt.sharpe !== null && bt.sharpe !== undefined){
    sharpeScore = bt.sharpe>=2?100:bt.sharpe>=1.5?85:bt.sharpe>=1?70:bt.sharpe>=0.5?55:bt.sharpe>=0?40:20;
  }
  var avgRetScore = s10.avg>=5?100:s10.avg>=3?80:s10.avg>=1?60:s10.avg>=0?40:s10.avg>=-2?25:10;
  var btScore = Math.round(wrScore*0.5 + sharpeScore*0.3 + avgRetScore*0.2);
  // 穩定度修正
  var stabAdj = s10.stddev<3?1.0:s10.stddev<6?0.92:0.82;
  btScore = Math.round(btScore * stabAdj);
  var composite = Math.round(liveScore * 0.5 + btScore * 0.5);
  return {total: composite, live: liveScore, bt: btScore, btRaw: s10, composite: composite};
}

// ── 回測逐支處理 ──
var _btQueue = [];
var _btIdx = 0;

function _next(){
  var allStocks = STOCKS.tw.concat(STOCKS.us);
  if(_btIdx === 0){
    _btQueue = allStocks.slice();
    _btIdx = 0;
  }
  if(_btIdx >= _btQueue.length){
    setUpdateBar(false);
    dbg('回測全部完成');
    // 回測完成後重新排序，把有回測結果的股票排前面
    ['tw','us'].forEach(function(mkt){
      if(!STOCKS[mkt]) return;
      STOCKS[mkt].sort(function(a,b){
        var ca = compositeScore(a.symbol, a.score).total;
        var cb = compositeScore(b.symbol, b.score).total;
        return cb - ca;
      });
    });
    render();
    return;
  }
  var s = _btQueue[_btIdx];
  _btIdx++;
  var symbol = s.symbol;
  var ySymbol = s.yS || (symbol.match(/^\d/)? symbol+'.TW' : symbol);
  var doneCount = _btIdx - 1;
  var totalCount = _btQueue.length;
  setUpdateBar(true,
    '回測運算中 ('+doneCount+'/'+totalCount+')',
    Math.round(doneCount/totalCount*100),
    symbol
  );
  BT_STATUS[symbol] = 'loading';
  refreshBTLabel(symbol);

  if(s.q && !s.q._fundFetched){
    s.q._fundFetched = true;
    fetch(WORKER+'/fundamentals?symbol='+encodeURIComponent(ySymbol),{cache:'force-cache'}).then(function(r){return r.json();}).then(function(fd){if(fd&&!fd.error&&s.q){s.q.returnOnEquity=fd.roe;s.q.trailingPE=fd.trailingPE;}}).catch(function(){});
  }
  var url = WORKER+'/yahoo-history?symbol='+encodeURIComponent(ySymbol);
  apiFetch(url, 15000)
    .then(function(data){
      if(!data || !data.hist || data.hist.length < 30){
        dbg(symbol+' 歷史不足');
        BT_STATUS[symbol] = 'fail';
        refreshBTLabel(symbol);
        setTimeout(_next, 50);
        return;
      }
      // 存52週走勢
      s.sparkHist = data.hist.map(function(d){return d.c;});

      var mktHist = symbol.match(/^\d/) ? MARKET_HIST.tw : MARKET_HIST.us;
      var result = runBacktest(data.hist, s.q, mktHist);
      BT[symbol] = result;
      BT_STATUS[symbol] = result ? 'done' : 'fail';
      refreshBTLabel(symbol);
      // 更新走勢圖
      var sparkEl = document.getElementById('sp-'+symbol);
      if(sparkEl && s.sparkHist){
        sparkEl.innerHTML = spark52(s, s.change >= 0);
      }
      setTimeout(_next, 80);
    })
    .catch(function(e){
      dbg(symbol+' 回測錯誤: '+e.message, 'error');
      BT_STATUS[symbol] = 'fail';
      refreshBTLabel(symbol);
      setTimeout(_next, 50);
    });
}

// ── 背景掃描器 ──
var BG_SCAN = {queue:[],idx:0,found:[],running:false,lastScan:0};

function initBgScanQueue(){
  var existing = TW50.map(function(s){return s.symbol;});
  BG_SCAN.queue = TW_UNIVERSE.filter(function(s){return existing.indexOf(s.symbol)<0;});
  // 固定順序掃描（不隨機，確保每次掃同樣的股票）
  BG_SCAN.idx=0;
  dbg('背景掃描: '+BG_SCAN.queue.length+'支待掃');
}

function bgScanNext(){
  if(BG_SCAN.running||!BG_SCAN.queue.length) return;
  if(BG_SCAN.idx>=BG_SCAN.queue.length) BG_SCAN.idx=0;
  BG_SCAN.running=true;
  var batch=BG_SCAN.queue.slice(BG_SCAN.idx,BG_SCAN.idx+8);
  BG_SCAN.idx+=8;
  var ySyms=batch.map(function(s){return s.symbol+'.TW';});
  fetchQuotes(ySyms).then(function(qMap){
    var updated=false;
    batch.forEach(function(s){
      var q=qMap[s.symbol+'.TW'];
      if(!q||!q.regularMarketPrice) return;
      var sc=scoreStock(q,null,null);
      if(sc<75) return;
      var inList=STOCKS.tw.some(function(x){return x.symbol===s.symbol;});
      if(inList) return;
      // 找清單最低分
      var minScore=9999,minIdx=0;
      STOCKS.tw.forEach(function(x,i){if(x.score<minScore){minScore=x.score;minIdx=i;}});
      if(sc<=minScore) return;
      var h52=q.fiftyTwoWeekHigh||q.regularMarketPrice;
      var l52=q.fiftyTwoWeekLow||q.regularMarketPrice;
      var p52=(h52>l52)?(q.regularMarketPrice-l52)/(h52-l52)*100:50;
      var chg=q.regularMarketChangePercent||0;
      var scen=detectScenario([q.regularMarketPrice*(1-chg/200),q.regularMarketPrice],
        [q.averageDailyVolume3Month||0,q.regularMarketVolume||0],50,25,p52,chg>0?1:-1,1);
      var ns=Object.assign({},s,{
        yS:s.symbol+'.TW',price:+q.regularMarketPrice.toFixed(2),
        change:+chg.toFixed(2),score:sc,grade:getGrade(sc),live:true,
        q:q,inst:null,marg:null,scenario:scen,
        sparkHist:q.sparkline||null,fromBgScan:true
      });
      dbg('🔍 '+s.name+'('+sc+'分) 替換 '+STOCKS.tw[minIdx].symbol+'('+minScore+'分)');
      STOCKS.tw[minIdx]=ns;
      STOCKS.tw.sort(function(a,b){
        return compositeScore(b.symbol,b.score).total-compositeScore(a.symbol,a.score).total;
      });
      updated=true;
    });
    BG_SCAN.running=false;
    BG_SCAN.lastScan=Date.now();
    if(updated && S.page==='picks' && S.market==='tw') render();
  }).catch(function(){BG_SCAN.running=false;});
}

function startRefresh(){
  setTimeout(initBgScanQueue, 5000);
  setInterval(function(){
    if(isRefreshing) return;
    refreshCD--;
    if(refreshCD<=0){refreshCD=120;refreshAll();}
    updateLupd();
    // 背景掃描：每30秒掃一批
    if(Date.now()-BG_SCAN.lastScan>30000) bgScanNext();
  }, 1000);
}

function spark52(s, pos){
  var W=90, H=32, p=3;
  var pts;
  var col = pos?'#22c55e':'#ef4444';

  // 優先用真實52週歷史（從報價直接取得）
  if(s && s.sparkHist && s.sparkHist.length > 10){
    var raw = s.sparkHist;
    // sparkHist 可能是數字陣列或 {c} 物件陣列
    var rawPts = typeof raw[0] === 'object' ? raw.map(function(d){return d.c;}) : raw;
    var step = Math.max(1, Math.floor(rawPts.length/40));
    pts = [];
    for(var k=0;k<rawPts.length;k+=step) pts.push(rawPts[k]);
    if(pts[pts.length-1]!==rawPts[rawPts.length-1]) pts.push(rawPts[rawPts.length-1]);
  } else {
    // 回測前：用52週高低點 + 今日價格畫一條有意義的折線
    var q = s ? s.q : null;
    if(q && q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh && q.regularMarketPrice){
      var low=q.fiftyTwoWeekLow, high=q.fiftyTwoWeekHigh, cur=q.regularMarketPrice;
      var chg = q.regularMarketChangePercent || 0;
      // 產生20個點：模擬從年初到現在的走勢
      // 根據52週位置決定整體趨勢形狀
      var posRatio = (cur-low)/(high-low||1); // 0=年低, 1=年高
      pts = [];
      for(var j=0;j<20;j++){
        var t = j/19;
        // 基礎走勢：從某個起點到現在
        var startRatio = posRatio > 0.5 ?
          Math.max(0, posRatio - 0.4) :  // 強勢股：從低點拉上來
          Math.min(1, posRatio + 0.3);   // 弱勢股：從高點跌下來
        var baseVal = low + (high-low)*(startRatio + (posRatio-startRatio)*t);
        // 加入一點波動
        var noise = Math.sin(j*2.3+posRatio*5)*((high-low)*0.03);
        pts.push(baseVal + noise);
      }
      // 最後一個點設為今日收盤
      pts.push(cur);
    } else {
      pts = pos?[18,22,20,26,24,30,28,34,32,37,40,38,44]:[44,42,45,39,41,36,38,32,34,29,26,28,23];
    }
  }

  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1;
  var co=pts.map(function(v,i){return[p+(i/(pts.length-1))*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)];});
  var line=co.map(function(c,i){return(i===0?'M':'L')+c[0]+','+c[1];}).join(' ');
  var fill=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';
  var gid='sg'+(s?s.symbol:'x');
  return'<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+fill+'" fill="url(#'+gid+')" /><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function spark(s, pos){

function renderPicks(){
  var st = STOCKS[S.market];
  var GK=['strong_buy','buy','watch','sell','strong_sell'];
  var GC={strong_buy:'#10b981',buy:'#22c55e',watch:'#f59e0b',sell:'#ef4444',strong_sell:'#dc2626'};
  var GL={strong_buy:'強買',buy:'買入',watch:'觀察',sell:'減碼',strong_sell:'強賣'};
  var filtered = st.filter(function(s){return S.filter==='all'||s.grade.key===S.filter;})
    .sort(function(a,b){
      if(S.sort==='score'){
        var ca=compositeScore(a.symbol,a.score).total;
        var cb=compositeScore(b.symbol,b.score).total;
        // 波動率調整：高波動股評分打折
        var volA = a.q&&a.q.fiftyTwoWeekHigh&&a.q.fiftyTwoWeekLow&&a.q.regularMarketPrice ?
          (a.q.fiftyTwoWeekHigh-a.q.fiftyTwoWeekLow)/(a.q.regularMarketPrice*Math.sqrt(252)) : 0.02;
        var volB = b.q&&b.q.fiftyTwoWeekHigh&&b.q.fiftyTwoWeekLow&&b.q.regularMarketPrice ?
          (b.q.fiftyTwoWeekHigh-b.q.fiftyTwoWeekLow)/(b.q.regularMarketPrice*Math.sqrt(252)) : 0.02;
        var adjA = ca / (1 + volA * 5);
        var adjB = cb / (1 + volB * 5);
        return adjB - adjA;
      }
      return b.change-a.change;
    });

  // 背景掃描進度條（台股時顯示）
  var bgBar = '';
  if(S.market==='tw' && BG_SCAN && BG_SCAN.queue.length>0){
    var bgScanned = Math.min(BG_SCAN.idx, BG_SCAN.queue.length);
    var bgTotal = BG_SCAN.queue.length;
    var bgPct = Math.round(bgScanned/bgTotal*100);
    var bgFound = STOCKS.tw ? STOCKS.tw.filter(function(s){return s.fromBgScan;}).length : 0;
    var bgDone = bgScanned>=bgTotal;
    bgBar = '<div style="background:#0f172a;border-radius:12px;padding:10px 14px;margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      +'<div style="font-size:13px;font-weight:700;color:#60a5fa">🔍 '+(bgDone?'延伸掃描完成':'背景掃描延伸池')+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:#fff">'+bgScanned+'/'+bgTotal+' ('+bgPct+'%)</div></div>'
      +(bgDone?'':('<div style="background:#1e293b;border-radius:99px;height:6px;margin-bottom:5px">'
        +'<div style="background:#3b82f6;width:'+bgPct+'%;height:6px;border-radius:99px"></div></div>'))
      +'<div style="font-size:12px;color:'+(bgFound>0?'#22c55e':'#475569')+'">'
      +(bgFound>0?'✅ 發現 '+bgFound+' 支高分新股加入清單':'掃描中，發現高分股票自動加入清單')+'</div>'
      +'</div>';
  }

  var html = bgBar+'<div class="mkt-row"><button class="mkt-btn'+(S.market==='tw'?' on':'')+'" onclick="setMkt(\'tw\')">🇹🇼 台股</button><button class="mkt-btn'+(S.market==='us'?' on':'')+'" onclick="setMkt(\'us\')">🇺🇸 美股</button></div>';

  // Score board
  html += '<div class="sb"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><div style="font-size:11px;color:#475569;letter-spacing:2px;font-weight:700">'+(S.market==='tw'?'台股自動選股（85支）':'S&P100自動選股')+'</div><div style="font-size:11px;color:#475569">動能+基本面+籌碼</div></div><div class="sg">';
  GK.forEach(function(k){
    html += '<div class="sc'+(S.filter===k?' active':'')+'" style="border-color:'+(S.filter===k?GC[k]:'transparent')+'" onclick="setFilter(\''+ k +'\')">' +
      '<div style="font-size:26px;font-weight:900;color:'+GC[k]+'">'+st.filter(function(s){return s.grade.key===k;}).length+'</div>' +
      '<div style="font-size:12px;color:#475569;margin-top:1px">'+GL[k]+'</div></div>';
  });
  html += '</div></div>';

  // Filter pills
  var FL=[{k:'all',l:'全部'},{k:'strong_buy',l:'強買▲▲'},{k:'buy',l:'買入▲'},{k:'watch',l:'觀察◆'},{k:'sell',l:'減碼▼'},{k:'strong_sell',l:'強賣▼▼'}];
  var FC={strong_buy:'#065f46',buy:'#166634',watch:'#92400e',sell:'#991b1b',strong_sell:'#7f1d1d'};
  var FB={strong_buy:'#ecfdf5',buy:'#f0fdf4',watch:'#fffbeb',sell:'#fff1f2',strong_sell:'#fef2f2'};
  html += '<div class="fr">';
  FL.forEach(function(f){
    var on = S.filter === f.k;
    html += '<button class="pill" style="'+(on?'background:'+(FB[f.k]||'#f1f5f9')+';color:'+(FC[f.k]||'#0f172a')+';border-color:'+(FC[f.k]||'#0f172a'):'')+'" onclick="setFilter(\''+ f.k+'\')">'+f.l+(f.k!=='all'?' ('+st.filter(function(s){return s.grade.key===f.k;}).length+')':'')+'</button>';
  });
  html += '<button class="pill" onclick="toggleSort()">排序:'+(S.sort==='score'?'評分':'漲跌')+'</button></div>';

  // Stock cards
  filtered.forEach(function(s,i){
    var pos = s.change >= 0;
    var q = s.q || {};
    var pos52 = q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh
      ? Math.round((s.price - q.fiftyTwoWeekLow) / (q.fiftyTwoWeekHigh - q.fiftyTwoWeekLow) * 100) : null;

    var cs = compositeScore(s.symbol, s.score);
    var cg = cs.bt!==null ? getGrade(cs.total) : s.grade;

    html += '<div class="card" style="border-left:4px solid '+cg.dot+';animation-delay:'+(i*0.03)+'s" onclick="openModal(\''+ s.symbol +'\',\''+ S.market +'\')">';
    html += '<div style="display:flex;gap:8px;align-items:flex-start">';

    // 三個評分圓圈（回測完成後）/ 一個圓圈（回測中）
    if(cs.bt!==null){
      var btG = getGrade(cs.bt);
      html += '<div style="display:flex;gap:4px;align-items:flex-end">';
      html += '<div style="text-align:center">'+ring(s.score, s.grade, 38)+'<div style="font-size:13px;color:#94a3b8;margin-top:1px">即時</div></div>';
      html += '<div style="text-align:center">'+ring(cs.bt, btG, 38)+'<div style="font-size:13px;color:#94a3b8;margin-top:1px">回測</div></div>';
      html += '<div style="text-align:center">'+ring(cs.total, cg, 42)+'<div style="font-size:13px;font-weight:700;color:'+cg.color+';margin-top:1px">綜合</div></div>';
      html += '</div>';
    } else {
      html += ring(s.score, s.grade, 48);
    }

    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap"><span class="mono" style="font-size:24px;font-weight:900">'+ s.symbol +'</span><span style="font-size:18px;color:#475569">'+ s.name +'</span>'+ bdg(cg) +'</div>';
    var scDef = s.scenario && SCENARIOS[s.scenario] ? SCENARIOS[s.scenario] : null;
    var scTag = '';
    var bgTag = s.fromBgScan ? ' <span style="font-size:11px;font-weight:700;color:#60a5fa;background:#1e3a5f;padding:1px 6px;border-radius:99px">🔍新</span>' : '';
    var smData = SMART_MONEY[s.symbol];
    var smTag = smData ? ' <span style="font-size:11px;font-weight:700;color:#f59e0b;background:#451a03;padding:1px 6px;border-radius:99px">'+smData.tag+'</span>' : '';
    html += '<div style="display:flex;gap:5px;align-items:center;margin-bottom:2px;flex-wrap:wrap">'+ liveTag(s) +'<span style="font-size:13px;color:#94a3b8">'+ s.sector +'</span>'+(pos52!==null?'<span style="font-size:11px;color:'+(pos52>=70?'#16a34a':pos52>=40?'#f59e0b':'#dc2626')+'">52週'+ pos52 +'%</span>':'')+scTag+'</div>';
    html += '<div id="bt-'+s.symbol+'" style="margin-bottom:4px">'+btLabel(s.symbol)+'</div>';

    // 籌碼摘要（台股）
    if(s.inst){
      var fn = s.inst.foreign_net || 0;
      var tn = s.inst.trust_net || 0;
      html += '<div style="display:flex;gap:8px;margin-top:2px">';
      html += '<span style="font-size:11px;color:'+(fn>0?'#16a34a':fn<0?'#dc2626':'#94a3b8')+'">外資'+(fn>0?'+':fn<0?'':'')+fn.toLocaleString()+'張</span>';
      if(tn!==0) html += '<span style="font-size:11px;color:'+(tn>0?'#16a34a':'#dc2626')+'">投信'+(tn>0?'+':'')+tn.toLocaleString()+'張</span>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div style="text-align:right;flex-shrink:0"><div class="mono" style="font-size:22px;font-weight:900">'+ fmt(s,s.price) +'</div><div style="font-size:17px;font-weight:700;color:'+(pos?'#16a34a':'#dc2626')+'">' + (pos?'+':'')+s.change.toFixed(2)+'%</div>'+'<span id="sp-'+s.symbol+'">'+spark52(s, pos)+'</span>'+'</div></div></div>';
  });

  html += '<div style="margin-top:14px;font-size:11px;color:#cbd5e1;text-align:center;line-height:1.8"><span class="live-dot"></span>台灣50+S&P100自動掃描選股<br/>⚠️ 僅供參考，不構成投資建議</div>';
  // TOP5 推薦
  var btDone=(STOCKS[S.market]||[]).filter(function(s){return BT_STATUS[s.symbol]==='done';}).length;
  var btTotal=(STOCKS[S.market]||[]).length;
  if(btDone>=Math.ceil(btTotal*0.5)&&btTotal>0){
    var top5=(STOCKS[S.market]||[]).filter(function(s){
      return BT_STATUS[s.symbol]==='done'&&BT[s.symbol]&&BT[s.symbol].s10&&BT[s.symbol].s10.wr>=50;
    }).map(function(s){
      var cs=compositeScore(s.symbol,s.score);
      var s10=BT[s.symbol].s10;
      var rd=calcRisk(s.q,s.price);
      return {s:s,total:cs.total,wr:s10.wr,avg:s10.avg,tp:rd?rd.takeProfit:null,sl:rd?rd.stopLoss:null};
    }).sort(function(a,b){return b.total-a.total;}).slice(0,5);
    if(top5.length>=3){
      var cur=S.market==='tw'?'NT$':'$';
      html+='<div style="background:#0f172a;border-radius:14px;padding:14px;margin-top:10px">';
      html+='<div style="font-size:14px;font-weight:700;color:#22c55e;margin-bottom:10px">🏆 '+(S.market==='tw'?'台股':'美股')+' TOP5 最強推薦</div>';
      top5.forEach(function(r,i){
        var wrc=r.wr>=65?'#22c55e':r.wr>=55?'#f59e0b':'#94a3b8';
        html+='<div style="background:#1e293b;border-radius:10px;padding:10px 12px;margin-bottom:6px">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
        html+='<div><span style="font-size:16px;font-weight:700;color:#fff">'+(i+1)+'. '+r.s.symbol+'</span> <span style="font-size:12px;color:#64748b">'+r.s.name+'</span></div>';
        html+='<span style="font-size:14px;font-weight:700;color:'+wrc+'">勝率'+r.wr+'%</span></div>';
        if(r.tp&&r.sl){
          html+='<div style="display:flex;gap:6px">';
          ['現價:'+cur+r.s.price.toLocaleString()+':#fff','目標:'+cur+r.tp.toLocaleString()+':#22c55e','停損:'+cur+r.sl.toLocaleString()+':#ef4444'].forEach(function(t){
            var p=t.split(':');
            html+='<div style="flex:1;background:#0f172a;border-radius:7px;padding:5px;text-align:center">';
            html+='<div style="font-size:10px;color:#64748b">'+p[0]+'</div>';
            html+='<div style="font-size:13px;font-weight:700;color:'+p[2]+'">'+p[1]+'</div></div>';
          });
          html+='</div>';
        }
        html+='</div>';
      });
      html+='</div>';
    }
  }
  return html;
}

// ── SECTOR PAGE ──
function renderSector(){
  var st = STOCKS[S.market];
  var sectors = {};
  st.forEach(function(s){
    if(!sectors[s.sector]) sectors[s.sector] = {stocks:[], avg:0};
    sectors[s.sector].stocks.push(s);
  });
  Object.keys(sectors).forEach(function(k){
    sectors[k].avg = Math.round(sectors[k].stocks.reduce(function(a,s){return a+compositeScore(s.symbol,s.score).total;},0)/sectors[k].stocks.length);
  });
  var sorted = Object.keys(sectors).sort(function(a,b){return sectors[b].avg-sectors[a].avg;});

  var html = '<div class="mkt-row"><button class="mkt-btn'+(S.market==='tw'?' on':'')+'" onclick="setMkt(\'tw\')">🇹🇼 台股</button><button class="mkt-btn'+(S.market==='us'?' on':'')+'" onclick="setMkt(\'us\')">🇺🇸 美股</button></div>';
  html += '<div style="background:#0f172a;border-radius:14px;padding:13px;margin-bottom:11px">';
  html += '<div style="font-size:11px;color:#475569;letter-spacing:2px;margin-bottom:9px;font-weight:700">🏭 產業平均評分</div>';
  sorted.forEach(function(k){
    var sec = sectors[k];
    var col = sec.avg>=70?'#10b981':sec.avg>=55?'#22c55e':sec.avg>=40?'#f59e0b':'#ef4444';
      var sTop2=sec.stocks.slice(0,2);
    html += '<div style="margin-bottom:8px">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
    html += '<span style="font-size:15px;font-weight:700;color:#fff">'+ k +'</span>';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    sTop2.forEach(function(ss){
      var cc=ss.change>=0?'#22c55e':'#ef4444';
      html += '<span style="font-size:11px;color:'+cc+'">'+ss.symbol+' '+(ss.change>=0?'+':'')+ss.change.toFixed(1)+'%</span>';
    });
    html += '<span style="font-size:12px;font-weight:700;color:'+ col +'">'+ sec.avg +'</span>';
    html += '</div></div>';
    html += '<div style="height:5px;background:#1e293b;border-radius:99px;overflow:hidden"><div style="width:'+ Math.min(sec.avg,100) +'%;height:100%;background:'+ col +';border-radius:99px"></div></div></div>';
  });
  html += '</div>';
  sorted.forEach(function(k){
    var sec = sectors[k];
    var col = sec.avg>=70?'#10b981':sec.avg>=55?'#22c55e':sec.avg>=40?'#f59e0b':'#ef4444';
    html += '<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span style="background:'+ col +';color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px">'+ k +'</span></div>';
    sec.stocks.forEach(function(s){
      var pos = s.change >= 0;
      html += '<div class="card" style="border-left:4px solid '+ s.grade.dot +';margin-bottom:5px" onclick="openModal(\''+ s.symbol +'\',\''+ S.market +'\')">';
      html += '<div style="display:flex;gap:8px;align-items:center">'+ ring(s.score,s.grade,42);
      html += '<div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="mono" style="font-size:22px;font-weight:900">'+ s.symbol +'</span><span style="font-size:18px;color:#475569">'+ s.name +'</span>'+ bdg(s.grade) +'</div></div>';
      html += '<div style="text-align:right"><div class="mono" style="font-size:22px;font-weight:900">'+ fmt(s,s.price) +'</div><div style="font-size:17px;font-weight:700;color:'+(pos?'#16a34a':'#dc2626')+'">' + (pos?'+':'')+s.change.toFixed(2)+'%</div></div></div></div>';
    });
    html += '</div>';
  });
  return html;
}

// ── FACTOR PAGE ──
function renderFactor(){
  var st = STOCKS[S.market];
  var html = '<div class="mkt-row"><button class="mkt-btn'+(S.market==='tw'?' on':'')+'" onclick="setMkt(\'tw\')">🇹🇼 台股</button><button class="mkt-btn'+(S.market==='us'?' on':'')+'" onclick="setMkt(\'us\')">🇺🇸 美股</button></div>';
  html += '<div style="background:#0f172a;border-radius:14px;padding:13px;margin-bottom:11px"><div style="font-size:11px;color:#475569;letter-spacing:2px;margin-bottom:8px;font-weight:700">⚡ 評分因子權重</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  var factors = S.market==='tw'
    ? [{n:'技術動能',d:'52週位置+成交量+漲跌',w:'~35%'},{n:'年度動能',d:'52週累積漲幅',w:'~15%'},{n:'基本面',d:'ROE+營收+EPS成長',w:'~20%'},{n:'台股籌碼',d:'外資+投信買賣超',w:'~30%'}]
    : [{n:'技術動能',d:'52週位置+成交量+漲跌',w:'~35%'},{n:'年度動能',d:'52週累積漲幅',w:'~15%'},{n:'基本面',d:'ROE+營收+EPS成長',w:'~30%'},{n:'估值',d:'本益比相對水準',w:'~20%'}];
  factors.forEach(function(f){
    html += '<div style="background:#1e293b;border-radius:9px;padding:9px"><div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:3px">'+f.n+'</div><div style="font-size:9px;color:#475569;margin-bottom:4px">'+f.d+'</div><div style="font-size:10px;font-weight:900;color:#22c55e">'+f.w+'</div></div>';
  });
  html += '</div></div>';

  st.slice().sort(function(a,b){return b.score-a.score;}).forEach(function(s){
    var q = s.q || {};
    var pos52 = q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh ? Math.round((s.price-q.fiftyTwoWeekLow)/(q.fiftyTwoWeekHigh-q.fiftyTwoWeekLow)*100) : '-';
    var volR = q.regularMarketVolume && q.averageDailyVolume3Month ? +(q.regularMarketVolume/q.averageDailyVolume3Month).toFixed(1) : '-';
    var chg52 = q.fiftyTwoWeekChangePercent ? +(q.fiftyTwoWeekChangePercent*100).toFixed(1) : '-';
    var roe = q.returnOnEquity ? +(q.returnOnEquity*100).toFixed(1) : '-';

    html += '<div class="card" style="border-left:4px solid '+ s.grade.dot +'" onclick="openModal(\''+ s.symbol +'\',\''+ S.market +'\')">';
    html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">'+ ring(s.score,s.grade,44);
    html += '<div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="mono" style="font-size:22px;font-weight:900">'+ s.symbol +'</span><span style="font-size:18px;color:#475569">'+ s.name +'</span>'+ bdg(s.grade) +'</div></div>';
    html += '<div style="text-align:right"><div class="mono" style="font-size:22px;font-weight:900">'+ fmt(s,s.price) +'</div><div style="font-size:17px;font-weight:700;color:'+(s.change>=0?'#16a34a':'#dc2626')+'">' + (s.change>=0?'+':'')+s.change.toFixed(2)+'%</div></div></div>';
    html += '<div class="g4">';
    [{l:'52週位置',v:(typeof pos52==='number'?pos52+'%':pos52),c:typeof pos52==='number'?(pos52>=70?'#16a34a':pos52>=40?'#f59e0b':'#dc2626'):'#94a3b8'},{l:'量比',v:(typeof volR==='number'?volR+'x':volR),c:typeof volR==='number'?(volR>=2?'#16a34a':volR>=1.2?'#f59e0b':'#94a3b8'):'#94a3b8'},{l:'年度漲幅',v:(typeof chg52==='number'?(chg52>=0?'+':'')+chg52+'%':chg52),c:typeof chg52==='number'?(chg52>=20?'#16a34a':chg52>=0?'#f59e0b':'#dc2626'):'#94a3b8'},{l:'ROE',v:(typeof roe==='number'?roe+'%':roe),c:typeof roe==='number'?(roe>=15?'#16a34a':roe>=8?'#f59e0b':'#94a3b8'):'#94a3b8'}].forEach(function(r){
      html += '<div style="background:#f8fafc;border-radius:7px;padding:6px;text-align:center;border:1px solid #e2e8f0"><div style="font-size:12px;color:#94a3b8;margin-bottom:3px">'+r.l+'</div><div style="font-size:19px;font-weight:700;color:'+r.c+'">'+r.v+'</div></div>';
    });
    html += '</div>';

    // 台股籌碼
    if(s.inst){
      var fn = s.inst.foreign_net || 0;
      var tn = s.inst.trust_net || 0;
      var tot = s.inst.total_net || 0;
      html += '<div style="display:flex;gap:6px;margin-top:7px;padding:7px 9px;background:#f8fafc;border-radius:8px">';
      html += '<div style="flex:1;text-align:center"><div style="font-size:8px;color:#94a3b8">外資</div><div style="font-size:13px;font-weight:700;color:'+(fn>=0?'#16a34a':'#dc2626')+'">' + (fn>=0?'+':'')+fn.toLocaleString()+'</div></div>';
      html += '<div style="flex:1;text-align:center"><div style="font-size:8px;color:#94a3b8">投信</div><div style="font-size:13px;font-weight:700;color:'+(tn>=0?'#16a34a':'#dc2626')+'">' + (tn>=0?'+':'')+tn.toLocaleString()+'</div></div>';
      html += '<div style="flex:1;text-align:center"><div style="font-size:8px;color:#94a3b8">三大法人</div><div style="font-size:13px;font-weight:700;color:'+(tot>=0?'#16a34a':'#dc2626')+'">' + (tot>=0?'+':'')+tot.toLocaleString()+'</div></div>';
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

// ── INFO PAGE ──
function renderDashboard(){
  var fbStats = getFeedbackStats();
  var btCount = Object.keys(BT).length;
  var btDone = Object.keys(BT_STATUS).filter(function(k){return BT_STATUS[k]==='done';}).length;
  var avgSharpe = 0, sharpeCount = 0;
  Object.keys(BT).forEach(function(k){if(BT[k]&&BT[k].sharpe!==null&&BT[k].sharpe!==undefined){avgSharpe+=BT[k].sharpe;sharpeCount++;}});
  if(sharpeCount>0) avgSharpe = +(avgSharpe/sharpeCount).toFixed(2);
  var allStocks = STOCKS[S.market]||[];
  var avgScore = allStocks.length?Math.round(allStocks.reduce(function(a,s){return a+s.score;},0)/allStocks.length):0;
  var strongBuy = allStocks.filter(function(s){return s.grade&&s.grade.key==='strong_buy';}).length;
  var html = '<div style="background:#0f172a;border-radius:16px;padding:16px;margin-bottom:12px">';
  html += '<div style="font-size:13px;color:#475569;letter-spacing:2px;margin-bottom:12px;font-weight:700">📡 系統監控</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  var metrics=[{label:'回測完成',value:btDone+'/'+btCount+'支',color:btDone===btCount?'#22c55e':'#f59e0b'},{label:'平均Sharpe',value:sharpeCount>0?avgSharpe:'計算中',color:avgSharpe>=1?'#22c55e':avgSharpe>=0.5?'#f59e0b':'#ef4444'},{label:'平均即時分',value:avgScore+'分',color:avgScore>=70?'#22c55e':avgScore>=50?'#f59e0b':'#ef4444'},{label:'強買數量',value:strongBuy+'支',color:strongBuy>=5?'#22c55e':strongBuy>=2?'#f59e0b':'#94a3b8'},{label:'預測記錄',value:fbStats?fbStats.total+'筆':'尚無',color:'#60a5fa'},{label:'資料天數',value:fbStats?fbStats.days+'天':'0天',color:'#60a5fa'}];
  metrics.forEach(function(m){html+='<div style="background:#1e293b;border-radius:10px;padding:10px;text-align:center"><div style="font-size:11px;color:#475569;margin-bottom:4px">'+m.label+'</div><div style="font-size:18px;font-weight:900;color:'+m.color+'">'+m.value+'</div></div>';});
  html+='</div>';
  var regimeCounts={TREND_UP:0,TREND_DOWN:0,HIGH_VOL:0,RANGE:0};
  allStocks.forEach(function(s){var bt=BT[s.symbol];if(bt&&bt.regime)regimeCounts[bt.regime]=(regimeCounts[bt.regime]||0)+1;});
  var regimeColors={TREND_UP:'#22c55e',TREND_DOWN:'#ef4444',HIGH_VOL:'#f59e0b',RANGE:'#60a5fa'};
  var regimeLabels={TREND_UP:'上升趨勢',TREND_DOWN:'下跌趨勢',HIGH_VOL:'高量能',RANGE:'盤整'};
  html+='<div style="margin-top:12px"><div style="font-size:11px;color:#475569;margin-bottom:7px">市場環境分布</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
  Object.keys(regimeCounts).forEach(function(k){if(regimeCounts[k]>0){html+='<span style="padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;background:'+regimeColors[k]+'22;color:'+regimeColors[k]+'">'+regimeLabels[k]+' '+regimeCounts[k]+'</span>';}});
  html+='</div></div></div>';
  return html;
}

function renderAccuracy(){
  var h = '';

  // ── TOP5 推薦摘要（即時）──
  var hasBT = Object.keys(BT).length > 0;
  if(hasBT){
    ['tw','us'].forEach(function(mkt){
      var label = mkt==='tw'?'🇹🇼 台股':'🇺🇸 美股';
      var cur = mkt==='tw'?'NT$':'$';
      var top5 = (STOCKS[mkt]||[]).filter(function(s){
        return BT_STATUS[s.symbol]==='done' && BT[s.symbol] && BT[s.symbol].s10 && BT[s.symbol].s10.wr>=50;
      }).map(function(s){
        var cs=compositeScore(s.symbol,s.score);
        var s10=BT[s.symbol].s10;
        var rd=calcRisk(s.q,s.price);
        return {s:s,total:cs.total,wr:s10.wr,avg:s10.avg,n:s10.n,tp:rd?rd.takeProfit:null,sl:rd?rd.stopLoss:null,sharpe:BT[s.symbol].sharpe};
      }).sort(function(a,b){return b.total-a.total;}).slice(0,5);

      if(top5.length===0) return;
      h += '<div style="background:#0f172a;border-radius:14px;padding:14px;margin-bottom:10px">';
      h += '<div style="font-size:14px;font-weight:700;color:#22c55e;margin-bottom:10px">🏆 '+label+' TOP5 最強推薦</div>';
      top5.forEach(function(r,i){
        var wrc=r.wr>=65?'#22c55e':r.wr>=55?'#f59e0b':'#94a3b8';
        var shc=r.sharpe>=1.5?'#22c55e':r.sharpe>=0.8?'#f59e0b':'#ef4444';
        h += '<div style="background:#1e293b;border-radius:10px;padding:11px 12px;margin-bottom:6px">';
        // Header row
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        h += '<div><span style="font-size:16px;font-weight:700;color:#fff">'+(i+1)+'. '+r.s.symbol+'</span>';
        h += ' <span style="font-size:12px;color:#64748b">'+r.s.name+'</span></div>';
        h += '<div style="text-align:right">';
        h += '<div style="font-size:14px;font-weight:700;color:'+wrc+'">勝率 '+r.wr+'%</div>';
        h += '<div style="font-size:11px;color:#475569">'+r.n+'筆歷史</div>';
        h += '</div></div>';
        // Price row
        h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:4px">';
        h += '<div style="background:#0f172a;border-radius:7px;padding:6px;text-align:center">';
        h += '<div style="font-size:10px;color:#64748b">現價</div>';
        h += '<div style="font-size:13px;font-weight:700;color:#fff">'+cur+r.s.price.toLocaleString()+'</div></div>';
        if(r.tp){
          h += '<div style="background:#0f172a;border-radius:7px;padding:6px;text-align:center">';
          h += '<div style="font-size:10px;color:#64748b">目標價</div>';
          h += '<div style="font-size:13px;font-weight:700;color:#22c55e">'+cur+r.tp.toLocaleString()+'</div></div>';
        }
        if(r.sl){
          h += '<div style="background:#0f172a;border-radius:7px;padding:6px;text-align:center">';
          h += '<div style="font-size:10px;color:#64748b">停損</div>';
          h += '<div style="font-size:13px;font-weight:700;color:#ef4444">'+cur+r.sl.toLocaleString()+'</div></div>';
        }
        h += '</div>';
        // Stats row
        h += '<div style="display:flex;gap:8px">';
        h += '<span style="font-size:12px;color:'+(r.avg>=0?'#22c55e':'#ef4444')+'">';
        h += '期望報酬 '+(r.avg>=0?'+':'')+r.avg.toFixed(1)+'%</span>';
        if(r.sharpe!==null) h += '<span style="font-size:12px;color:'+shc+'">Sharpe '+r.sharpe+'</span>';
        h += '</div>';
        h += '</div>';
      });
      h += '</div>';
    });
  } else {
    h += '<div style="background:#1e293b;border-radius:14px;padding:16px;margin-bottom:10px;text-align:center">';
    h += '<div style="font-size:24px;margin-bottom:8px">⏳</div>';
    h += '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px">等待回測完成</div>';
    h += '<div style="font-size:13px;color:#475569">回測完成後顯示 TOP5 推薦</div></div>';
  }

  // ── 歷史預測準確性 ──
  try {
    var existing = JSON.parse(localStorage.getItem('qx_feedback')||'{}');
    var dates = Object.keys(existing).sort().reverse();
    var records = [];
    dates.forEach(function(d){
      Object.keys(existing[d]).forEach(function(sym){
        var r = existing[d][sym];
        if(r.actual && r.ret!==null && r.ret!==undefined){
          records.push({sym:sym,date:d,grade:r.grade||'',ret:r.ret,score:r.score||0,btWr:r.btWr||0});
        }
      });
    });

    if(records.length > 0){
      var buyRecs = records.filter(function(r){return r.grade==='strong_buy'||r.grade==='buy';});
      var totalWr = records.length>0?Math.round(records.filter(function(r){
        return (r.grade==='strong_buy'||r.grade==='buy')?r.ret>0:(r.grade==='strong_sell'||r.grade==='sell')?r.ret<0:r.ret>0;
      }).length/records.length*100):0;
      var buyWr = buyRecs.length>0?Math.round(buyRecs.filter(function(r){return r.ret>0;}).length/buyRecs.length*100):null;

      h += '<div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e2e8f0;margin-bottom:10px">';
      h += '<div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:10px">📊 歷史預測準確性（'+records.length+'筆）</div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
      [{l:'整體準確率',v:totalWr+'%',c:totalWr>=60?'#16a34a':totalWr>=50?'#f59e0b':'#ef4444'},
       {l:'強買勝率',v:buyWr!==null?buyWr+'%':'—',c:buyWr>=60?'#16a34a':'#f59e0b'}
      ].forEach(function(m){
        h += '<div style="background:#f8fafc;border-radius:10px;padding:10px;text-align:center">';
        h += '<div style="font-size:12px;color:#64748b;margin-bottom:4px">'+m.l+'</div>';
        h += '<div style="font-size:22px;font-weight:900;color:'+m.c+'">'+m.v+'</div></div>';
      });
      h += '</div></div>';
    } else {
      h += '<div style="background:#f8fafc;border-radius:14px;padding:14px;border:1px solid #e2e8f0;text-align:center">';
      h += '<div style="font-size:13px;color:#94a3b8">回測完成後自動記錄預測，隔天開啟可查看準確性</div></div>';
    }
  } catch(e){}

  return h;
}

function render(){
  if(!STOCKS[S.market] || !STOCKS[S.market].length) return;
  var a = document.getElementById('app');
  if(S.page==='picks') a.innerHTML = renderPicks();
  else if(S.page==='sector') a.innerHTML = renderSector();
  else if(S.page==='factor') a.innerHTML = renderFactor();
  else if(S.page==='guide') a.innerHTML = renderGuide();
  else if(S.page==='accuracy') a.innerHTML = '<div style="padding:12px">'+renderAccuracy()+'</div>';
  else if(S.page==='smart') a.innerHTML = '<div style="padding:12px">'+renderSmartMoney()+'</div>';
  else a.innerHTML = renderInfo();
}
function setPage(p){S.page=p;document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['picks','sector','factor','info','guide','accuracy','smart'][i]===p);});render();}
function setMkt(m){S.market=m;render();}
function setFilter(f){S.filter=S.filter===f?'all':f;render();}
function toggleSort(){S.sort=S.sort==='score'?'change':'score';render();}

// Init
updateClock();
setInterval(updateClock, 1000);
setInterval(updateLupd, 1000);

// Service Worker
if('serviceWorker' in navigator){
  // 先清除所有舊快取，再註冊新版
  if(caches && caches.keys) {
    caches.keys().then(function(keys){
      keys.forEach(function(k){ if(k!=='quantex-v6.2') caches.delete(k); });
    });
  }
  navigator.serviceWorker.register('./sw.js?v=6.2').then(function(reg){
    if('periodicSync' in reg){
      reg.periodicSync.register('quantex-refresh', {minInterval:120000}).catch(function(){});
    }
  }).catch(function(){});
  navigator.serviceWorker.addEventListener('message', function(e){
    if(e.data&&e.data.type==='BG_REFRESH'&&!isRefreshing) refreshAll();
  });
}

loadAll().catch(function(e){
  var msg = '錯誤: '+(e&&e.message?e.message:String(e));
  try{document.getElementById('ldst').textContent=msg;}catch(ex){}
});
