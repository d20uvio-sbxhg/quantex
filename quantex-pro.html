function updateStrategyWeights(weeklyRes){
  var stratScores={trend:[],meanRev:[],breakout:[]};
  ['1週','2週','3週'].forEach(function(wk){
    (weeklyRes[wk]||[]).forEach(function(r){
      if(r.correct===undefined) return;
      var ret=r.actualRet;
      if(r.trend!==null) stratScores.trend.push(100+ret*(r.trend>0?1:-1));
      if(r.meanRev!==0&&r.meanRev!==null) stratScores.meanRev.push(100+ret*(r.meanRev>0?1:-1));
      if(r.breakout!==0&&r.breakout!==null) stratScores.breakout.push(100+ret*(r.breakout>0?1:-1));
    });
  });
  var scores=[
    computeScore(stratScores.trend.length>3?stratScores.trend:[100,100,100]),
    computeScore(stratScores.meanRev.length>3?stratScores.meanRev:[100,100,100]),
    computeScore(stratScores.breakout.length>3?stratScores.breakout:[100,100,100]),
  ];
  var ws=softmax(scores);
  PERF_ENGINE.strategyWeights={trend:+ws[0].toFixed(3),meanRev:+ws[1].toFixed(3),breakout:+ws[2].toFixed(3)};
}

function runWeeklyValidation(){
  if(PERF_ENGINE.weeklyRunning) return;
  PERF_ENGINE.weeklyRunning=true;
  PERF_ENGINE.weeklyResults=null;
  var cutoffs=[{l:'1週',d:5},{l:'2週',d:10},{l:'3週',d:15},{l:'4週',d:20},{l:'5週',d:25},{l:'6週',d:30}];
  var res={}; cutoffs.forEach(function(c){res[c.l]=[];});
  var stocks=STOCKS.tw.concat(STOCKS.us);
  PERF_ENGINE.weeklyProgress={done:0,total:stocks.length,cur:''};
  render();
  var idx=0;
  function next(){
    if(idx>=stocks.length){
      PERF_ENGINE.weeklyRunning=false;
      PERF_ENGINE.weeklyResults=res;
      updateStrategyWeights(res);
      render(); return;
    }
    var s=stocks[idx++];
    PERF_ENGINE.weeklyProgress.done=idx;
    PERF_ENGINE.weeklyProgress.cur=s.symbol;
    if(idx%5===0&&S.page==='validate') render();
    var ys=s.yS||(s.symbol.match(/^\d/)?s.symbol+'.TW':s.symbol);
    fetch(WORKER+'/yahoo-history?symbol='+encodeURIComponent(ys))
      .then(function(r){return r.json();})
      .then(function(d){
        var hist=d&&d.hist?d.hist:null;
        if(hist&&!s.sparkHist) s.sparkHist=hist.map(function(h){return h.c;});
        cutoffs.forEach(function(c){
          if(!hist||hist.length<c.d+70) return;
          var n=hist.length;
          var hc=hist.slice(0,n-c.d), fut=hist.slice(n-c.d);
          var bt=runBacktest(hc,s.q,null);
          if(!bt||!bt.s10) return;
          var sigs=calcStrategySignals(hc);
          var p0=hc[hc.length-1].c, p10=fut[Math.min(9,fut.length-1)].c;
          var aRet=(p10-p0)/p0*100;
          res[c.l].push({
            sym:s.symbol,isTW:!!s.symbol.match(/^\d/),
            wr:bt.s10.wr,avg:bt.s10.avg,n:bt.s10.n,sharpe:bt.sharpe,
            actualRet:+aRet.toFixed(2),
            predicted:bt.s10.wr>50?'up':'down',
            actual:aRet>0?'up':'down',
            correct:(bt.s10.wr>50?'up':'down')===(aRet>0?'up':'down'),
            trend:sigs?sigs.trend:null,meanRev:sigs?sigs.meanRev:null,breakout:sigs?sigs.breakout:null,
          });
        });
        setTimeout(next,60);
      }).catch(function(){setTimeout(next,60);});
  }
  next();
}

function scoreWeeklyResult(weeklyRes){
  if(!weeklyRes) return -999;
  var totalScore = 0, totalN = 0;
  ['1週','2週','3週'].forEach(function(wk){
    var arr=(weeklyRes[wk]||[]).filter(function(r){return r.correct!==undefined;});
    if(!arr.length) return;
    var acc=arr.filter(function(r){return r.correct;}).length/arr.length;
    var buyArr=arr.filter(function(r){return r.predicted==='up';});
    var buyAcc=buyArr.length?buyArr.filter(function(r){return r.correct;}).length/buyArr.length:0;
    var avgRet=arr.reduce(function(a,r){return a+r.actualRet;},0)/arr.length;
    var shArr=arr.filter(function(r){return r.sharpe&&!isNaN(r.sharpe);});
    var sharpe=shArr.length?shArr.reduce(function(a,r){return a+r.sharpe;},0)/shArr.length:0;
    // Score = accuracy*40 + buyAcc*30 + avgRet*10 + sharpe*20
    var score = acc*40 + buyAcc*30 + avgRet*10 + sharpe*20;
    totalScore += score * arr.length;
    totalN += arr.length;
  });
  return totalN > 0 ? +(totalScore/totalN).toFixed(2) : -999;
}

var _origNextPreset_done = null;  // placeholder


function runPresets(histCache, stocks){
  var idx=0;

  function nextPreset(){
    if(idx>=OPT_PRESETS.length){
      var bestScore=-999;
      AUTO_OPT.results.forEach(function(r,i){
        if(r.stableScore>bestScore){bestScore=r.stableScore; AUTO_OPT.bestIdx=i;}
      });
      AUTO_OPT.running=false; AUTO_OPT.phase='done';
      AUTO_OPT.current=OPT_PRESETS.length;
      // 靜默模式：自動套用最佳方案，不跳轉頁面
      if(AUTO_OPT._silent && AUTO_OPT.bestIdx>=0){
        var _best=AUTO_OPT.results[AUTO_OPT.bestIdx];
        if(_best && _best.stableScore>0){
          Object.assign(BT_PARAMS, _best.params);
          BT={}; BT_STATUS={};
          AUTO_OPT._appliedLabel=_best.label;
          AUTO_OPT._appliedScore=_best.stableScore;
          dbg('自動套用最佳參數: '+_best.label+' (穩定分='+_best.stableScore+')');
          // 重新跑回測
          setTimeout(function(){
            _btIdx=0;
            _next();
          }, 500);
        }
        AUTO_OPT._silent=false;
      }
      if(S.page==='validate') render();
      return;
    }

    var preset=OPT_PRESETS[idx++];
    AUTO_OPT.current=idx;
    if(S.page==='validate') render();

    Object.assign(BT_PARAMS,preset.p);
    BT={}; BT_STATUS={};

    // ── Walk-Forward: 多段滾動驗證 ──
    // 每段：用前T天訓練，預測接下來10天漲跌
    // 滑動間距：60天，至少4段
    var TEST_DAYS = 10;   // 每段預測10天
    var MIN_TRAIN = 200;  // 最少需要200天訓練資料
    var STEP = 60;        // 每60天滑動一次
    var MIN_SEGS = 3;     // 至少3段才算有效

    // 每段結果
    var segResults = []; // [{seg, correct, wr, n}]
    var allPredictions = []; // 全部預測記錄

    stocks.forEach(function(s){
      var hist = histCache[s.symbol];
      if(!hist || hist.length < MIN_TRAIN + TEST_DAYS + STEP) return;
      var n2 = hist.length;

      // 計算可以做幾段
      // 最早訓練結束點：MIN_TRAIN
      // 最晚訓練結束點：n2 - TEST_DAYS
      var trainEnds = [];
      for(var te = MIN_TRAIN; te <= n2-TEST_DAYS; te += STEP){
        trainEnds.push(te);
      }
      if(trainEnds.length < MIN_SEGS) return;

      trainEnds.forEach(function(trainEnd, segIdx){
        var trainData = hist.slice(0, trainEnd);
        var testData  = hist.slice(trainEnd, trainEnd + TEST_DAYS);
        if(testData.length < TEST_DAYS) return;

        var bt = runBacktest(trainData, s.q||{}, null);
        if(!bt||!bt.s10||bt.s10.n<8||bt.confidence==='veryLow') return;

        var p0 = trainData[trainData.length-1].c;
        var p_end = testData[testData.length-1].c;
        var actualRet = +((p_end - p0)/p0*100).toFixed(2);
        var predicted = bt.s10.wr >= 50 ? 'up' : 'down';
        var actual    = actualRet > 0 ? 'up' : 'down';
        var correct   = predicted === actual;

        allPredictions.push({
          sym: s.symbol, seg: segIdx,
          wr: bt.s10.wr, rawWR: bt.s10.rawWR||bt.s10.wr,
          n: bt.s10.n, sharpe: bt.sharpe||null,
          actualRet: actualRet, predicted: predicted, actual: actual,
          correct: correct,
          walkStable: bt.walkForward ? bt.walkForward.stable : null,
        });

        // 記錄每段
        while(segResults.length <= segIdx) segResults.push({correct:0,total:0,ret:0});
        segResults[segIdx].correct += correct ? 1 : 0;
        // Also track rawWR-based accuracy
        var rawPred2 = (bt.s10.rawWR||bt.s10.wr)>=50 ? 'up' : 'down';
        if(!segResults[segIdx].rawCorrect) segResults[segIdx].rawCorrect=0;
        segResults[segIdx].rawCorrect += rawPred2===actual ? 1 : 0;
        segResults[segIdx].total   += 1;
        segResults[segIdx].ret     += actualRet;
      });
    });

    if(!allPredictions.length){
      AUTO_OPT.results.push({
        label:preset.label, params:Object.assign({},preset.p),
        weeklyRes:{}, score:-999, stableScore:-999,
        stability:{allPos:false,consistency:100,minWR:0,maxWR:0,sampleN:0,segs:0},
        weeklyScores:[], error:'無足夠樣本',
      });
      setTimeout(nextPreset,50);
      return;
    }

    // 計算各段勝率
    // segWRs uses raw accuracy from rawWR-based predictions
    var segWRs = segResults
      .filter(function(s2){return s2.total >= 10;})
      .map(function(s2){return s2.rawCorrect!==undefined ? s2.rawCorrect/s2.total : s2.correct/s2.total;});

    var allPos    = segWRs.every(function(w){return w >= 0.50;});
    var minWR     = segWRs.length ? Math.min.apply(null,segWRs) : 0;
    var maxWR     = segWRs.length ? Math.max.apply(null,segWRs) : 0;
    var avgWR     = segWRs.length ? segWRs.reduce(function(a,b){return a+b;})/segWRs.length : 0;
    var consistency = maxWR - minWR; // 越小越穩定

    // 整體統計
    var totalN    = allPredictions.length;
    // Recompute using rawWR direction (more accurate than wilson-adjusted)
    var totalCorr = allPredictions.filter(function(p){
      var rawPred = (p.rawWR||p.wr)>=50 ? 'up' : 'down';
      return rawPred === p.actual;
    }).length;
    var acc       = totalN ? totalCorr/totalN : 0;
    var buyPreds  = allPredictions.filter(function(p){return p.predicted==='up';});
    var buyAcc    = buyPreds.length ? buyPreds.filter(function(p){return p.correct;}).length/buyPreds.length : 0;
    var avgRet    = totalN ? allPredictions.reduce(function(a,p){return a+p.actualRet;},0)/totalN : 0;
    var shArr     = allPredictions.filter(function(p){return p.sharpe&&!isNaN(p.sharpe);});
    var avgSh     = shArr.length ? shArr.reduce(function(a,p){return a+p.sharpe;},0)/shArr.length : 0;

    // 分數：準確率×40 + 買入準確率×30 + 報酬×10 + Sharpe×20
    var rawScore = +(acc*40 + buyAcc*30 + avgRet*10 + avgSh*20).toFixed(1);

    // 穩定性懲罰
    var stabilityPenalty = consistency > 0.20 ? 30
                         : consistency > 0.12 ? 15
                         : consistency > 0.08 ? 5 : 0;
    // 段數不足懲罰
    if(segWRs.length < MIN_SEGS) stabilityPenalty += 20;

    // stableScore: 全段過50%才算穩定；否則用acc打折但不直接-999
    var stableScore;
    if(segWRs.length === 0){
      // 段落不足（過濾條件太嚴，樣本少）→ 用整體acc當基準
      stableScore = acc>=0.55 ? +(rawScore*0.7).toFixed(1)
                  : acc>=0.50 ? +(rawScore*0.5).toFixed(1)
                  : -999;
    } else if(allPos){
      stableScore = +(rawScore - stabilityPenalty).toFixed(1);
    } else if(acc >= 0.50){
      stableScore = +(rawScore - stabilityPenalty - 20).toFixed(1);
    } else {
      stableScore = -999;
    }

    // 整理成週格式供UI顯示
    var weeklyRes = {'Walk-Forward': allPredictions.slice(0,200)};

    AUTO_OPT.results.push({
      label: preset.label,
      params: Object.assign({}, preset.p),
      weeklyRes: weeklyRes,
      score: rawScore,
      stableScore: stableScore,
      stability: {
        allPos: allPos,
        consistency: +(consistency*100).toFixed(0),
        minWR: Math.round(minWR*100),
        maxWR: Math.round(maxWR*100),
        sampleN: totalN,
        segs: segWRs.length,
        segWRs: segWRs.map(function(w){return Math.round(w*100);}),
      },
      weeklyScores: [{
        wk: 'Walk-Forward('+segWRs.length+'段)',
        acc: acc, bAcc: buyAcc, avgR: avgRet, sh: avgSh, n: totalN,
      }],
    });

    setTimeout(nextPreset, 100);
  }
  nextPreset();
}

function computeResults(histCache, testStocks){
  var TEST_HORIZON = 10;  // 預測10天後漲跌
  var STEP = 21;          // 每21天（1個月）一個測試點
  var MIN_TRAIN = 200;    // 最少200天訓練

  var allPreds = [];      // {sym, trainEnd, predicted, actual, ret, correct, quarter}
  var byQuarter = {};     // {2022Q1: {correct, total, ret}}
  var byStock = {};       // {symbol: {correct, total, avgRet}}
  var byTier = {};        // {tier0..5: {correct, total}}
  var bySignalQ = {high:[],med:[],low:[]};  // grouped by signalQuality

  testStocks.forEach(function(s){
    var hist = histCache[s.symbol];
    if(!hist||hist.length < MIN_TRAIN + TEST_HORIZON) return;
    var n = hist.length;

    // Slide window
    for(var te = MIN_TRAIN; te <= n - TEST_HORIZON; te += STEP){
      var trainData = hist.slice(0, te);
      var testData  = hist.slice(te, te + TEST_HORIZON);
      if(testData.length < TEST_HORIZON) continue;

      var bt = runBacktest(trainData, {}, null);
      if(!bt || !bt.s10 || bt.s10.n < 4) continue;

      // Prediction: wr >= 50 = up, else down
      var predicted = bt.s10.wr >= 50 ? 'up' : 'down';
      var p0 = trainData[trainData.length-1].c;
      var p10 = testData[TEST_HORIZON-1].c;
      var ret = +((p10-p0)/p0*100).toFixed(2);
      var actual = ret > 0 ? 'up' : 'down';
      var correct = predicted === actual;

      // Quarter from array index (approximate)
      var daysFromEnd = n - te;
      var approxDate = new Date();
      approxDate.setDate(approxDate.getDate() - daysFromEnd);
      var yr = approxDate.getFullYear();
      var q = Math.ceil((approxDate.getMonth()+1)/3);
      var qKey = yr+'Q'+q;

      allPreds.push({
        sym: s.symbol, name: s.name,
        adx: bt.curADX14||null,
        trainEnd: te, predicted: predicted, actual: actual,
        ret: ret, correct: correct, quarter: qKey,
        wr: bt.s10.wr, rawWR: bt.s10.rawWR||bt.s10.wr,
        n: bt.s10.n, tier: bt.dataTier||0,
        sigQ: bt.signalQuality||0, sharpe: bt.sharpe||0,
      });

      // Group by quarter
      if(!byQuarter[qKey]) byQuarter[qKey]={correct:0,total:0,ret:0,buyCorrect:0,buyTotal:0};
      byQuarter[qKey].total++;
      byQuarter[qKey].ret += ret;
      if(correct) byQuarter[qKey].correct++;
      if(predicted==='up'){
        byQuarter[qKey].buyTotal++;
        if(correct) byQuarter[qKey].buyCorrect++;
      }

      // Group by stock
      if(!byStock[s.symbol]) byStock[s.symbol]={correct:0,total:0,ret:0,name:s.name};
      byStock[s.symbol].total++;
      byStock[s.symbol].ret += ret;
      if(correct) byStock[s.symbol].correct++;

      // Group by tier
      var t = bt.dataTier||0;
      if(!byTier[t]) byTier[t]={correct:0,total:0};
      byTier[t].total++; if(correct) byTier[t].correct++;

      // Group by signal quality
      var sq = bt.signalQuality||0;
      var sqGroup = sq>=50?'high':sq>=20?'med':'low';
      bySignalQ[sqGroup].push({correct:correct,ret:ret});
    }
  });

  // Overall stats
  var total = allPreds.length;
  var correct = allPreds.filter(function(p){return p.correct;}).length;
  var buyPreds = allPreds.filter(function(p){return p.predicted==='up';});
  var buyCorrect = buyPreds.filter(function(p){return p.correct;}).length;
  var avgRet = total ? allPreds.reduce(function(a,p){return a+p.ret;},0)/total : 0;
  var avgBuyRet = buyPreds.length ? buyPreds.reduce(function(a,p){return a+p.ret;},0)/buyPreds.length : 0;

  // Sharpe of predicted trades
  var buyRets = buyPreds.map(function(p){return p.ret;});
  var meanBR = buyRets.length ? buyRets.reduce(function(a,b){return a+b;})/buyRets.length : 0;
  var stdBR = buyRets.length>1 ? Math.sqrt(buyRets.reduce(function(a,r){return a+Math.pow(r-meanBR,2);},0)/buyRets.length) : 1;
  var historicalSharpe = stdBR>0 ? +(meanBR/stdBR).toFixed(2) : null;

  // 盤整市場子集準確率
  var rangePreds = allPreds.filter(function(p){return p.adx!==undefined&&p.adx<18;});
  var trendPreds = allPreds.filter(function(p){return p.adx!==undefined&&p.adx>=25;});
  var rangeAcc = rangePreds.length ? Math.round(rangePreds.filter(function(p){return p.correct;}).length/rangePreds.length*100) : null;
  var trendAcc = trendPreds.length ? Math.round(trendPreds.filter(function(p){return p.correct;}).length/trendPreds.length*100) : null;

  HIST_BT.results = {
    total: total,
    overall: {
      acc: total ? Math.round(correct/total*100) : 0,
      buyAcc: buyPreds.length ? Math.round(buyCorrect/buyPreds.length*100) : 0,
      avgRet: +avgRet.toFixed(2),
      avgBuyRet: +avgBuyRet.toFixed(2),
      sharpe: historicalSharpe,
      n: total, nBuy: buyPreds.length,
    },
    byQuarter: byQuarter,
    byStock: byStock,
    byTier: byTier,
    bySignalQ: {
      high: bySignalQ.high.length ? {acc:Math.round(bySignalQ.high.filter(function(x){return x.correct;}).length/bySignalQ.high.length*100),n:bySignalQ.high.length,avgRet:+(bySignalQ.high.reduce(function(a,x){return a+x.ret;},0)/bySignalQ.high.length).toFixed(1)} : null,
      med:  bySignalQ.med.length  ? {acc:Math.round(bySignalQ.med.filter(function(x){return x.correct;}).length/bySignalQ.med.length*100),n:bySignalQ.med.length,avgRet:+(bySignalQ.med.reduce(function(a,x){return a+x.ret;},0)/bySignalQ.med.length).toFixed(1)} : null,
      low:  bySignalQ.low.length  ? {acc:Math.round(bySignalQ.low.filter(function(x){return x.correct;}).length/bySignalQ.low.length*100),n:bySignalQ.low.length,avgRet:+(bySignalQ.low.reduce(function(a,x){return a+x.ret;},0)/bySignalQ.low.length).toFixed(1)} : null,
    },
    rangeAcc: rangeAcc,
    trendAcc: trendAcc,
    rangeN: rangePreds.length,
    trendN: trendPreds.length,
    runAt: new Date().toLocaleDateString('zh-TW'),
  };
  HIST_BT.running = false;
  HIST_BT.done = HIST_BT.total;
  if(S.page==='validate') render();
}

        h+='<div style="font-size:10px;color:#cbd5e1;margin-bottom:4px">三策略 Softmax 權重</div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">';
        [{l:'趨勢MA',v:sw.trend,c:'#3b82f6'},{l:'均值回歸',v:sw.meanRev,c:'#8b5cf6'},{l:'突破',v:sw.breakout,c:'#f59e0b'}].forEach(function(m){
          h+='<div style="background:#1e293b;border-radius:7px;padding:5px;text-align:center"><div style="font-size:9px;color:#cbd5e1">'+m.l+'</div><div style="font-size:14px;font-weight:700;color:'+m.c+'">'+Math.round(m.v*100)+'%</div></div>';
        });
        h+='</div></div>';
      }
      h+='</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
      h+='<button onclick="BT={};BT_STATUS={};PERF_ENGINE.weeklyResults=null;runWeeklyValidation()" style="padding:10px;background:#334155;color:#cbd5e1;border:none;border-radius:10px;font-size:12px;cursor:pointer">🔄 用新參數重跑</button>';
      h+='<button onclick="PERF_ENGINE.weeklyResults=null;render()" style="padding:10px;background:#1e293b;color:#cbd5e1;border:none;border-radius:10px;font-size:12px;cursor:pointer">↩ 回設定</button>';
      h+='</div>';
    }
  }
  h += '<hr style="border:0;border-top:1px solid #1e293b;margin:20px 0">';
  h += renderGuide();
  return h;
}



</script>
