function apiFetch(url, timeout){
  timeout = timeout || 12000;
  var ctrl = new AbortController();
  var t = setTimeout(function(){ctrl.abort();}, timeout);
  return fetch(url, {cache:'no-store', signal:ctrl.signal})
    .then(function(r){clearTimeout(t); return r.json();})
    .catch(function(){clearTimeout(t); return null;});
}

        d.quoteResponse.result.forEach(function(q){map[q.symbol] = q;});
      }
      return map;
    }).catch(function(){return {};});
}

// 回測引擎
// ══════════════════════════════════════
function avgArr(a){return a.reduce(function(x,y){return x+y;},0)/a.length;}
function emaArr(d,p){var k=2/(p+1),e=d[0];for(var i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}

function calcRSI(closes, period){
  period = period || 14;
  if(closes.length < period+1) return 50;
  var gains=0, losses=0;
  for(var i=closes.length-period; i<closes.length; i++){
    var d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  if(losses===0) return 100;
  return +(100-100/(1+gains/losses)).toFixed(1);
}

function calcVolRatio(vols){
  if(!vols||vols.length<10) return 1;
  var recent=vols[vols.length-1]||0;
  var avg=vols.slice(-10,-1).filter(function(v){return v>0;});
  if(!avg.length) return 1;
  return recent/(avg.reduce(function(a,b){return a+b;})/avg.length);
}

function runBacktest(sym, hist){
  if(!hist || hist.length < 80) return null;
  var closes = hist.map(function(d){return d.c;});
  var vols = hist.map(function(d){return d.v||0;});

  // 計算當前狀態（5個維度）
  var curCloses = closes.slice(-20);
  var curE12 = emaArr(curCloses, 12);
  var curE26 = emaArr(curCloses, 26);
  var curMacd = curE12 - curE26;
  var curMacdNorm = curMacd / closes[closes.length-1] * 100; // 正規化
  var curRSI = calcRSI(closes.slice(-20));
  var curVolR = calcVolRatio(vols);
  var mn52=Math.min.apply(null,closes), mx52=Math.max.apply(null,closes);
  var curPos52 = mx52>mn52?(closes[closes.length-1]-mn52)/(mx52-mn52)*100:50;
  // 近20天動能
  var curMom20 = (closes[closes.length-1]-closes[closes.length-21])/closes[closes.length-21]*100;

  var matches = [];
  for(var i=40; i<hist.length-20; i++){
    var sl = closes.slice(i-20, i);
    var vl = vols.slice(i-10, i);
    var e12 = emaArr(sl, 12);
    var e26 = emaArr(sl, 26);
    var macd = e12 - e26;
    var macdNorm = macd / sl[sl.length-1] * 100;
    var rsi = calcRSI(sl);
    var mn=Math.min.apply(null,closes.slice(0,i));
    var mx=Math.max.apply(null,closes.slice(0,i));
    var pos52 = mx>mn?(sl[sl.length-1]-mn)/(mx-mn)*100:50;
    var mom20 = sl.length>=21?(sl[sl.length-1]-sl[sl.length-21])/sl[sl.length-21]*100:0;
    var volR = calcVolRatio(vl);

    // 計算相似度分數（5個維度各20分，滿分100）
    var sim = 0;
    // 1. MACD正規化方向+幅度（25分）
    if((curMacdNorm>0&&macdNorm>0)||(curMacdNorm<0&&macdNorm<0)) sim+=15;
    if(Math.abs(curMacdNorm-macdNorm)<0.5) sim+=10;
    else if(Math.abs(curMacdNorm-macdNorm)<1.5) sim+=5;
    // 2. RSI區間（25分）
    var rsiZone=function(r){return r>=70?'ob':r>=55?'uh':r>=45?'mid':r>=30?'lh':'os';};
    if(rsiZone(curRSI)===rsiZone(rsi)) sim+=15;
    if(Math.abs(curRSI-rsi)<8) sim+=10;
    else if(Math.abs(curRSI-rsi)<15) sim+=5;
    // 3. 52週位置（20分）
    if(Math.abs(curPos52-pos52)<10) sim+=20;
    else if(Math.abs(curPos52-pos52)<20) sim+=12;
    else if(Math.abs(curPos52-pos52)<30) sim+=5;
    // 4. 近期動能（20分）
    var momZone=function(m){return m>5?'up':m>1?'mup':m>-1?'flat':m>-5?'mdn':'dn';};
    if(momZone(curMom20)===momZone(mom20)) sim+=20;
    else if(Math.abs(curMom20-mom20)<5) sim+=10;
    // 5. 成交量比率（10分）
    if(Math.abs(curVolR-volR)<0.3) sim+=10;
    else if(Math.abs(curVolR-volR)<0.7) sim+=5;

    // 只取相似度>=55分的案例
    if(sim >= 55){
      var f5  = hist[i+4]  ? (hist[i+4].c  - hist[i].c)/hist[i].c*100 : null;
      var f10 = hist[i+9]  ? (hist[i+9].c  - hist[i].c)/hist[i].c*100 : null;
      var f20 = hist[i+19] ? (hist[i+19].c - hist[i].c)/hist[i].c*100 : null;
      matches.push({f5:f5, f10:f10, f20:f20, sim:sim});
    }
  }
  if(matches.length < 5) return null;

  // 加權計算（相似度高的案例給更大權重）
  function weightedStat(arr, key){
    var items=arr.map(function(m){return{v:m[key],w:m.sim};}).filter(function(x){return x.v!==null;});
    if(!items.length)return null;
    var totalW=items.reduce(function(a,b){return a+b.w;},0);
    var wavg=items.reduce(function(a,b){return a+b.v*b.w;},0)/totalW;
    var wr=Math.round(items.filter(function(x){return x.v>0;}).length/items.length*100);
    // 計算標準差（越小代表結果越穩定）
    var variance=items.reduce(function(a,b){return a+Math.pow(b.v-wavg,2);},0)/items.length;
    var stddev=+Math.sqrt(variance).toFixed(1);
    return{wr:wr,avg:+wavg.toFixed(1),n:items.length,stddev:stddev};
  }

  var avgSim=Math.round(matches.reduce(function(a,m){return a+m.sim;},0)/matches.length);
  return{
    s5:weightedStat(matches,'f5'),
    s10:weightedStat(matches,'f10'),
    s20:weightedStat(matches,'f20'),
    n:matches.length,
    avgSim:avgSim
  };
}

// 抓歷史數據並跑回測
async function fetchAndBacktest(symbol, ySymbol){
  BT_STATUS[symbol] = 'loading';
  refreshBTLabel(symbol);
  try{
    var url = WORKER+'/yahoo-history?symbol='+encodeURIComponent(ySymbol);
    var ctrl = new AbortController();
    var t = setTimeout(function(){ctrl.abort();}, 15000);
    var res = await fetch(url, {cache:'no-store', signal:ctrl.signal});
    clearTimeout(t);
    var data = await res.json();
    if(data && data.hist && data.hist.length > 60){
      var result = runBacktest(symbol, data.hist);
      BT[symbol] = result;
      BT_STATUS[symbol] = result ? 'done' : 'fail';
    } else {
      BT_STATUS[symbol] = 'fail';
    }
  }catch(e){
    BT_STATUS[symbol] = 'fail';
  }
  // 回測完成後重新渲染整頁（更新三個圓圈）
  if(S.page==='picks') render();
  else {
    var el = document.getElementById('bt-'+symbol);
    if(el) el.innerHTML = btLabel(symbol);
  }
}

function refreshBTLabel(symbol){

function btLabel(symbol){
  var status = BT_STATUS[symbol];
  var bt = BT[symbol];
  if(!status) return '<span style="font-size:11px;color:#334155">⏸ 等待回測</span>';
  if(status==='loading') return '<span style="font-size:11px;color:#60a5fa;font-style:italic">⏳ 下載歷史數據...</span>';
  if(status==='fail') return '<span style="font-size:11px;color:#94a3b8">📊 樣本不足</span>';
  if(status==='done' && bt){
    var s10 = bt.s10||bt.s5;
    if(!s10) return '<span style="font-size:11px;color:#94a3b8">📊 樣本不足</span>';
    var col = s10.wr>=65?'#16a34a':s10.wr>=55?'#22c55e':s10.wr>=45?'#f59e0b':'#ef4444';
    var dir = s10.avg>=0?'↑':'↓';
    var stable = s10.stddev<3?'🟢':s10.stddev<6?'🟡':'🔴';
    var conf = s10.wr>=65?'高信心':s10.wr>=55?'中信心':s10.wr>=45?'低信心':'反向';
    return '<span style="font-size:12px;font-weight:700;color:'+col+'">✅ '+s10.n+'筆 · 勝率'+s10.wr+'% · '+dir+Math.abs(s10.avg)+'%</span>'
      +'<span style="font-size:9px;color:#94a3b8;margin-left:4px">'+stable+conf+'·相似'+bt.avgSim+'分</span>';
  }
  return '';
}

function scoreStock(q, inst, marg){
  if(!q || !q.regularMarketPrice) return 30;
  var score = 50;
  var price = q.regularMarketPrice || 0;
  var chg = q.regularMarketChangePercent || 0;
  var chg52 = (q.fiftyTwoWeekChangePercent || 0) * 100;
  var vol = q.regularMarketVolume || 1;
  var avgVol = q.averageDailyVolume3Month || 1;
  var low52 = q.fiftyTwoWeekLow || price;
  var high52 = q.fiftyTwoWeekHigh || price;
  var pos52 = high52 > low52 ? (price - low52) / (high52 - low52) * 100 : 50;
  var volR = vol / avgVol;

  // 1. 技術動能（-15 ~ +30）
  score += Math.max(-8, Math.min(8, chg * 2.5));
  if(pos52 >= 70) score += 12;
  else if(pos52 >= 50) score += 6;
  else if(pos52 >= 30) score += 1;
  else score -= 6;
  if(volR >= 2 && chg > 0) score += 10;
  else if(volR >= 1.5 && chg > 0) score += 6;
  else if(volR >= 1.2) score += 2;

  // 2. 年度動能（-8 ~ +8）
  if(chg52 >= 50) score += 8;
  else if(chg52 >= 20) score += 5;
  else if(chg52 >= 0) score += 2;
  else if(chg52 >= -20) score -= 3;
  else score -= 8;

  // 3. 基本面（0 ~ +20）
  var roe = q.returnOnEquity || 0;
  if(roe >= 0.2) score += 7;
  else if(roe >= 0.1) score += 4;
  else if(roe >= 0.05) score += 1;

  var revG = q.revenueGrowth || 0;
  if(revG >= 0.3) score += 6;
  else if(revG >= 0.1) score += 3;
  else if(revG >= 0) score += 1;
  else score -= 2;

  var epsG = q.earningsGrowth || 0;
  if(epsG >= 0.3) score += 5;
  else if(epsG >= 0.1) score += 2;
  else if(epsG < -0.2) score -= 4;

  var pe = q.trailingPE || 0;
  if(pe > 0 && pe < 15) score += 3;
  else if(pe >= 15 && pe <= 25) score += 1;
  else if(pe > 50) score -= 3;

  // 4. 台股籌碼面（0 ~ +20）
  if(inst){
    var fNet = inst.foreign_net || 0;
    var tNet = inst.trust_net || 0;
    if(fNet > 5000) score += 10;
    else if(fNet > 1000) score += 6;
    else if(fNet > 0) score += 3;
    else if(fNet < -5000) score -= 8;
    else if(fNet < -1000) score -= 4;

    if(tNet > 500) score += 7;
    else if(tNet > 0) score += 3;
    else if(tNet < -500) score -= 4;

    if(fNet > 0 && tNet > 0) score += 3; // 法人共識加分
  }

  if(marg){
    var mBal = marg.margin_balance || 1;
    var sBal = marg.short_balance || 0;
    if(sBal / mBal > 0.15) score += 4; // 高融券可能軋空
    if(sBal / mBal < 0.05) score += 2; // 低融資籌碼乾淨
  }

  return Math.min(100, Math.max(0, Math.round(score)));
}

// 綜合評分 = 即時評分50% + 回測勝率50%
// 回測未完成時只用即時評分
function compositeScore(symbol, liveScore){
  var bt = BT[symbol];
  var status = BT_STATUS[symbol];
  if(status !== 'done' || !bt) return {total: liveScore, live: liveScore, bt: null, composite: null};
  var s10 = bt.s10 || bt.s5;
  if(!s10) return {total: liveScore, live: liveScore, bt: null, composite: null};
  // 回測分數：勝率轉換成0-100分
  // 勝率70%以上=90分, 60%=70分, 50%=50分, 40%=30分, <40%=10分
  var btScore = s10.wr>=70?90:s10.wr>=65?80:s10.wr>=60?70:s10.wr>=55?60:s10.wr>=50?50:s10.wr>=45?35:20;
  // 穩定度修正：結果分散打折
  var stabAdj = s10.stddev<3?1.0:s10.stddev<6?0.9:0.8;
  btScore = Math.round(btScore * stabAdj);
  var composite = Math.round(liveScore * 0.5 + btScore * 0.5);
  return {total: composite, live: liveScore, bt: btScore, btRaw: s10, composite: composite};
}

function getGrade(sc){
  if(sc>=82)return{key:'strong_buy',short:'強買▲▲',color:'#065f46',bg:'#ecfdf5',border:'#34d399',dot:'#10b981',rank:5};
  if(sc>=65)return{key:'buy',short:'買入▲',color:'#166534',bg:'#f0fdf4',border:'#86efac',dot:'#22c55e',rank:4};
  if(sc>=48)return{key:'watch',short:'觀察◆',color:'#92400e',bg:'#fffbeb',border:'#fcd34d',dot:'#f59e0b',rank:3};
  if(sc>=30)return{key:'sell',short:'減碼▼',color:'#991b1b',bg:'#fff1f2',border:'#fca5a5',dot:'#ef4444',rank:2};
  return{key:'strong_sell',short:'強賣▼▼',color:'#7f1d1d',bg:'#fef2f2',border:'#f87171',dot:'#dc2626',rank:1};
}

async function loadAll(){
  // Step 1: 抓股價（台股 + 美股並行）
  setStep(1,'🔄','active');
  setProg(5,'抓取台灣50股價...');

  var twSyms = TW50.map(function(s){return s.yS;});
  var usSyms = SP100.map(function(s){return s.yS;});

  // 台股美股同時抓，每批20支
  var twBatches = [], usBatches = [];
  for(var i=0;i<twSyms.length;i+=20) twBatches.push(twSyms.slice(i,i+20));
  for(var j=0;j<usSyms.length;j+=20) usBatches.push(usSyms.slice(j,j+20));

  var twMap = {}, usMap = {};
  var allBatches = twBatches.map(function(b,idx){
    return fetchQuotes(b).then(function(r){
      Object.assign(twMap, r);
      setProg(5 + Math.round((idx+1)/twBatches.length*20), '台股 batch '+(idx+1)+'/'+twBatches.length+' ✓');
    });
  }).concat(usBatches.map(function(b,idx){
    return fetchQuotes(b).then(function(r){
      Object.assign(usMap, r);
      setProg(25 + Math.round((idx+1)/usBatches.length*15), '美股 batch '+(idx+1)+'/'+usBatches.length+' ✓');
    });
  }));

  await Promise.all(allBatches);
  setStep(1,'✅','done');

  // Step 2: 台股籌碼（三大法人 + 融資融券）
  setStep(2,'🔄','active');
  setProg(42,'抓取台股三大法人數據...');

  var instData = {}, margData = {};
  try {
    var twseRes = await Promise.all([fetchInstitution(), fetchMargin()]);
    instData = twseRes[0];
    margData = twseRes[1];
    var instCount = Object.keys(instData).length;
    setProg(60, '籌碼數據 '+instCount+' 支 ✓');
  } catch(e){
    setProg(60,'籌碼數據載入失敗，繼續...');
  }
  setStep(2,'✅','done');

  // Step 3: 評分 + 排序 + 選股
  setStep(3,'🔄','active');
  setProg(65,'多因子評分中...');

  var twScored = TW50.map(function(s){
    var q = twMap[s.yS] || {};
    var price = q.regularMarketPrice || 0;
    var chg = q.regularMarketChangePercent || 0;
    var sc = scoreStock(q, instData[s.symbol], margData[s.symbol]);
    return Object.assign({}, s, {
      price: price ? +price.toFixed(2) : 0,
      change: chg ? +chg.toFixed(2) : 0,
      score: sc, grade: getGrade(sc), live: price > 0,
      q: q, inst: instData[s.symbol], marg: margData[s.symbol]
    });
  }).sort(function(a,b){return b.score - a.score;});

  var usScored = SP100.map(function(s){
    var q = usMap[s.yS] || {};
    var price = q.regularMarketPrice || 0;
    var chg = q.regularMarketChangePercent || 0;
    var sc = scoreStock(q, null, null);
    return Object.assign({}, s, {
      price: price ? +price.toFixed(2) : 0,
      change: chg ? +chg.toFixed(2) : 0,
      score: sc, grade: getGrade(sc), live: price > 0, q: q
    });
  }).sort(function(a,b){return b.score - a.score;});

  // 台股：前17強 + 後3弱（共20）
  STOCKS.tw = twScored.slice(0,17).concat(twScored.slice(-3));
  STOCKS.us = usScored.slice(0,17).concat(usScored.slice(-3));

  setStep(3,'✅','done');
  setProg(100,'完成！載入 '+STOCKS.tw.length+' 台股 + '+STOCKS.us.length+' 美股');

  lastUpdate = new Date();
  updateLupd();
  document.getElementById('loading').classList.add('hide');
  render();
  startRefresh();

  // 背景逐支跑回測（不阻塞UI）
  var allStocks = STOCKS.tw.concat(STOCKS.us);
  (async function(){
    for(var i=0; i<allStocks.length; i++){
      var s = allStocks[i];
      await fetchAndBacktest(s.symbol, s.yS);
      // 每跑完一支稍微等一下，避免爆 Worker 請求
      await new Promise(function(res){setTimeout(res, 300);});
    }
  })();
}

async function refreshAll(){
  if(isRefreshing) return;
  isRefreshing = true; updateLupd();
  var twSyms = TW50.map(function(s){return s.yS;});
  var usSyms = SP100.map(function(s){return s.yS;});
  var twMap = {}, usMap = {}, instData = {}, margData = {};
  var batches = [];
  for(var i=0;i<twSyms.length;i+=20) batches.push(fetchQuotes(twSyms.slice(i,i+20)).then(function(r){Object.assign(twMap,r);}));
  for(var j=0;j<usSyms.length;j+=20) batches.push(fetchQuotes(usSyms.slice(j,j+20)).then(function(r){Object.assign(usMap,r);}));
  batches.push(fetchInstitution().then(function(r){instData=r;}));
  batches.push(fetchMargin().then(function(r){margData=r;}));
  await Promise.all(batches);
  var twScored = TW50.map(function(s){var q=twMap[s.yS]||{};var sc=scoreStock(q,instData[s.symbol],margData[s.symbol]);return Object.assign({},s,{price:+(q.regularMarketPrice||0).toFixed(2),change:+(q.regularMarketChangePercent||0).toFixed(2),score:sc,grade:getGrade(sc),live:!!(q.regularMarketPrice),q:q,inst:instData[s.symbol],marg:margData[s.symbol]});}).sort(function(a,b){return b.score-a.score;});
  var usScored = SP100.map(function(s){var q=usMap[s.yS]||{};var sc=scoreStock(q,null,null);return Object.assign({},s,{price:+(q.regularMarketPrice||0).toFixed(2),change:+(q.regularMarketChangePercent||0).toFixed(2),score:sc,grade:getGrade(sc),live:!!(q.regularMarketPrice),q:q});}).sort(function(a,b){return b.score-a.score;});
  STOCKS.tw = twScored.slice(0,17).concat(twScored.slice(-3));
  STOCKS.us = usScored.slice(0,17).concat(usScored.slice(-3));
  lastUpdate = new Date(); isRefreshing = false; refreshCD = 120; updateLupd(); render();
}

function startRefresh(){
  setInterval(function(){
    if(isRefreshing) return;
    refreshCD--;
    if(refreshCD <= 0){refreshCD = 120; refreshAll();}
    updateLupd();
  }, 1000);
}

function spark(pos){
  var pts=pos?[18,21,19,25,23,29,27,33,31,36,39,37,43]:[43,41,44,38,40,35,37,31,33,28,25,27,22];
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1,W=80,H=24,p=2;
  var co=pts.map(function(v,i){return[p+(i/(pts.length-1))*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)];});

  var fill=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';

function renderPicks(){

  var GL={strong_buy:'強買',buy:'買入',watch:'觀察',sell:'減碼',strong_sell:'強賣'};
  var filtered = st.filter(function(s){return S.filter==='all'||s.grade.key===S.filter;})
    .sort(function(a,b){

    html += '<div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:9px">💹 基本面數據</div>';
    html += '<div class="g4">';
    [{l:'ROE',v:roe!==null?roe+'%':'-',c:roe!==null?(roe>=15?'#16a34a':roe>=8?'#f59e0b':'#94a3b8'):'#94a3b8'},{l:'營收成長',v:revG!==null?(revG>=0?'+':'')+revG+'%':'-',c:revG!==null?(revG>=20?'#16a34a':revG>=0?'#f59e0b':'#dc2626'):'#94a3b8'},{l:'EPS成長',v:epsG!==null?(epsG>=0?'+':'')+epsG+'%':'-',c:epsG!==null?(epsG>=20?'#16a34a':epsG>=0?'#f59e0b':'#dc2626'):'#94a3b8'},{l:'本益比',v:pe!==null?pe+'x':'-',c:pe!==null?(pe<15?'#16a34a':pe<=25?'#f59e0b':'#dc2626'):'#94a3b8'}].forEach(function(r){
      html += '<div style="background:#fff;border-radius:7px;padding:7px;text-align:center;border:1px solid #e2e8f0"><div style="font-size:7px;color:#94a3b8;margin-bottom:2px">'+r.l+'</div><div style="font-size:11px;font-weight:700;color:'+r.c+'">'+r.v+'</div></div>';
    });
    html += '</div></div>';
  }

  // 台股籌碼
  if(s.inst){
    var fn = s.inst.foreign_net || 0;
    var tn = s.inst.trust_net || 0;
    var dn = s.inst.dealer_net || 0;
    var tot = s.inst.total_net || 0;
    html += '<div style="background:#f8fafc;border-radius:13px;padding:13px;margin-bottom:11px;border:1px solid #e2e8f0">';
    html += '<div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:9px">🏦 今日籌碼（張）</div>';
    html += '<div class="g4">';
    [{l:'外資',v:fn,c:fn>=0?'#16a34a':'#dc2626'},{l:'投信',v:tn,c:tn>=0?'#16a34a':'#dc2626'},{l:'自營',v:dn,c:dn>=0?'#16a34a':'#dc2626'},{l:'三大法人',v:tot,c:tot>=0?'#16a34a':'#dc2626'}].forEach(function(r){
      html += '<div style="background:#fff;border-radius:7px;padding:7px;text-align:center;border:1px solid #e2e8f0"><div style="font-size:7px;color:#94a3b8;margin-bottom:2px">'+r.l+'</div><div style="font-size:12px;font-weight:700;color:'+r.c+'">'+(r.v>=0?'+':'')+r.v.toLocaleString()+'</div></div>';
    });
    html += '</div></div>';
  }

  // 操作建議
  html += '<div style="background:'+(isBuy?'#f0fdf4':'#fff1f2')+';border:1.5px solid '+ s.grade.border +';border-radius:13px;padding:13px;margin-bottom:11px">';
  html += '<div style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:'+ s.grade.color +';margin-bottom:9px">'+(isBuy?'💡 操作建議':s.grade.rank<=2?'⚠️ 出場建議':'👁 觀察等待')+'</div>';
  html += '<div class="g2" style="margin-bottom:8px">';
  html += '<div class="pbox" style="background:#f0fdf4;border-color:#bbf7d0"><div style="font-size:8px;color:#94a3b8;margin-bottom:2px">🎯 目標價</div><div class="mono" style="font-size:13px;font-weight:900;color:#16a34a">'+ cur + target.toLocaleString() +'</div><div style="font-size:9px;color:#16a34a">+'+ Math.abs(rew) +'%</div></div>';
  html += '<div class="pbox" style="background:#fff1f2;border-color:#fecaca"><div style="font-size:8px;color:#94a3b8;margin-bottom:2px">🛡 停損價</div><div class="mono" style="font-size:13px;font-weight:900;color:#dc2626">'+ cur + sl.toLocaleString() +'</div><div style="font-size:9px;color:#dc2626">-'+ rsk +'%</div></div>';
  html += '</div></div>';

  document.getElementById('mbody').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}

function closeBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

function updateClock(){
  var now = new Date();
  document.getElementById('cdate').textContent = now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('ctime').textContent = now.toLocaleTimeString('zh-TW',{hour12:false});
}

function render(){
  if(!STOCKS[S.market] || !STOCKS[S.market].length) return;
  var a = document.getElementById('app');
  if(S.page==='picks') a.innerHTML = renderPicks();
  else if(S.page==='sector') a.innerHTML = renderSector();
  else if(S.page==='factor') a.innerHTML = renderFactor();
  else a.innerHTML = renderInfo();
}
function setPage(p){S.page=p;document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['picks','sector','factor','info'][i]===p);});render();}
function setMkt(m){S.market=m;render();}
function setFilter(f){S.filter=S.filter===f?'all':f;render();}
function toggleSort(){S.sort=S.sort==='score'?'change':'score';render();}

// Init
updateClock();
setInterval(updateClock, 1000);
setInterval(updateLupd, 1000);

// Clear old SW caches
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
}
if(window.caches){caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});});}

loadAll();

// iOS PWA
var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
var isStandalone = ('standalone' in navigator) && navigator.standalone;
if(isIOS && !isStandalone){
  setTimeout(function(){
    var g = document.createElement('div');
    g.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:2px solid #3b82f6;padding:14px;z-index:99998;';
    g.innerHTML = '<div style="max-width:640px;margin:0 auto;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700;color:#fff">📲 加入主畫面變成 App</div><div style="font-size:10px;color:#64748b;margin-top:2px">點底部 □↑ → 加入主畫面</div></div><button onclick="this.parentElement.parentElement.remove()" style="background:#1e293b;color:#64748b;border-radius:8px;padding:5px 9px;font-size:12px">✕</button></div>';
    document.body.appendChild(g);
  }, 3000);
}
</script>
