*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f2f8;font-family:"Noto Sans TC","PingFang TC",sans-serif;font-size:20px;color:#0f172a;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
button:active{transform:scale(.97);}
.mono{font-family:Menlo,"JetBrains Mono",monospace;}
#hdr{background:#0f172a;position:sticky;top:0;z-index:100;padding:calc(11px + env(safe-area-inset-top)) 14px 11px;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.tabs{display:flex;background:#1e293b;border-radius:10px;padding:3px;overflow-x:auto;scrollbar-width:none;gap:1px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;flex-shrink:0;padding:10px 4px;min-height:44px;border-radius:8px;font-size:12px;font-weight:700;color:#cbd5e1;background:transparent;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;display:flex;align-items:center;justify-content:center;}
.tab.active{background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.tab:active{opacity:0.6;}
#app{max-width:640px;margin:0 auto;padding:12px 14px calc(70px + env(safe-area-inset-bottom));}#page-content{overflow-y:auto;}
.mkt-row{display:flex;gap:8px;margin-bottom:12px;}
.mkt-btn{flex:1;padding:10px;border-radius:12px;font-size:18px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#cbd5e1;}
.mkt-btn.on{border-color:#2563eb;background:#eff6ff;color:#2563eb;}
.card{background:#fff;border-radius:16px;padding:16px 15px;margin-bottom:8px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.04);cursor:pointer;animation:fadeUp .3s ease both;}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-weight:900;font-size:14px;white-space:nowrap;border:1.5px solid;}
.badge.lg{padding:4px 12px;font-size:12px;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cbar{height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
.cfill{height:100%;border-radius:99px;}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:9000;align-items:flex-end;justify-content:center;}
#modal-bg.open{display:flex;}
#modal{background:#f8fafc;border-radius:22px 22px 0 0;width:100%;max-width:580px;max-height:94vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .3s ease;}
.mhandle{width:40px;height:4px;background:#e2e8f0;border-radius:99px;margin:12px auto 0;}
.mbody{padding:13px 15px calc(40px + env(safe-area-inset-bottom));}
#loading{position:fixed;inset:0;background:#0f172a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#loading.hide{display:none;}
.ld-bar{width:260px;height:5px;background:#1e293b;border-radius:99px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:99px;transition:width .4s ease;}
.step-box{width:260px;display:flex;flex-direction:column;gap:6px;}
.step-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#1e293b;border-radius:10px;border:1px solid #94a3b8;}
.step-row.active{border-color:#22c55e;}
.step-row.done{border-color:#064e3b;background:#052e16;}
.live-dot{display:inline-block;width:5px;height:5px;background:#22c55e;border-radius:99px;margin-right:3px;animation:blink 2s infinite;}
.sb{background:#0f172a;border-radius:16px;padding:13px;margin-bottom:11px;}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.sc{text-align:center;padding:7px 3px;background:#1e293b;border-radius:9px;cursor:pointer;border:1.5px solid transparent;}
.fr{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:9px;scrollbar-width:none;}
.fr::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:5px 12px;border-radius:99px;font-size:16px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#cbd5e1;white-space:nowrap;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.pbox{background:#fff;border-radius:10px;padding:9px 11px;border:1px solid #e2e8f0;text-align:center;}
#pp{position:fixed;top:calc(12px + env(safe-area-inset-top));right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:270px;}
.pc{background:#fff;border-radius:11px;border:1.5px solid;border-left:4px solid;padding:9px 11px;box-shadow:0 4px 18px rgba(0,0,0,.11);animation:slideIn .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>

// API 函式（全部走 Cloudflare Worker）

function apiFetch(url, timeout){
  timeout = timeout || 12000;
  var ctrl = new AbortController();
  var t = setTimeout(function(){ctrl.abort();}, timeout);
  return fetch(url, {cache:'no-store', signal:ctrl.signal})
    .then(function(r){clearTimeout(t); return r.json();})
    .catch(function(){clearTimeout(t); return null;});
}

// 一次抓最多20支股票
function fetchQuotes(ySymbols){
  return apiFetch(WORKER+'/yahoo?symbols='+encodeURIComponent(ySymbols.join(',')))
    .then(function(d){
      var map = {};
      if(d && d.quoteResponse && d.quoteResponse.result){
        d.quoteResponse.result.forEach(function(q){map[q.symbol] = q;});
      }
      return map;
    }).catch(function(){return {};});
}

// 回測引擎
// ══════════════════════════════════════
function avgArr(a){return a.reduce(function(x,y){return x+y;},0)/a.length;}
function emaArr(d,p){var k=2/(p+1),e=d[0];for(var i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}

function calcRSI(closes, period){
  period = period || 14;
  if(closes.length < period+1) return 50;
  var gains=0, losses=0;
  for(var i=closes.length-period; i<closes.length; i++){
    var d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  if(losses===0) return 100;
  return +(100-100/(1+gains/losses)).toFixed(1);
}

function detectScenario(closes, vols, rsi, adx, pos52, macdDir, macdSlope){
  if(!closes || closes.length < 20) return 'TREND_CONTINUATION';
  var n = closes.length;

  // 計算各指標
  var momentum10 = n>=11 ? (closes[n-1]-closes[n-11])/closes[n-11]*100 : 0;
  var recentVols = vols ? vols.slice(-5).filter(function(v){return v>0;}) : [];
  var longVols = vols ? vols.slice(-20).filter(function(v){return v>0;}) : [];
  var volRatio = (recentVols.length && longVols.length) ?
    (recentVols.reduce(function(a,b){return a+b;})/recentVols.length) /
    (longVols.reduce(function(a,b){return a+b;})/longVols.length) : 1;

  // 連漲天數
  var upDays = 0;
  for(var i=n-1;i>n-6&&i>0;i--){
    if(closes[i]>closes[i-1]) upDays++; else break;
  }

  // Scenario 判斷（優先順序重要）
  // 1. 過熱回調（最高優先）
  if(rsi > 75 && volRatio > 2 && upDays >= 3) return 'OVERHEATED';

  // 2. 牛市突破
  if(pos52 > 80 && adx > 25 && macdDir === 1 && macdSlope === 1) return 'BULL_BREAKOUT';

  // 3. 熊市反彈
  if(rsi < 35 && volRatio < 0.8 && pos52 < 30) return 'BEAR_BOUNCE';

  // 4. 盤整突破
  if(adx > 20 && volRatio > 1.8 && Math.abs(momentum10) > 3) return 'RANGE_BREAKOUT';

  // 5. 趨勢延續
  if(macdDir === 1 && macdSlope === 1 && pos52 > 40) return 'TREND_CONTINUATION';

  // 預設：趨勢延續
  return 'TREND_CONTINUATION';
}

// 舊版 Regime（向後相容）
function detectRegime(closes, vols){
  if(!closes || closes.length < 20) return 'UNKNOWN';
  var n = closes.length;
  var vol = vols ? vols.slice(-5).filter(function(v){return v>0;}) : [];
  var avgVol = vol.length ? vol.reduce(function(a,b){return a+b;})/vol.length : 0;
  var momentum = n>=21 ? (closes[n-1]-closes[n-11])/closes[n-11]*100 : 0;
  if(avgVol > 0){
    var longAvgVol = vols ? vols.slice(-20).filter(function(v){return v>0;}) : [];
    var longAvg = longAvgVol.length ? longAvgVol.reduce(function(a,b){return a+b;})/longAvgVol.length : avgVol;
    if(avgVol > longAvg * 1.5) return 'HIGH_VOL';
  }
  if(momentum > 3) return 'TREND_UP';
  if(momentum < -3) return 'TREND_DOWN';
  return 'RANGE';
}

// ══════════════════════════════════════
// Alpha 計算（Quant v7 公式）
// alpha = 0.4×momentum + 0.3×imbalance + 0.2×return + 0.1×volume
// ══════════════════════════════════════
function calcAlpha(q, inst, scenario){
  if(!q || !q.regularMarketPrice) return 0;
  var momentum = (q.fiftyTwoWeekChangePercent||0)*100;
  var ret = q.regularMarketChangePercent||0;
  var vol = q.regularMarketVolume||1;
  var avgVol = q.averageDailyVolume3Month||1;
  var volScore = Math.min(2, vol/avgVol);

  var imbalance = 0;
  if(inst){
    var fn = inst.foreign_net||0;
    var tn = inst.trust_net||0;
    imbalance = Math.max(-1, Math.min(1, (fn+tn)/100000));
  } else {
    imbalance = ret > 0 ? Math.min(1, (volScore-1)*0.5) : Math.max(-1, (1-volScore)*0.5);
  }

  // 動態權重：根據 Scenario 調整
  var w = scenario && SCENARIOS[scenario] ?
    SCENARIOS[scenario].alphaWeights :
    {momentum:0.4, imbalance:0.3, ret:0.2, vol:0.1};

  var alpha = w.momentum*(momentum/50) + w.imbalance*imbalance + w.ret*(ret/5) + w.vol*(volScore-1);
  return Math.max(-1, Math.min(1, alpha));
}

// ══════════════════════════════════════
// Sharpe Ratio 計算（回測結果品質評估）
// ══════════════════════════════════════
function calcSharpe(returns){
  if(!returns || returns.length < 5) return null;
  var n = returns.length;
  var mean = returns.reduce(function(a,b){return a+b;})/n;
  var variance = returns.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/n;
  var stddev = Math.sqrt(variance);
  if(stddev === 0) return null;
  // 年化 Sharpe（假設10天報酬，年化252/10=25.2）
  var annualFactor = Math.sqrt(25.2);
  return +(mean/stddev*annualFactor).toFixed(2);
}

// ══════════════════════════════════════
// 流動性評估（Liquidity Score）
// 低流動性股票評分打折
// ══════════════════════════════════════
function calcLiquidity(q){
  if(!q) return 0.5;
  var price = q.regularMarketPrice||0;
  var vol = q.regularMarketVolume||0;
  var avgVol = q.averageDailyVolume3Month||1;
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;

  // 近似 spread = 52週範圍 / 當前價格（越小越有流動性）
  var spread = price > 0 ? (high52-low52)/price : 1;

  // 成交量流動性（日均量越大越好）
  var volLiq = Math.min(1, avgVol/1000000); // 百萬股為基準

  // 台股用成交金額近似（張數×價格）
  var isTW = price < 10000; // 台股股價通常較低
  if(isTW) volLiq = Math.min(1, (avgVol*price*1000)/1000000000); // 10億為基準

  // 綜合流動性 0-1
  var liquidity = volLiq * 0.7 + (1-Math.min(1,spread)) * 0.3;
  return +liquidity.toFixed(2);
}

// ══════════════════════════════════════
// Portfolio Allocation（建議倉位比例）
// weight = alpha / volatility（Quant v7）
// ══════════════════════════════════════
function calcPositionLegacy(alphaVal, riskData, liquidity, totalScore){
  if(!riskData || riskData.dailyVol === 0) return null;
  var vol = riskData.dailyVol/100; // 轉回小數
  if(vol === 0) return null;

  // 基礎倉位（alpha / vol）
  var rawWeight = alphaVal / (vol + 0.001);

  // 正規化到 0-1
  var weight = Math.max(0, Math.min(1, (rawWeight + 2) / 4));

  // 流動性折扣（低流動性股票建議降低倉位）
  weight = weight * (0.5 + liquidity * 0.5);

  // 評分調整（綜合分越高，倉位越高）
  weight = weight * (totalScore / 100);

  // 建議倉位百分比（最高20%，避免過度集中）
  var pct = Math.min(20, Math.max(1, Math.round(weight * 20)));

  return {
    pct: pct,
    liquidity: liquidity,
    rawAlpha: +alphaVal.toFixed(3)
  };
}

// ══════════════════════════════════════
// 最佳進出場預測引擎
// ══════════════════════════════════════
function predictEntryExit(hist, scenario, curPrice){
  if(!hist || hist.length < 30 || !scenario || !SCENARIOS[scenario]) return null;
  var cfg = SCENARIOS[scenario];
  var closes = hist.map(function(d){return d.c;});
  var n = closes.length;

  // 找最佳進場點：在回測匹配點後幾天進場勝率最高
  var entryStats = [0,1,2,3,4,5].map(function(delay){
    var wins=0, total=0;
    for(var i=20;i<n-cfg.holdDays-delay;i++){
      var entryPrice = closes[i+delay];
      var exitPrice = closes[i+delay+cfg.holdDays];
      if(entryPrice && exitPrice){
        total++;
        if(exitPrice > entryPrice) wins++;
      }
    }
    return total>5 ? {delay:delay, wr:Math.round(wins/total*100), n:total} : null;
  }).filter(Boolean);

  // 找最佳進場延遲
  var bestEntry = entryStats.reduce(function(best, cur){
    return (!best || cur.wr > best.wr) ? cur : best;
  }, null);

  // 最佳出場點：找最大化風險調整報酬的持有天數
  var holdStats = [3,5,7,10,15,20].map(function(days){
    var returns=[];
    for(var i=20;i<n-days;i++){
      if(closes[i] && closes[i+days]){
        returns.push((closes[i+days]-closes[i])/closes[i]*100);
      }
    }
    if(returns.length < 5) return null;
    var avg = returns.reduce(function(a,b){return a+b;})/returns.length;
    var std = Math.sqrt(returns.reduce(function(a,b){return a+Math.pow(b-avg,2);},0)/returns.length);
    var sharpe = std>0 ? avg/std*Math.sqrt(252/days) : 0;
    var wr = returns.filter(function(r){return r>0;}).length/returns.length*100;
    return {days:days, avg:+avg.toFixed(1), wr:Math.round(wr), sharpe:+sharpe.toFixed(2)};
  }).filter(Boolean);

  var bestExit = holdStats.reduce(function(best, cur){
    return (!best || cur.sharpe > best.sharpe) ? cur : best;
  }, null);

  // 動態停損/目標價（基於波動度 + Scenario 設定）
  var recentVol = 0;
  if(n >= 20){
    var rets = [];
    for(var j=n-20;j<n;j++) if(closes[j]&&closes[j-1]) rets.push((closes[j]-closes[j-1])/closes[j-1]);
    var meanR = rets.reduce(function(a,b){return a+b;})/rets.length;
    var varR = rets.reduce(function(a,b){return a+Math.pow(b-meanR,2);},0)/rets.length;
    recentVol = Math.sqrt(varR);
  }

  var dynSL = Math.max(cfg.slPct, recentVol * 2.5);  // 至少2.5倍日波動
  var dynTP = Math.max(cfg.tpPct, dynSL * 2.5);       // 風報比至少1:2.5

  return {
    scenario: scenario,
    scenarioName: cfg.name,
    bestEntryDelay: bestEntry ? bestEntry.delay : 0,
    bestEntryWR: bestEntry ? bestEntry.wr : null,
    bestHoldDays: bestExit ? bestExit.days : cfg.holdDays,
    bestHoldSharpe: bestExit ? bestExit.sharpe : null,
    bestHoldWR: bestExit ? bestExit.wr : null,
    dynSL: +dynSL.toFixed(3),
    dynTP: +dynTP.toFixed(3),
    stopLoss: +(curPrice*(1-dynSL)).toFixed(2),
    takeProfit: +(curPrice*(1+dynTP)).toFixed(2),
    entrySignal: cfg.entrySignal,
    recentVol: +(recentVol*100).toFixed(2)
  };
}

// ══════════════════════════════════════
// Risk Engine（動態停損/目標價）
// 參考 Quant Trading System v7
// ══════════════════════════════════════
function calcRisk(q, score){
  var price = q ? (q.regularMarketPrice||0) : 0;
  if(!price) return null;

  // 計算 VaR 近似（用52週波動度）
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;
  var annualVol = (high52-low52)/(price*Math.sqrt(252)||1);
  var dailyVol = annualVol/Math.sqrt(252);
  var var95 = price * dailyVol * 1.645; // 95% VaR

  // Drawdown 估算（從52週高點跌落幅度）
  var drawdown = high52 > 0 ? (high52-price)/high52 : 0;

  // Risk 狀態
  var riskState = 'OK';
  if(drawdown > 0.25) riskState = 'DELEVER';  // 從高點跌超過25%
  else if(dailyVol > 0.04) riskState = 'HIGH_RISK'; // 日波動>4%

  // 動態停損（根據波動度調整）
  var slPct = Math.max(0.05, Math.min(0.15, dailyVol * 10));
  var tpPct = slPct * (score>=70 ? 2.5 : score>=50 ? 2.0 : 1.5);

  return {
    riskState: riskState,
    drawdown: +(drawdown*100).toFixed(1),
    var95: +var95.toFixed(2),
    dailyVol: +(dailyVol*100).toFixed(1),
    slPct: +slPct.toFixed(3),
    tpPct: +tpPct.toFixed(3),
    stopLoss: +(price*(1-slPct)).toFixed(2),
    takeProfit: +(price*(1+tpPct)).toFixed(2),
  };
}

function calcADX(closes, period){
  period = period || 14;
  if(closes.length < period*2) return 25; // default neutral
  var trs=[];
  for(var i=1;i<closes.length;i++){
    var h=closes[i], l=closes[i]*0.985, pc=closes[i-1];
    trs.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
  }
  var dx=[];
  for(var j=period;j<trs.length;j++){
    var atr=trs.slice(j-period,j).reduce(function(a,b){return a+b;})/period;
    if(atr===0){dx.push(0);continue;}
    var ph=Math.max.apply(null,closes.slice(j-period+1,j+1));
    var pl=Math.min.apply(null,closes.slice(j-period+1,j+1));
    var pdm=Math.max(ph-closes[j-1],0);
    var ndm=Math.max(closes[j-1]-pl,0);
    var pdi=pdm/atr*100, ndi=ndm/atr*100;
    var sum=pdi+ndi;
    dx.push(sum===0?0:Math.abs(pdi-ndi)/sum*100);
  }
  if(!dx.length) return 25;
  return +(dx.slice(-period).reduce(function(a,b){return a+b;})/Math.min(period,dx.length)).toFixed(1);
}

function calcVolRatio(vols){
  if(!vols||vols.length<10) return 1;
  var recent=vols[vols.length-1]||0;
  var avg=vols.slice(-10,-1).filter(function(v){return v>0;});
  if(!avg.length) return 1;
  return recent/(avg.reduce(function(a,b){return a+b;})/avg.length);
}

function getMktState(mktHist, dateIdx){
  // 取得某日的大盤狀態：趨勢方向 + 動能
  if(!mktHist || mktHist.length < 20) return null;
  var idx = Math.min(dateIdx, mktHist.length-1);
  if(idx < 20) return null;
  var closes = mktHist.slice(Math.max(0,idx-60), idx+1).map(function(d){return d.c;});
  var cur = closes[closes.length-1];
  var ma20 = closes.slice(-20).reduce(function(a,b){return a+b;})/20;
  var ma60 = closes.length>=60 ? closes.reduce(function(a,b){return a+b;})/closes.length : ma20;
  var mom20 = closes.length>=21 ? (cur-closes[closes.length-21])/closes[closes.length-21]*100 : 0;
  return {
    aboveMa20: cur > ma20,
    aboveMa60: cur > ma60,
    mom20: mom20,
    trend: cur>ma20&&ma20>ma60?'bull': cur<ma20&&ma20<ma60?'bear':'flat'
  };
}

var REGIME_PARAMS = {

  bear:   {simThreshold:65,minMatches:10,momBonus:1.2,mktFilter:0.5},

function getEffectiveBTParams(){
  if(typeof getMarketRegime==='undefined') return BT_PARAMS;
  var regime=getMarketRegime();
  var p=Object.assign({},BT_PARAMS);
  if(regime.dist>0.05&&REGIME_PARAMS.bull) Object.assign(p,REGIME_PARAMS.bull);

// 動態出場天數（根據波動度和情境計算最佳持倉天數）
function calcDynamicExitDays(hist, scenario){
  if(!hist || hist.length < 20) return 10;
  var closes = hist.map(function(h){return h.c ? h.c : h;});
  var n = closes.length;
  var rets = [];
  for(var i=1; i<Math.min(21,n); i++){
    rets.push((closes[n-i]-closes[n-i-1])/closes[n-i-1]);
  }
  var mean = rets.reduce(function(a,b){return a+b;},0)/rets.length;
  var vol = Math.sqrt(rets.reduce(function(a,r){return a+Math.pow(r-mean,2);},0)/rets.length);
  // 目標波動預算4.5% / 日波動 = 天數
  var dynDays = Math.round(Math.pow(0.045/(vol+0.001), 2));
  // 情境調整
  if(scenario==='BULL_BREAKOUT')        dynDays=Math.round(dynDays*1.3);
  else if(scenario==='BEAR_BOUNCE')     dynDays=Math.round(dynDays*0.7);
  else if(scenario==='HOT_ROTATION')    dynDays=Math.round(dynDays*0.8);
  return Math.max(5, Math.min(20, dynDays));
}


function calcATR(hist, period){
  period=period||14;
  if(!hist||hist.length<period+1) return null;
  var trs=[];
  for(var i=1;i<hist.length;i++){
    var h2=hist[i].h||hist[i].c*1.005, l2=hist[i].l||hist[i].c*0.995, pc=hist[i-1].c;
    trs.push(Math.max(h2-l2,Math.abs(h2-pc),Math.abs(l2-pc)));
  }
  return trs.slice(-period).reduce(function(a,b){return a+b;})/period;
}

function getMarketRegime(){
  var hist = MARKET_HIST.tw && MARKET_HIST.tw.length > 200
    ? MARKET_HIST.tw
    : MARKET_HIST.us;

  if(!hist || hist.length < 50){
    return {multiplier: 1.0, regime: 'unknown', dist: 0};
  }

  var closes = hist.map(function(h){return h.c;});
  var n = closes.length;
  var cur = closes[n-1];

  // MA200（或用MA50如果數據不足）
  var period = Math.min(200, n-1);
  var ma = closes.slice(-period).reduce(function(a,b){return a+b;})/period;
  var dist = (cur - ma) / ma;  // 正=多頭，負=空頭

  // 市場乘數（對應 Python: market_multiplier = 1.0 if condition>0 else 0.3）
  var mult;
  if(dist > 0.05)       mult = 1.0;   // 強多頭：正常信心
  else if(dist > 0)     mult = 0.85;  // 弱多頭：略降
  else if(dist > -0.05) mult = 0.55;  // 弱空頭：降至55%
  else                  mult = 0.30;  // 強空頭：打三折（對應 Python 0.3）

  return {
    multiplier: mult,
    regime: dist>0.05?'強多頭':dist>0?'弱多頭':dist>-0.05?'弱空頭':'強空頭',
    dist: +dist.toFixed(4),
    ma: +ma.toFixed(2),
  };
}

function runBacktest(hist, q, mktHist){
  if(!hist || hist.length < 50) return null;
  // P1: 盤整市場預測無意義（驗證顯示盤整市準確率48%≈隨機）
  // 只是記錄在return值中，不強制return null（讓UI顯示警告）
  var _bp=getEffectiveBTParams();
  var closes = hist.map(function(d){return d.c;});
  var vols   = hist.map(function(d){return d.v||0;});
  var hasVol = vols.filter(function(v){return v>0;}).length > vols.length*0.5;
  var n = closes.length;

  // ── 當前狀態 ──
  var curCloses  = closes.slice(-20);
  var curE12     = emaArr(curCloses, 12);

    var alphaMR = -histZscore / 2;  // zscore高=均值回歸看跌，反向

    // Alpha加總 (對應 0.4*flow + 0.3*mom + 0.3*mr)
    var rawAlpha = 0.4*alphaFlow + 0.3*alphaMom + 0.3*alphaMR;
    // tanh壓縮到 -1~1，避免極端值
    var alphaVal = Math.tanh(rawAlpha);

    // ── 現在的 alpha（用來判斷方向一致性）──
    var curAlphaFlow = (function(){
      var vs=vols.slice(-10).filter(function(v){return v>0;});
      var avg=vs.length?vs.reduce(function(a,b){return a+b;})/vs.length:1;
      var vr=(vols[n-1]||0)/avg;
      var ret=(closes[n-1]-closes[n-2])/closes[n-2];
      return vr*ret*10;
    })();
    var curAlphaMom = curMom10/5;
    var curMean20 = closes.slice(-20).reduce(function(a,b){return a+b;})/20;
    var curStd20 = (function(){
      var sl2=closes.slice(-20);
      var m=curMean20;
      return Math.sqrt(sl2.reduce(function(a,x){return a+Math.pow(x-m,2);},0)/sl2.length)||1;
    })();
    var curZscore = (closes[n-1]-curMean20)/curStd20;
    var curAlphaMR = -curZscore/2;
    var curAlpha = Math.tanh(0.4*curAlphaFlow + 0.3*curAlphaMom + 0.3*curAlphaMR);

    // ── sim = alpha相似性權重 ──
    // 核心：alpha方向一致（同為正或同為負）才是有意義的參考點
    // 權重 = |alpha| 越大代表信號越強，對統計影響越大
    var alphaSameSide = (alphaVal>0)===(curAlpha>0);
    var sim = Math.round(500 + alphaVal * 300);  // 範圍 200-800

    // 額外：特徵方向一致性加分（不排除，只加權）
    var _rsiZone=function(r){return r<40?'L':r>60?'H':'M';};
    var _posZone=function(p){return p<33?'L':p>66?'H':'M';};
    var histCombo=_rsiZone(rsi)+'_'+(macdDir>0?'B':'S')+'_'+_posZone(pos52);
    var curCombo =_rsiZone(curRSI)+'_'+(curMacdDir>0?'B':'S')+'_'+_posZone(curPos52);
    if(histCombo===curCombo) sim+=200;  // 同特徵組合大幅加權
    if(curMA.bull===histMABull) sim+=50;
    if(curRelStr>0&&histRelStr>0||curRelStr<0&&histRelStr<0) sim+=30;

    // ── Regime 係數 ──
    var regimeMult=(curRegime===histRegime)?1.0:(curRegime.replace('_UP','').replace('_DOWN','')===histRegime.replace('_UP','').replace('_DOWN',''))?0.7:Math.max(0.5,_bp.regimeMult);
    // Beta조정: 跨Regime高Beta股折扣
    if(curRegime!==histRegime&&betaEst>1.5){
      regimeMult=Math.max(0.50,regimeMult*0.85);
    }
    var mktNorm=Math.round(mktSim/30*100);
    // 若無大盤歷史，不用大盤相似度（避免懲罰）
    var hasMktData = mktHist && mktHist.length > 50;
    var totalSim = hasMktData
      ? Math.round((sim*0.8+mktNorm*0.2)*regimeMult)
      : Math.round(sim*regimeMult);

    // ── 新增: 趨勢強度加權（ADX > 25 加分）──
    if(adxH>35) totalSim=Math.round(totalSim*1.15);
    else if(adxH>25) totalSim=Math.round(totalSim*1.08);

    // ── 過濾條件 ──
    if(_bp.mktFilter>0&&mktHist&&mktHist.length>i+5){
      var mktChg=(mktHist[i].c-mktHist[Math.max(0,i-3)].c)/mktHist[Math.max(0,i-3)].c*100;
      if(mktChg<-_bp.mktFilter) continue;
    }
    if(_bp.killSwitch>0){
      var hiPeak=Math.max.apply(null,closes.slice(Math.max(0,i-250),i));
      if(hiPeak>0&&(closes[i-1]-hiPeak)/hiPeak*100<-_bp.killSwitch) continue;
    }
    // volConfirm: alpha模式下改為加權，不硬排除
    // (volConfirm仍保留在BT_PARAMS用於優化器，但不再作為continue條件)
    if(_bp.maxRally>0){
      var rallyDays=0;
      for(var ri=i-1;ri>Math.max(0,i-_bp.maxRally-1);ri--){
        if(closes[ri]>closes[ri-1]) rallyDays++; else break;
      }
      if(rallyDays>=_bp.maxRally) continue;
    }

    // ── RSI 頂背離過濾 ──
    if(histRSIDivergence===-1) continue;
    // ── 隔夜缺口開高走低過濾（僅有真實量能時才過濾）──
    if(hasVol && histIsGapFade) continue;

    // ── 新增: 阻力位過濾（接近前高阻力，排除）──
    // 阻力位：強阻力（2個以上前高）才過濾
    if(nearSupport&&nearSupport.strongResistance) continue;
    // B5: 外資/投信 - 歷史點若有籌碼資料則用（台股）
    // 不直接過濾（歷史沒有籌碼），但記錄當前籌碼作為加分
    

    if(totalSim>=adaptiveThreshold){
      var ed=_bp.exitDays>0?_bp.exitDays:calcDynamicExitDays(hist.slice(0,i),null);
      var f5 =hist[i+4]  ?(hist[i+4].c  -hist[i].c)/hist[i].c*100:null;
      var f10=hist[i+ed-1]?(hist[i+ed-1].c-hist[i].c)/hist[i].c*100:null;
      var f20=hist[i+19] ?(hist[i+19].c -hist[i].c)/hist[i].c*100:null;

      // 動態出場
      // C10+D11: 真實出場模擬（目標價/止損/時間 哪個先到）
      var atr_i=histATR||closes[i]*0.02;
      // NEW-3: 動態R倍數（強趨勢4R, 正常3R, 弱勢2R）
      var rMult=adxH>=35?4:adxH>=25?3:2;
      var stopPrice  =closes[i]-1.0*atr_i;
      var targetPrice=closes[i]+rMult*atr_i;

      var trailHigh=closes[i];
      var dynExit=null, mfe=0, mae=0; // max favorable/adverse excursion
      for(var ex=1;ex<=25&&i+ex<n;ex++){
        var cp=closes[i+ex];
        if(cp>trailHigh) trailHigh=cp;
        var excur=(cp-closes[i])/closes[i]*100;
        if(excur>mfe) mfe=excur;
        if(excur<mae) mae=excur;
        var trailStop=trailHigh*0.92;
        // Exit conditions
        if(cp<=stopPrice){dynExit={days:ex,ret:excur,reason:'stop'};break;}
        if(cp>=targetPrice){dynExit={days:ex,ret:excur,reason:'target'};break;}
        var chandATR=i>=15?calcATR(hist.slice(Math.max(0,i-22),i),14)||closes[i]*0.02:closes[i]*0.02;
        var chandExit=trailHigh-3*chandATR;
        if(cp<=chandExit&&ex>=3){dynExit={days:ex,ret:excur,reason:'chandelier'};break;}
        if(cp<=trailStop&&ex>=5){dynExit={days:ex,ret:excur,reason:'trail'};break;}
      }
      if(!dynExit&&i+ed-1<n) dynExit={days:ed,ret:(closes[i+ed-1]-closes[i])/closes[i]*100,reason:'time'};
      var txCost=(!hasVol||n<50)?0.10:0.585; // 僅記錄，在dynStat層扣除
      var mfePct=+mfe.toFixed(1), maePct=+mae.toFixed(1);

      var maSlice=closes.slice(Math.max(0,i-50),i);
      var ma10v=maSlice.length>=10?maSlice.slice(-10).reduce(function(a,b){return a+b;})/10:closes[i-1];
      var ma50v=maSlice.length>=20?maSlice.reduce(function(a,b){return a+b;})/maSlice.length:closes[i-1];
      var maCross=ma10v>=ma50v?1:-1;
      var high20=Math.max.apply(null,closes.slice(Math.max(0,i-20),i));
      var isBreakout=closes[i-1]>high20*0.98;

      // ── 新增: 成交量突破確認加分 ──
      var volBreakBonus = (isBreakout && hasVol && vols[i-1]>0) ? (function(){
        var avgV15=vols.slice(Math.max(0,i-15),i).filter(function(v){return v>0;});
        var av=avgV15.length?avgV15.reduce(function(a,b){return a+b;})/avgV15.length:0;
        return av>0&&vols[i-1]>av*1.5?1.1:1.0;
      })() : 1.0;

      // 動量加成
      var momentumBonus=(curMom5>0&&mom5>0)?_bp.momBonus:(curMom5<0&&mom5<0)?_bp.momBonus:(2-_bp.momBonus);

      // ── 新增: 樣本時間衰減（近期樣本權重更高）──
      var daysAgo=n-i;
      var timeDecay=Math.exp(-daysAgo/180); // 180天半衰期

      // ── 新增: RSI 底背離加分 ──
      var rsiBonusMult=1.0;
      if(histRSIDivergence===1){
        var pr2=closes.slice(Math.max(0,i-15),i);
        var pRng=pr2.length>1?(Math.max.apply(null,pr2)-Math.min.apply(null,pr2))/Math.max.apply(null,pr2)*100:0;
        var rsiArr2=[];for(var ri2=Math.max(1,i-15);ri2<i;ri2++) rsiArr2.push(calcRSI(closes.slice(Math.max(0,ri2-14),ri2+1))||50);
        var rRng=rsiArr2.length>1?Math.max.apply(null,rsiArr2)-Math.min.apply(null,rsiArr2):0;
        var divStr=Math.max(0,pRng-rRng/5);
        rsiBonusMult=divStr>5?1.20:divStr>2?1.15:1.10;
      }

      // ── 新增: 支撐位附近加分 ──
      var supportBonus = nearSupport&&nearSupport.nearSupport ? 1.1 : 1.0;

      // 最終樣本權重
      var finalWeight = Math.round(totalSim * momentumBonus * volBreakBonus * rsiBonusMult * supportBonus * (0.5+timeDecay*0.5));

      // ATR標準化報酬
      var f10v=hist[i+ed-1]?(hist[i+ed-1].c-hist[i].c)/hist[i].c*100:null;
      var f10ATR=f10v!==null&&histATR>0?+(f10v/(histATR/hist[i].c*100)).toFixed(2):null;
      // ATR標準化報酬
      var f10v2=hist[i+ed-1]?(hist[i+ed-1].c-hist[i].c)/hist[i].c*100:null;
      var f10ATR=f10v2!==null&&histATR>0?+(f10v2/(histATR/hist[i].c*100)).toFixed(2):null;
      matches.push({
        f5:f5, f10:f10, f20:f20, f10ATR:f10ATR,
        mfe:mfePct, mae:maePct, exitReason:dynExit?dynExit.reason:'time',
        sim:Math.round(totalSim),
        weight:finalWeight,
        regime:histRegime,
        volConfirm:(volTrend===1&&mom10>0)||(volTrend===-1&&mom10<0),
        dynExit:dynExit, maCross:maCross, isBreakout:isBreakout,
        bbPos:histBBpos, rsiDiv:histRSIDivergence, nearSupport:nearSupport,
        timeDecay:+timeDecay.toFixed(3),
      });
    }
  }

  // Tier已在上方定義
  if(matches.length < dynMinMatches) return null;

  function weightedStat(arr, key){
    var items=arr.map(function(m){return{v:m[key],w:m.weight||m.sim};}).filter(function(x){return x.v!==null;});
    if(!items.length) return null;
    var totalW=items.reduce(function(a,x){return a+x.w;},0);
    if(!totalW) return null;
    var wavg=items.reduce(function(a,x){return a+x.v*x.w;},0)/totalW;
    var std=Math.sqrt(items.reduce(function(a,x){return a+Math.pow(x.v-wavg,2)*x.w;},0)/totalW);
    var n=items.length;
    var wWins=items.filter(function(x){return x.v>0;}).reduce(function(a,x){return a+x.w;},0);
    var rawWR=totalW>0?wWins/totalW:0;
    var rawWRc=items.filter(function(x){return x.v>0;}).length/n;
    var _dummy_replaced=0;
    var wilson=(rawWRc+z*z/(2*n)-z*Math.sqrt(rawWRc*(1-rawWRc)/n+z*z/(4*n*n)))/(1+z*z/n);
    var z=dynWilsonZ||1.645;
    var wilson=(rawWRc+z*z/(2*n)-z*Math.sqrt(rawWRc*(1-rawWRc)/n+z*z/(4*n*n)))/(1+z*z/n);
    var confLvl=dynConfLabel||(n>=30?'high':n>=15?'medium':n>=8?'low':'veryLow');
    var wilsonAdj=confLvl==='veryHigh'?rawWR:confLvl==='high'?Math.max(wilson,rawWR*0.92):confLvl==='veryLow'?wilson*0.80:confLvl==='low'?wilson*0.90:wilson;
    var adjustedWR=Math.round(Math.min(rawWR,wilsonAdj)*100);
    return{wr:adjustedWR,rawWR:Math.round(rawWR*100),avg:+wavg.toFixed(1),std:+std.toFixed(1),n:n,confidence:confLvl};
  }

  var s10=weightedStat(matches,'f10');
  var s5 =weightedStat(matches,'f5');
  var s20=weightedStat(matches,'f20');

  // 動態出場統計
  var dynExitMatches=matches.filter(function(m){return m.dynExit&&typeof m.dynExit.ret==='number'&&!isNaN(m.dynExit.ret);});
  var dynStat=null;
  if(dynExitMatches.length>=5){
    try{
      var _txC=(!hasVol)?0.10:0.585;
      var dr=dynExitMatches.map(function(m){return m.dynExit.ret-_txC;});
      var dd=dynExitMatches.map(function(m){return m.dynExit.days;});
      dynStat={avgRet:+(dr.reduce(function(a,b){return a+b;})/dr.length).toFixed(1),avgDays:Math.round(dd.reduce(function(a,b){return a+b;})/dd.length),wr:Math.round(dr.filter(function(r){return r>0;}).length/dr.length*100),n:dr.length};
    }catch(e){}
  }

  // Regime / Vol / MA / Breakout 統計
  // D13: 出場原因統計
  var exitReasonStats={stop:0,target:0,trail:0,time:0};
  matches.forEach(function(m){if(m.exitReason) exitReasonStats[m.exitReason]=(exitReasonStats[m.exitReason]||0)+1;});
  var mfeStat=null;
  if(matches.length>=5){
    var mfeVals=matches.map(function(m){return m.mfe||0;});
    var maeVals=matches.map(function(m){return m.mae||0;});
    mfeStat={avgMFE:+(mfeVals.reduce(function(a,b){return a+b;})/mfeVals.length).toFixed(1),
              avgMAE:+(maeVals.reduce(function(a,b){return a+b;})/maeVals.length).toFixed(1),
              hitTarget:exitReasonStats.target,hitStop:exitReasonStats.stop};
  }
  var regimeStats={};
  matches.forEach(function(m){
    if(!regimeStats[m.regime]) regimeStats[m.regime]={wins:0,total:0};
    regimeStats[m.regime].total++;
    if(m.f10>0) regimeStats[m.regime].wins++;
  });
  // Regime-Specific: 只用同Regime樣本
  var sameRegimeMatches=matches.filter(function(m){return m.regime===curRegime;});
  var sameRegimeStat=sameRegimeMatches.length>=8?weightedStat(sameRegimeMatches,'f10'):null;
  if(sameRegimeStat&&sameRegimeMatches.length>=12&&s10){
    var blendWR=Math.round(sameRegimeStat.wr*0.65+s10.wr*0.35);
    s10=Object.assign({},s10,{wr:blendWR,n:sameRegimeMatches.length,blended:true});
  }
  var vcM=matches.filter(function(m){return m.volConfirm;});
  var volConfirmStat=vcM.length>=3?weightedStat(vcM,'f10'):null;
  var maBullMatches=matches.filter(function(m){return m.maCross===1;});
  var maBullStat=maBullMatches.length>=3?weightedStat(maBullMatches,'f10'):null;
  var breakoutMatches=matches.filter(function(m){return m.isBreakout;});
  var breakoutStat=breakoutMatches.length>=3?weightedStat(breakoutMatches,'f10'):null;

  // ── 新增統計 ──
  // BB 位置統計（下軌附近勝率 vs 上軌附近）
  var bbLowMatches=matches.filter(function(m){return m.bbPos<0.25;});
  var bbLowStat=bbLowMatches.length>=3?weightedStat(bbLowMatches,'f10'):null;
  // RSI 底背離統計
  var rsiDivMatches=matches.filter(function(m){return m.rsiDiv===1;});
  var rsiDivStat=rsiDivMatches.length>=3?weightedStat(rsiDivMatches,'f10'):null;
  // 支撐位統計
  var supportMatches=matches.filter(function(m){return m.nearSupport&&m.nearSupport.nearSupport;});
  var supportStat=supportMatches.length>=3?weightedStat(supportMatches,'f10'):null;
  // 時間衰減：近期樣本勝率
  var recentMatches=matches.filter(function(m){return m.timeDecay>0.5;});
  var recentStat=recentMatches.length>=5?weightedStat(recentMatches,'f10'):null;

  // Sharpe
  // Ensemble: 3視角投票
  var v1=matches.filter(function(m){return m.maCross===1;});
  var v2=matches.filter(function(m){return m.rsiDiv===1||(m.bbPos!==undefined&&m.bbPos<0.25);});
  var v3=matches.filter(function(m){return m.isBreakout;});
  var vs1=v1.length>=5?weightedStat(v1,'f10'):null;
  var vs2=v2.length>=5?weightedStat(v2,'f10'):null;
  var vs3=v3.length>=5?weightedStat(v3,'f10'):null;
  var evotes=0,etotal=0;
  if(vs1){etotal++;if(vs1.wr>=50)evotes++;}
  if(vs2){etotal++;if(vs2.wr>=50)evotes++;}
  if(vs3){etotal++;if(vs3.wr>=50)evotes++;}
  var ensembleStat={v1:vs1,v2:vs2,v3:vs3,votes:evotes,total:etotal,
    agree:etotal>=2&&evotes===etotal,conflict:etotal>=2&&evotes===0};

  var sharpe=null;
  if(s10&&s10.std>0) sharpe=+(s10.avg/s10.std).toFixed(2);

  // Signal Quality
  // D12: 校準因子（需>=20次驗證才啟用）
  var calibrationFactor=1.0;
  if(PERF_ENGINE&&PERF_ENGINE.recentAcc!==null&&(PERF_ENGINE.validationCount||0)>=20){
    var btAvgWR=s10?s10.rawWR||s10.wr:60;
    if(btAvgWR>0){
      calibrationFactor=Math.min(1.1,Math.max(0.9,PERF_ENGINE.recentAcc/(btAvgWR/100)));
      if(s10) s10.wr=Math.round(s10.wr*calibrationFactor);
    }
  }
  var signalQuality=10;  // 基礎分10，避免中性股票無故低分
  if(s10){
    if(s10.wr>=65) signalQuality+=40; else if(s10.wr>=55) signalQuality+=20; else if(s10.wr<45) signalQuality-=20;
    if(sharpe>=1.5) signalQuality+=30; else if(sharpe>=0.8) signalQuality+=15;
    if(s10.n>=50)      signalQuality+=30;
    else if(s10.n>=30) signalQuality+=20;
    else if(s10.n>=15) signalQuality+=10;
    else if(s10.n<8)   signalQuality-=40;
    else               signalQuality-=20;
    if(dynStat&&dynStat.wr>=60) signalQuality+=10;
    if(maBullStat&&maBullStat.wr>=65) signalQuality+=10;
    if(rsiDivStat&&rsiDivStat.wr>=65) signalQuality+=10;
    if(bbLowStat&&bbLowStat.wr>=65) signalQuality+=5;
    var avgSim=Math.round(matches.reduce(function(a,m){return a+m.sim;},0)/matches.length);
    if(avgSim>=80) signalQuality+=10;
    if(ensembleStat.agree) signalQuality+=15;
    if(ensembleStat.conflict) signalQuality-=15;
    // 盤整市場適度扣分（不要太重，大多數股票都有盤整期）
    if(isRangeMarket) signalQuality-=20;  // 盤整市場信號不可靠（ADX<20）
    if(curRegime==='TREND_DOWN'||curRegime==='BEAR') signalQuality-=15;
    if(bearMarket) signalQuality-=10;
  }


  // ── Walk-Forward 驗證（3段獨立勝率）──
  var walkForwardStat=(function(){
    if(matches.length<15) return null;
    var sorted=matches.slice().sort(function(a,b){return a.timeDecay-b.timeDecay;});
    var sz=Math.floor(sorted.length/3), segs=[];
    for(var seg=0;seg<3;seg++){
      var ws=weightedStat(sorted.slice(seg*sz,(seg+1)*sz),'f10');
      if(ws) segs.push(ws.wr);
    }
    if(segs.length<2) return null;
    var minWR=Math.min.apply(null,segs), maxWR=Math.max.apply(null,segs);
    return{segments:segs,allPositive:segs.every(function(w){return w>=50;}),
           minWR:minWR,consistency:maxWR-minWR,stable:maxWR-minWR<20&&segs.every(function(w){return w>=50;})};
  })();
  // ── ATR標準化統計 ──
  var atrNormStat=(function(){
    var items=matches.filter(function(m){return m.f10ATR!==null;});
    if(items.length<5) return null;
    var vals=items.map(function(m){return m.f10ATR;});
    var mean=vals.reduce(function(a,b){return a+b;})/vals.length;
    return{mean:+mean.toFixed(2),wr:Math.round(vals.filter(function(v){return v>0;}).length/vals.length*100),n:vals.length};
  })();

  return{
    s5:s5, s10:s10, s20:s20,
    confidence:s10?s10.confidence||'medium':'veryLow',
    // 穩定性門檻：n>=50 + WF穩定 + 三方向一致
    stable: (function(){
      if(!s10||s10.n<50) return false;
      // Walk-Forward各段差距<20%
      var wf=walkForwardStat;
      if(wf&&wf.segWRs&&wf.segWRs.length>=3){
        var mx=Math.max.apply(null,wf.segWRs),mn2=Math.min.apply(null,wf.segWRs);
        if(mx-mn2>20) return false;
        var goodSegs=wf.segWRs.filter(function(w){return w>=52;}).length;
        if(goodSegs<Math.floor(wf.segWRs.length/2)) return false;
      }
      return true;
    })(),
    curCombo:curCombo,
    curAlpha:+curAlphaFinal.toFixed(3),
    curML:+curMLPred.toFixed(3),
    curSignal:+curSignal.toFixed(3),
    isRangeMarket:isRangeMarket,
    curADX14:+curADX14.toFixed(1),
    dataTier:dataTier,
    histLen:histLen,
    n:matches.length,
    avgSim:Math.round(matches.reduce(function(a,m){return a+m.sim;},0)/matches.length),
    mktFiltered:!!(mktHist&&mktHist.length>0),
    sharpe:sharpe,
    regime:curRegime,
    regimeStats:regimeStats,
    sameRegimeStat:sameRegimeStat,
    ensembleStat:ensembleStat,
    volConfirmStat:volConfirmStat,
    dynStat:dynStat,
    maBullStat:maBullStat,
    breakoutStat:breakoutStat,
    bbLowStat:bbLowStat,
    rsiDivStat:rsiDivStat,
    supportStat:supportStat,
    recentStat:recentStat,
    signalQuality:signalQuality,
    curBBpos:+curBB.pos.toFixed(2),
    curRSIDiv:curRSIDivergence,

    walkForward:walkForwardStat,
    atrNormStat:atrNormStat,

    calibration:+calibrationFactor.toFixed(2),
  };
}



async function fetchAndBacktest(symbol, ySymbol, isTW){
  dbg('fetchBT start: '+symbol);
  BT_STATUS[symbol] = 'loading';
  refreshBTLabel(symbol);
  var allStocks2 = STOCKS.tw.concat(STOCKS.us);
  var doneCount = Object.keys(BT_STATUS).filter(function(k){return BT_STATUS[k]==='done'||BT_STATUS[k]==='fail';}).length;
  var totalCount = allStocks2.length;
  setUpdateBar(true,'回測運算中 ('+doneCount+'/'+totalCount+')', Math.round(doneCount/totalCount*100), '正在分析 '+symbol+'...');
  try{
    var url = WORKER+'/yahoo-history?symbol='+encodeURIComponent(ySymbol);
    dbg('抓取 '+symbol+'...');
    // 用 Promise.race 確保 timeout 一定觸發
    var fetchPromise = fetch(url,{cache:'no-store'}).then(function(r){return r.json();});
    var timeoutPromise = new Promise(function(resolve){setTimeout(function(){resolve(null);},10000);});
    var data = await Promise.race([fetchPromise, timeoutPromise]);
    if(!data){
      dbg('⏱ '+symbol+' 超時10s', 'warn');
      BT_STATUS[symbol] = 'fail';
    } else {
      dbg(symbol+' hist='+(data.hist?data.hist.length:0)+'筆');
      if(data.hist && data.hist.length > 35){
        var mktHist = isTW ? MARKET_HIST.tw : MARKET_HIST.us;
        var sObj = allStocks2.find(function(x){return x.symbol===symbol;});
        // 存52週走勢
        if(sObj) sObj.sparkHist = data.hist.map(function(d){return d.c;});
        var result = runBacktest(data.hist, sObj?sObj.q:null, mktHist);
        BT[symbol] = result;
        BT_STATUS[symbol] = result ? 'done' : 'fail';
        if(!result){
          dbg('❌ '+symbol+' 無匹配 hist='+data.hist.length, 'warn');
        } else {
          dbg('✅ '+symbol+' n='+(result.s10?result.s10.n:'?')+' 勝率'+(result.s10?result.s10.wr:'?')+'%');
        }
        var hist250 = data.hist.slice(-250);
        var sparkData = hist250.map(function(d){return d.c;});
        ['tw','us'].forEach(function(m){
          for(var si=0;si<STOCKS[m].length;si++){
            if(STOCKS[m][si].symbol===symbol){STOCKS[m][si].sparkHist=sparkData;break;}
          }
        });
      } else {
        dbg('⏭ '+symbol+' 歷史不足='+(data.hist?data.hist.length:0), 'warn');
        BT_STATUS[symbol] = 'fail';
      }
    }
  }catch(e){
    dbg('💥 '+symbol+' 錯誤:'+(e.message||e), 'error');
    BT_STATUS[symbol] = 'fail';
  }
  var allStocks3 = STOCKS.tw.concat(STOCKS.us);
  var doneCount2 = Object.keys(BT_STATUS).filter(function(k){return BT_STATUS[k]==='done'||BT_STATUS[k]==='fail';}).length;
  if(doneCount2 >= allStocks3.length) setUpdateBar(false);
  // 回測完成後重新渲染整頁（更新三個圓圈）
  if(S.page==='picks') render();
  else {
    var el = document.getElementById('bt-'+symbol);
    if(el) el.innerHTML = btLabel(symbol);
  }
}

function compositeScore(symbol, liveScore){
  var bt = BT[symbol];
  var status = BT_STATUS[symbol];
  if(status === 'fail') return {total: liveScore, live: liveScore, bt: null, composite: null, sampleFail: true};
  if(status !== 'done' || !bt) return {total: liveScore, live: liveScore, bt: null, composite: null};
  var s10 = bt.s10 || bt.s5;
  if(!s10) return {total: liveScore, live: liveScore, bt: null, composite: null};
  var sqBonus = bt.signalQuality ? Math.min(bt.signalQuality * 0.1, 20) : 0;
  var stableBonus = (bt.stable===true && s10 && s10.n>=50) ? 8 : 0;
  // 用 rawWR 計算 wrScore（顯示保守值，但評分用原始值避免過度打折）
  var _rawWR = s10.rawWR || s10.wr;
  // wrScore: 50%已具意義，65%以上才是高信心
  var wrScore = _rawWR>=70?100:_rawWR>=65?90:_rawWR>=60?78:_rawWR>=55?65:_rawWR>=52?58:_rawWR>=50?50:_rawWR>=45?30:10;
  // dataTier bonus: 資料越長越可信
  var tierBonus = bt.dataTier ? [0,0,2,4,6,8][bt.dataTier] : 0;
  // ensemble bonus
  var ensembleBonus = (bt.ensembleStat&&bt.ensembleStat.agree) ? 5
                    : (bt.ensembleStat&&bt.ensembleStat.conflict) ? -8 : 0;
  sqBonus += tierBonus + ensembleBonus;
  var sharpeScore = 50;
  if(bt.sharpe !== null && bt.sharpe !== undefined){
    sharpeScore = bt.sharpe>=2?100:bt.sharpe>=1.5?85:bt.sharpe>=1.0?70:bt.sharpe>=0.5?50:bt.sharpe>=0?30:10;
  }
  var avgRetScore = s10.avg>=5?100:s10.avg>=3?80:s10.avg>=1?60:s10.avg>=0?40:s10.avg>=-2?20:0;
  var btScore = Math.min(100, Math.round(wrScore*0.5 + sharpeScore*0.3 + avgRetScore*0.2) + sqBonus + (stableBonus||0));
  // Dynamic weights from PERF_ENGINE
  var liveW = PERF_ENGINE.liveWeight || 0.5;
  var btW   = PERF_ENGINE.btWeight   || 0.5;
  if(PERF_ENGINE.health === 'BAD')  { liveW=0.7; btW=0.3; }
  else if(PERF_ENGINE.health === 'RISKY') { liveW=0.6; btW=0.4; }
  // 截面排名：同市場相對強弱（文獻支持：Cross-sectional momentum）
  var crossSection = 0;
  try{
    var _isTW = /^\d/.test(symbol);
    var _peers = (_isTW ? STOCKS.tw : STOCKS.us) || [];
    var _peersWithBT = _peers.filter(function(st){
      return BT[st.symbol] && BT[st.symbol].s10;
    });
    if(_peersWithBT.length >= 5){
      var _ranked = _peersWithBT.map(function(st){
        return {sym:st.symbol, avg:BT[st.symbol].s10.avg||0};
      }).sort(function(a,b){return b.avg-a.avg;});
      var _myRank = _ranked.findIndex(function(r){return r.sym===symbol;});
      if(_myRank >= 0){
        var _pct = _myRank / _ranked.length;
        crossSection = _pct<0.33 ? 5 : _pct>0.66 ? -5 : 0;
      }
    }
  }catch(_e){}
  var composite = Math.round(liveScore * liveW + btScore * btW) + crossSection;
  // 產業趨勢過濾：所在產業近期平均跌 → 降低分數
  if(BT_PARAMS.sectorFilter){
    var allSt = (STOCKS.tw||[]).concat(STOCKS.us||[]);
    var sym2 = symbol;
    var stkObj = allSt.find(function(s){return s.symbol===sym2;});
    if(stkObj && stkObj.sector){
      var sectorStocks = allSt.filter(function(s){return s.sector===stkObj.sector && s.symbol!==sym2;});
      if(sectorStocks.length >= 3){
        var sectorAvgChg = sectorStocks.reduce(function(a,s){return a+(s.change||0);},0)/sectorStocks.length;
        if(sectorAvgChg < -1.5) composite = Math.round(composite * 0.85);
        else if(sectorAvgChg < -0.5) composite = Math.round(composite * 0.95);
      }
    }
  }
  // 產業趨勢過濾
  if(BT_PARAMS.sectorFilter!==false){
    var allSt=(STOCKS.tw||[]).concat(STOCKS.us||[]);
    var stkObj=allSt.find(function(x){return x.symbol===symbol;});
    if(stkObj&&stkObj.sector){
      var peers=allSt.filter(function(x){return x.sector===stkObj.sector&&x.symbol!==symbol;});
      if(peers.length>=3){
        var avgChg=peers.reduce(function(a,s){return a+(s.change||0);},0)/peers.length;
        if(avgChg<-1.5) composite=Math.round(composite*0.85);
        else if(avgChg<-0.5) composite=Math.round(composite*0.95);
      }
    }
  }
  return {total: composite, live: liveScore, bt: btScore, btRaw: s10, composite: composite, liveW: liveW, btW: btW};
}


// ─── ATR / 倉位 / 止損 (from Python compute_exit / compute_position) ───

function calcPositionSize(price, atr, equity, riskPct){
  riskPct=riskPct||0.02;
  if(!atr||atr<=0) return 0;
  return Math.max(1,Math.floor(equity*riskPct/(atr*2.0)));
}
function calcExitLevels(price, hist, isBuy){
  var atr=calcATR(hist,14); if(!atr) atr=price*0.02;
  var closes=hist.map(function(h){return h.c;}), recent=closes.slice(-20);
  var highest=Math.max.apply(null,recent), lowest=Math.min.apply(null,recent);
  var stop,target,trail;
  if(isBuy){
    stop=+(price-2*atr).toFixed(2); target=+(price+3*atr).toFixed(2); trail=+(highest*0.92).toFixed(2);
  } else {
    stop=+(price+2*atr).toFixed(2); target=+(price-3*atr).toFixed(2); trail=+(lowest*1.08).toFixed(2);
  }
  return{stop:stop,target:target,trail:trail,atr:+atr.toFixed(3),rr:+((Math.abs(target-price))/(Math.abs(price-stop)||1)).toFixed(1)};
}
// portfolio_risk_control: 總曝險上限 (from Python portfolio_risk_control)
var PORTFOLIO={maxExposure:0.5,currentExposure:0};
function portfolioRiskOK(newPosPct){ return(PORTFOLIO.currentExposure+newPosPct)<=PORTFOLIO.maxExposure; }


// ══════════════════════════════════════════════════
// SIGNAL → FILTER → POSITION → EXIT 交易引擎
// ══════════════════════════════════════════════════

// ── SIGNAL LAYER ──
// signal = similarity*0.4 + momentum*0.3 + volume*0.3
function calcSignal(s, hist){
  var q = s.q || {};

  // Similarity score (0-1): from backtest winrate
  var bt = BT[s.symbol];
  var simScore = (bt && bt.s10) ? bt.s10.wr/100 : 0.5;

  // Momentum score (0-1): price momentum + MA alignment
  var mom5 = (q.regularMarketChangePercent||0)/5;  // -1~1 range
  var ma_fast = 0, ma_slow = 0;
  if(hist && hist.length >= 50){
    var c = hist.map(function(h){return h.c;});
    var n = c.length;
    ma_fast = c.slice(-10).reduce(function(a,b){return a+b;})/10;
    ma_slow = c.slice(-50).reduce(function(a,b){return a+b;})/50;
  }
  var maAlign = ma_fast > ma_slow ? 0.2 : -0.2;
  var momScore = Math.max(0, Math.min(1, 0.5 + mom5*0.3 + maAlign));

  // Volume score (0-1): volume ratio vs average
  var vol = q.regularMarketVolume || 0;
  var avgVol = q.averageDailyVolume3Month || 1;
  var volRatio = avgVol > 0 ? vol/avgVol : 1;
  var volScore = Math.min(1, Math.max(0, volRatio/2));  // 2x vol = max score

  // Composite signal (0-1)
  var signal = simScore*0.4 + momScore*0.3 + volScore*0.3;

  return {
    signal: +signal.toFixed(3),
    simScore: +simScore.toFixed(3),
    momScore: +momScore.toFixed(3),
    volScore: +volScore.toFixed(3),
    components: {sim: simScore, mom: momScore, vol: volScore}
  };
}

// ── FILTER LAYER ──
// Returns {pass: bool, reason: string}
function applySignalFilters(s, hist, mktChange){
  var q = s.q || {};

  // 1. Market drop filter
  if(BT_PARAMS.mktFilter > 0 && mktChange < -BT_PARAMS.mktFilter){
    return {pass:false, reason:'大盤跌 '+(Math.abs(mktChange)).toFixed(1)+'%'};
  }

  // 2. ADX trend strength
  if(BT_PARAMS.adxMin > 0 && hist && hist.length >= 20){
    var closes = hist.slice(-20).map(function(h){return h.c;});
    var adx = calcADX(closes, 14);
    if(adx < BT_PARAMS.adxMin){
      return {pass:false, reason:'ADX '+adx.toFixed(0)+'<'+BT_PARAMS.adxMin};
    }
  }

  // 3. Near 52-week high (chasing top)
  var pos52 = null;
  if(q.fiftyTwoWeekHigh && q.fiftyTwoWeekLow){
    pos52 = (s.price - q.fiftyTwoWeekLow)/(q.fiftyTwoWeekHigh - q.fiftyTwoWeekLow)*100;
    if(pos52 > 85){
      return {pass:false, reason:'近52週高位 '+pos52.toFixed(0)+'%'};
    }
  }

  // 4. Kill switch: too far from 52-week high (downtrend)
  if(BT_PARAMS.killSwitch > 0 && q.fiftyTwoWeekHigh){
    var ddFromHigh = (s.price - q.fiftyTwoWeekHigh)/q.fiftyTwoWeekHigh*100;
    if(ddFromHigh < -BT_PARAMS.killSwitch){
      return {pass:false, reason:'距高點 '+ddFromHigh.toFixed(0)+'%'};
    }
  }

  // 5. Volume confirmation
  if(BT_PARAMS.volConfirm > 0){
    var vol = q.regularMarketVolume||0;
    var avgVol = q.averageDailyVolume3Month||1;
    if(avgVol > 0 && vol < avgVol * BT_PARAMS.volConfirm){
      return {pass:false, reason:'量能不足 '+(vol/avgVol).toFixed(1)+'x'};
    }
  }

  // 6. Max rally days
  if(BT_PARAMS.maxRally > 0 && hist && hist.length >= BT_PARAMS.maxRally+1){
    var rally = 0;
    var c2 = hist.slice(-(BT_PARAMS.maxRally+1)).map(function(h){return h.c;});
    for(var i=c2.length-1;i>0;i--){
      if(c2[i]>c2[i-1]) rally++;
      else break;
    }
    if(rally >= BT_PARAMS.maxRally){
      return {pass:false, reason:'連漲'+rally+'天'};
    }
  }

  // B6: 融資比例過高（台股，需有margin資料）
  if(s.marg && s.marg.marginRatio > 0.25){
    return {pass:false, reason:'融資比'+Math.round(s.marg.marginRatio*100)+'%過高'};
  }
  // B8: 除權息日附近（台股，價格跳空污染）
  if(hist && hist.length >= 2){
    var lastGap=Math.abs((hist[hist.length-1].c-hist[hist.length-2].c)/hist[hist.length-2].c);
    if(lastGap > 0.06 && s.symbol && s.symbol.match(/^\d/)){
      return {pass:false, reason:'疑似除權息跳空'};
    }
  }
  return {pass:true, reason:'', pos52:pos52};
}

// ── POSITION LAYER ──
// position_size = base_capital * signal_strength * risk_adjustment
function calcPosition(s, signalObj, equity){
  equity = equity || 1000000;  // default 1M NTD
  var signal = signalObj ? signalObj.signal : 0.5;

  // Base position: compositeScore / 100 * equity
  var cs = compositeScore(s.symbol, s.score);
  var scoreNorm = cs.total / 100;

  // Position = equity * 2%_risk * signal_strength
  var riskPct = 0.02;
  var hist = s.sparkHist ? s.sparkHist.map(function(c){return{c:c};}) : null;
  var atr = hist ? calcATR(hist, 14) : s.price * 0.02;
  if(!atr) atr = s.price * 0.02;

  var stopDist = atr * 2;
  var maxLoss = equity * riskPct;
  var shares = Math.floor(maxLoss / stopDist * signal);

  // Position as % of equity
  var posValue = shares * s.price;
  var posPct = equity > 0 ? posValue/equity : 0;

  // Apply portfolio cap (50% max)
  if(!portfolioRiskOK(posPct)) posPct = PORTFOLIO.maxExposure - PORTFOLIO.currentExposure;

  return {
    shares: Math.max(1, shares),
    posValue: +posValue.toFixed(0),
    posPct: +(posPct*100).toFixed(1),
    signalStr: +(signal*100).toFixed(0),
    scoreNorm: +(scoreNorm*100).toFixed(0),
  };
}

// ── EXIT LAYER ──
// stop_loss = entry - 2*ATR
// trail_stop = highest * (1 - trailPct)
function calcExitPlan(entryPrice, hist, isBuy){
  var atr = calcATR(hist, 14);
  if(!atr) atr = entryPrice * 0.02;

  var closes = hist.map(function(h){return h.c;});
  var recent20 = closes.slice(-20);
  var highest = Math.max.apply(null, recent20);
  var lowest  = Math.min.apply(null, recent20);

  var stop, target, trail, trailPct = 0.08;
  if(isBuy){
    stop   = +(entryPrice - 2*atr).toFixed(2);
    target = +(entryPrice + 3*atr).toFixed(2);
    trail  = +(highest * (1 - trailPct)).toFixed(2);
  } else {
    stop   = +(entryPrice + 2*atr).toFixed(2);
    target = +(entryPrice - 3*atr).toFixed(2);
    trail  = +(lowest  * (1 + trailPct)).toFixed(2);
  }

  var rr = +((Math.abs(target-entryPrice))/(Math.abs(entryPrice-stop)||0.001)).toFixed(1);

  return {stop:stop, target:target, trail:trail,
          atr:+atr.toFixed(3), rr:rr,
          stopPct:+(Math.abs(entryPrice-stop)/entryPrice*100).toFixed(1),
          targetPct:+(Math.abs(target-entryPrice)/entryPrice*100).toFixed(1)};
}

// ── ENGINE: run all 4 layers for one stock ──
function runTradeEngine(s, mktChange){
  var hist = s.sparkHist ? s.sparkHist.map(function(c){return{c:c};}) : null;
  var isBuy = s.grade && (s.grade.key==='strong_buy'||s.grade.key==='buy');

  // 1. Signal
  var signalObj = calcSignal(s, hist);

  // 2. Filter
  var filterResult = applySignalFilters(s, hist, mktChange||0);

  // 3. Position (only if filter passes)
  var posObj = filterResult.pass ? calcPosition(s, signalObj, 1000000) : null;

  // 4. Exit
  var exitObj = (hist && hist.length>=15) ? calcExitPlan(s.price, hist, isBuy) : null;

  return {
    signal:   signalObj,

    position: posObj,

  };
}

// 進階交易決策系統（融合 Python ML 系統概念）
// 1. 特徵重要性  2. 大盤環境乘數  3. 凱利準則倉位
// ══════════════════════════════════════════════════

// ── 特徵重要性權重（模擬 XGBoost feature_importances）
// 根據回測歷史，各特徵對飆股預測的貢獻度
// 可隨時間更新（目前用研究文獻的典型值）
var FEATURE_WEIGHTS = {
  relative_strength: 0.28,  // 52週相對強度 - 最重要
  rsi_14:            0.18,  // RSI動能

// 更新特徵重要性（根據近期驗證結果）
function updateFeatureWeights(weeklyResults){
  if(!weeklyResults) return;
  var all = [];
  ['1週','2週','3週'].forEach(function(w){
    (weeklyResults[w]||[]).forEach(function(r){ all.push(r); });
  });
  if(all.length < 20) return;

  // 分析哪種特徵組合的正確率最高
  var highVol  = all.filter(function(r){return r.vol&&r.vol>0.025;});
  var lowVol   = all.filter(function(r){return r.vol&&r.vol<=0.025;});
  var highTrend= all.filter(function(r){return r.trend&&r.trend>0.5;});

  var accAll   = all.filter(function(r){return r.correct;}).length/all.length;
  var accHighV = highVol.length  ? highVol.filter(function(r){return r.correct;}).length/highVol.length : accAll;
  var accLowV  = lowVol.length   ? lowVol.filter(function(r){return r.correct;}).length/lowVol.length   : accAll;
  var accTrend = highTrend.length? highTrend.filter(function(r){return r.correct;}).length/highTrend.length: accAll;

  // Softmax 更新特徵權重
  var volImp    = accHighV > accLowV  ? 0.20 : 0.12;
  var trendImp  = accTrend > accAll*1.05 ? 0.30 : 0.22;
  var rsScore   = 1 - volImp - trendImp*0.5;

  FEATURE_WEIGHTS.volatility_20    = +volImp.toFixed(2);
  FEATURE_WEIGHTS.relative_strength= +trendImp.toFixed(2);
  FEATURE_WEIGHTS.rsi_14           = +Math.min(0.22, rsScore).toFixed(2);

  dbg('特徵權重更新: vol='+volImp.toFixed(2)+' trend='+trendImp.toFixed(2));
}

// ── 大盤環境過濾器（market_condition > 0 → 多頭，否則空頭）
// 計算大盤相對於MA200的距離


// ── 凱利準則（Kelly Criterion）
// f* = (p × (b+1) - 1) / b
// p = 勝率, b = 盈虧比（目標價/止損距離）
function calcKellyPosition(signal, exitPlan, equity){
  var p = signal;  // 訊號強度作為勝率估計 (0-1)
  if(p <= 0) return 0;

  // 盈虧比 b = 目標報酬 / 止損距離
  var b = exitPlan ? exitPlan.rr : 2.0;  // 預設 R:R = 2
  b = Math.max(1.0, b);  // 最少1倍

  // 凱利公式
  var kelly_f = (p * (b + 1) - 1) / b;

  // 限制最大倉位（對應 np.clip(kelly_f, 0, 0.2)）
  kelly_f = Math.max(0, Math.min(0.20, kelly_f));

  // 套用大盤乘數
  var regime = getMarketRegime();
  kelly_f = kelly_f * regime.multiplier;

  var posValue = Math.round(equity * kelly_f);

  return {
    kellyF:    +kelly_f.toFixed(4),
    posPct:    +(kelly_f*100).toFixed(1),
    posValue:  posValue,
    regime:    regime,
    p:         +p.toFixed(3),
    b:         +b.toFixed(1),
    rawKelly:  +((p*(b+1)-1)/b).toFixed(4),
  };
}

// ── 完整決策輸出（對應 smart_trading_decision）
function smartTradingDecision(s, signalObj, exitPlan){
  var regime = getMarketRegime();
  var rawSignal = signalObj ? signalObj.signal : 0.5;

  // 調整後勝率（adjusted_prob）：套用大盤乘數
  var adjustedProb = rawSignal * regime.multiplier;

  // 凱利建議倉位
  var kelly = calcKellyPosition(adjustedProb, exitPlan, 1000000);

  // 訊號等級（對應 >0.7強烈 / >0.5中等 / 其他觀望）
  var level, emoji;
  if(adjustedProb >= 0.65){
    level='強烈'; emoji='🔥';
  } else if(adjustedProb >= 0.50){
    level='中等'; emoji='⚡';
  } else {
    level='不足'; emoji='💤';
  }

  return {
    rawSignal:    +rawSignal.toFixed(3),
    adjustedProb: +adjustedProb.toFixed(3),
    regime:       regime,
    kelly:        kelly,
    level:        level,
    emoji:        emoji,
    suggest:      adjustedProb >= 0.50,
  };
}

function scoreStock(q, inst, marg){
  if(!q || !q.regularMarketPrice) return 30;
  var score = 50;
  var price = q.regularMarketPrice || 0;
  var chg = q.regularMarketChangePercent || 0;
  var chg52 = (q.fiftyTwoWeekChangePercent || 0) * 100;
  var vol = q.regularMarketVolume || 1;
  var avgVol = q.averageDailyVolume3Month || 1;
  var low52 = q.fiftyTwoWeekLow || price;
  var high52 = q.fiftyTwoWeekHigh || price;
  var pos52 = high52 > low52 ? (price - low52) / (high52 - low52) * 100 : 50;
  var volR = vol / avgVol;

  // 1. 技術動能（-15 ~ +30）
  score += Math.max(-8, Math.min(8, chg * 2.5));
  if(pos52 >= 70) score += 12;
  else if(pos52 >= 50) score += 6;
  else if(pos52 >= 30) score += 1;
  else score -= 6;
  if(volR >= 2 && chg > 0) score += 10;
  else if(volR >= 1.5 && chg > 0) score += 6;
  else if(volR >= 1.2) score += 2;

  // 2. 年度動能（-8 ~ +8）
  if(chg52 >= 50) score += 8;
  else if(chg52 >= 20) score += 5;
  else if(chg52 >= 0) score += 2;
  else if(chg52 >= -20) score -= 3;
  else score -= 8;

  // 3. 基本面（0 ~ +20）


  var revG = q.revenueGrowth || 0;
  if(revG >= 0.3) score += 6;
  else if(revG >= 0.1) score += 3;
  else if(revG >= 0) score += 1;
  else score -= 2;

  var epsG = q.earningsGrowth || 0;
  if(epsG >= 0.3) score += 5;
  else if(epsG >= 0.1) score += 2;
  else if(epsG < -0.2) score -= 4;

  var pe = q.trailingPE || 0;
  if(pe > 0 && pe < 15) score += 3;
  else if(pe >= 15 && pe <= 25) score += 1;
  else if(pe > 50) score -= 3;

  // 4. 台股籌碼面（0 ~ +20）
  if(inst){
    var fNet = inst.foreign_net || 0;
    var tNet = inst.trust_net || 0;
    if(fNet > 5000) score += 10;
    else if(fNet > 1000) score += 6;
    else if(fNet > 0) score += 3;
    else if(fNet < -5000) score -= 8;
    else if(fNet < -1000) score -= 4;

    if(tNet > 500) score += 7;
    else if(tNet > 0) score += 3;
    else if(tNet < -500) score -= 4;

    if(fNet > 0 && tNet > 0) score += 3; // 法人共識加分
  }

  if(marg){
    var mBal = marg.margin_balance || 1;
    var sBal = marg.short_balance || 0;
    if(sBal / mBal > 0.15) score += 4; // 高融券可能軋空
    if(sBal / mBal < 0.05) score += 2; // 低融資籌碼乾淨
  }

  // Scenario 識別
  var scoreCloses = [];
  var high52 = q.fiftyTwoWeekHigh||price;
  var low52 = q.fiftyTwoWeekLow||price;
  var rsiVal = calcRSI([price*(1-chg/100), price]); // 近似
  var adxVal = 25; // 預設中性
  var pos52v = high52>low52?(price-low52)/(high52-low52)*100:50;
  var scenario = detectScenario(
    [price*(1-chg/100*3), price*(1-chg/100*2), price*(1-chg/100), price],
    [avgVol, avgVol, vol, vol],
    rsiVal, adxVal, pos52v, chg>0?1:-1, chg>0?1:-1
  );

  // Alpha 動態權重（根據 Scenario）
  var alphaVal = calcAlpha(q, inst, scenario);
  score += Math.round(alphaVal * 10);

  // 成交量確認（Volume Confirmation）
  var volChange = vol > 0 && avgVol > 0 ? vol/avgVol : 1;
  var volConfirmBonus = (volChange >= 1.5 && chg > 1) ? 8 :
                        (volChange >= 1.5 && chg < -1) ? -5 :
                        (volChange < 0.5) ? -3 : 0;
  score += volConfirmBonus;

  // MA Cross（均線多頭排列，MA10 > MA50 近似）
  var ma10Proxy = price; // 當前價即為最新
  var ma50Proxy = q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh ?
    (q.fiftyTwoWeekLow + q.fiftyTwoWeekHigh) / 2 : price;
  // 用52週位置近似均線位置：pos52>60% = 在均線之上
  if(pos52v > 60) score += 6;   // MA多頭排列
  else if(pos52v < 40) score -= 4; // MA空頭排列

  // Breakout（突破20日高點）
  var chg20 = q.fiftyTwoWeekChangePercent || 0;
  if(chg20 > 0 && pos52v > 90) score += 8; // 突破接近52週高點
  else if(pos52v > 80 && chg > 2) score += 5; // 放量突破高位

  // Kill Switch（來自 Quant v7）：從高點大幅回落 → 強制減分
  var hs52 = q.fiftyTwoWeekHigh || price;
  var dd = hs52 > 0 ? (hs52 - price) / hs52 : 0;
  if(dd > 0.3) score -= 20;
  else if(dd > 0.2) score -= 10;

  return Math.min(100, Math.max(0, Math.round(score)));
}

function softmax(arr){var e=arr.map(function(s){return Math.exp(s);});var sm=e.reduce(function(a,b){return a+b;},0.001);return e.map(function(v){return v/sm;});}
function calcStrategySignals(hist){
  if(!hist||hist.length<55) return null;
  var c=hist.map(function(h){return h.c;}),n=c.length;
  var ma10=c.slice(-10).reduce(function(a,b){return a+b;})/10;
  var ma50=c.slice(-50).reduce(function(a,b){return a+b;})/50;
  var mom5=(c[n-1]-c[n-6])/c[n-6];
  var sl=c.slice(-20),m20=sl.reduce(function(a,b){return a+b;})/20;
  var sd=Math.sqrt(sl.reduce(function(a,v){return a+Math.pow(v-m20,2);},0)/20);
  var zs=sd>0?(c[n-1]-m20)/sd:0;
  var h20=Math.max.apply(null,c.slice(-21,-1)),l20=Math.min.apply(null,c.slice(-21,-1));
  var rs=c.slice(-20).map(function(v,i,a){return i>0?(v-a[i-1])/a[i-1]:0;});
  var vol=Math.sqrt(rs.slice(1).reduce(function(a,r){return a+r*r;},0)/19);
  return{trend:((ma10>ma50?1:0)+(mom5>0?1:0))/2, meanRev:zs<-1?1:zs>1?-1:0, breakout:c[n-1]>h20?1:c[n-1]<l20?-1:0, vol:vol, zscore:zs};
}
function computeScore(eq){
  if(eq.length<5) return 0;
  var r=[];for(var i=1;i<eq.length;i++) r.push(eq[i]-eq[i-1]);
  var m=r.reduce(function(a,b){return a+b;})/r.length;
  var s=Math.sqrt(r.reduce(function(a,v){return a+Math.pow(v-m,2);},0)/r.length);
  var sh=s>0?m/s:0;
  var pk=eq[0],dd=0;
  eq.forEach(function(e){pk=Math.max(pk,e);dd=Math.min(dd,(e-pk)/pk);});
  return sh+0.5*dd;
}

function calcPositionSize(equity,signal,wr,avgWin,avgLoss){
  var rr=(avgWin||2.0)/(avgLoss||1.0);
  var p=Math.max(0.35,Math.min(0.75,(wr||50)/100));
  var kelly=Math.max(0,Math.min(0.20,p-(1-p)/rr));
  var halfKelly=kelly*0.5;
  var strength=Math.min(1.0,Math.abs(signal)*2);
  var pct=Math.min(halfKelly*strength,0.12);
  return {pct:+pct.toFixed(4),amount:Math.round(equity*pct),direction:signal>0?'long':'short',kelly:+halfKelly.toFixed(4)};
}
function calcPortfolioWeights(stocks){
  var raw={},totalAbs=0;
  stocks.forEach(function(s){var w=s.signal/(s.vol+0.001);raw[s.symbol]=w;totalAbs+=Math.abs(w);});
  var weights={};
  if(totalAbs>0) Object.keys(raw).forEach(function(sym){weights[sym]=+(raw[sym]/totalAbs).toFixed(4);});
  return weights;
}

// ══ GBT：JS版Gradient Boosting（RF等效，30棵）══
function trainGBT(closes, vols, n){
  if(n<60) return null;
  var X=[],y=[];
  for(var i=30;i<n-10;i++){
    var sl=closes.slice(Math.max(0,i-20),i+1);
    var mu=sl.reduce(function(a,b){return a+b;})/sl.length;
    var sd=Math.sqrt(sl.reduce(function(a,c){return a+Math.pow(c-mu,2);},0)/sl.length)||1;
    var avgV=vols.slice(Math.max(0,i-20),i).reduce(function(a,b){return a+b;})/20||1;
    X.push([(closes[i]-closes[Math.max(0,i-5)])/closes[Math.max(0,i-5)]*100,
      (closes[i]-mu)/sd,(vols[i]||avgV)/avgV,
      i>=10?(closes[i]-closes[i-10])/closes[i-10]*100:0]);
    y.push((closes[Math.min(i+10,n-1)]-closes[i])/closes[i]*100);
  }
  if(X.length<20) return null;
  var init=y.reduce(function(a,b){return a+b;})/y.length;
  var preds=new Array(X.length).fill(init),trees=[],lr=0.1;
  for(var t=0;t<30;t++){
    var res=y.map(function(v,i){return v-preds[i];});
    var best={mse:Infinity,j:0,th:0,lv:0,rv:0};
    X[0].forEach(function(_,j){
      var vals=X.map(function(r){return r[j];}).sort(function(a,b){return a-b;});
      for(var pi=2;pi<8;pi++){
        var th=vals[Math.floor(vals.length*pi/10)];
        var lY=[],rY=[];
        X.forEach(function(r,i){(r[j]<=th?lY:rY).push(res[i]);});
        if(!lY.length||!rY.length) continue;
        var lv=lY.reduce(function(a,b){return a+b;})/lY.length;
        var rv=rY.reduce(function(a,b){return a+b;})/rY.length;
        var mse=0;X.forEach(function(r,i){var e=(r[j]<=th?lv:rv)-res[i];mse+=e*e;});
        if(mse<best.mse) best={mse:mse,j:j,th:th,lv:lv,rv:rv};
      }
    });
    trees.push({j:best.j,th:best.th,l:best.lv*lr,r:best.rv*lr});
    X.forEach(function(r,i){preds[i]+=r[best.j]<=best.th?best.lv*lr:best.rv*lr;});
  }
  return {trees:trees,init:init};
}
function predictGBT(model,closes,vols,n){
  if(!model) return 0;
  var sl=closes.slice(Math.max(0,n-21),n),mu=sl.reduce(function(a,b){return a+b;})/sl.length;
  var sd=Math.sqrt(sl.reduce(function(a,c){return a+Math.pow(c-mu,2);},0)/sl.length)||1;
  var avgV=vols.slice(Math.max(0,n-20),n).reduce(function(a,b){return a+b;})/20||1;
  var x=[(closes[n-1]-closes[Math.max(0,n-6)])/closes[Math.max(0,n-6)]*100,
    (closes[n-1]-mu)/sd,(vols[n-1]||avgV)/avgV,
    n>=11?(closes[n-1]-closes[n-11])/closes[n-11]*100:0];
  var pred=model.init;
  model.trees.forEach(function(tr){pred+=x[tr.j]<=tr.th?tr.l:tr.r;});
  return Math.tanh(pred/2);
}

function initBgScanQueue(){
  var existing = TW50.map(function(s){return s.symbol;});

function bgScanNext(){
  if(BG_SCAN.running||!BG_SCAN.queue.length) return;
  if(BG_SCAN.idx>=BG_SCAN.queue.length) BG_SCAN.idx=0;
  BG_SCAN.running=true;
  var batch=BG_SCAN.queue.slice(BG_SCAN.idx,BG_SCAN.idx+8);
  BG_SCAN.idx+=8;
  var ySyms=batch.map(function(s){return s.symbol+'.TW';});
  fetchQuotes(ySyms).then(function(qMap){
    var updated=false;
    batch.forEach(function(s){
      var q=qMap[s.symbol+'.TW'];
      if(!q||!q.regularMarketPrice) return;
      var sc=scoreStock(q,null,null);
      if(sc<75) return;
      var inList=STOCKS.tw.some(function(x){return x.symbol===s.symbol;});
      if(inList) return;
      // 找清單最低分
      var minScore=9999,minIdx=0;
      STOCKS.tw.forEach(function(x,i){if(x.score<minScore){minScore=x.score;minIdx=i;}});
      if(sc<=minScore) return;
      var h52=q.fiftyTwoWeekHigh||q.regularMarketPrice;
      var l52=q.fiftyTwoWeekLow||q.regularMarketPrice;
      var p52=(h52>l52)?(q.regularMarketPrice-l52)/(h52-l52)*100:50;
      var chg=q.regularMarketChangePercent||0;
      var scen=detectScenario([q.regularMarketPrice*(1-chg/200),q.regularMarketPrice],
        [q.averageDailyVolume3Month||0,q.regularMarketVolume||0],50,25,p52,chg>0?1:-1,1);
      var ns=Object.assign({},s,{
        yS:s.symbol+'.TW',price:+q.regularMarketPrice.toFixed(2),
        change:+chg.toFixed(2),score:sc,grade:getGrade(sc),live:true,
        q:q,inst:null,marg:null,scenario:scen,
        sparkHist:q.sparkline||null,fromBgScan:true
      });
      dbg('🔍 '+s.name+'('+sc+'分) 替換 '+STOCKS.tw[minIdx].symbol+'('+minScore+'分)');
      STOCKS.tw[minIdx]=ns;
      if(BT_STATUS[ns.symbol]!=='done'){_btQueue.push(ns);if(_btIdx>=_btQueue.length-1)setTimeout(_next,200);}
      STOCKS.tw.sort(function(a,b){
        return calcSignal(b,null).signal-calcSignal(a,null).signal;
      });
      updated=true;
    });
    BG_SCAN.running=false;
    BG_SCAN.lastScan=Date.now();
    if(updated && S.page==='picks' && S.market==='tw') render();
  }).catch(function(){BG_SCAN.running=false;});
}


function startFullScan(){
  if(FULL_SCAN.running) return;
  FULL_SCAN.completed=false;
  // Build full stock list: TW50 + TW_UNIVERSE + SP100
  var twAll = TW50.slice();
  TW_UNIVERSE.forEach(function(s){
    if(!twAll.some(function(x){return x.symbol===s.symbol;})) twAll.push(s);
  });
  var usAll = SP100.slice();
  var allStocks = twAll.map(function(s){return {symbol:s.symbol,name:s.name,sector:s.sector||'',isTW:true,yS:s.symbol+'.TW'};})
    .concat(usAll.map(function(s){return {symbol:s.symbol,name:s.name,sector:s.sector||'',isTW:false,yS:s.symbol};}));
  
  var twCount = twAll.length;
  var usCount = usAll.length;
  FULL_SCAN.running = true;
  FULL_SCAN.done = 0;
  FULL_SCAN.total = allStocks.length;
  FULL_SCAN.twTotal = twCount;
  FULL_SCAN.usTotal = usCount;
  FULL_SCAN.twDone = 0;
  FULL_SCAN.usDone = 0;
  FULL_SCAN.startTime = Date.now();
  FULL_SCAN.completed = false;
  FULL_SCAN.current = '';
  updateScanBar();
  dbg('全量掃描開始: '+allStocks.length+'支');

  var idx = 0;
  function next(){
    if(idx >= allStocks.length){
      FULL_SCAN.running = false;
      FULL_SCAN.completed = true;
      FULL_SCAN.current = '掃描完成';
      updateScanBar();
      dbg('全量掃描完成');
      return;
    }
    var s = allStocks[idx++];
    FULL_SCAN.done = idx;
    FULL_SCAN.current = s.symbol;
    FULL_SCAN.currentMkt = s.isTW ? 'tw' : 'us';
    if(s.isTW) FULL_SCAN.twDone = Math.min(FULL_SCAN.twTotal, idx);
    else FULL_SCAN.usDone = Math.min(FULL_SCAN.usTotal, idx - FULL_SCAN.twTotal);
    
    // ETA calculation
    var elapsed = (Date.now()-FULL_SCAN.startTime)/1000;
    var rate = idx/elapsed; // stocks per second
    FULL_SCAN.etaSec = rate>0 ? Math.round((FULL_SCAN.total-idx)/rate) : 0;
    updateScanBar();
    
    // Fetch history + backtest
    fetch(WORKER+'/yahoo-history?symbol='+encodeURIComponent(s.yS))
      .then(function(r){return r.json();})
      .then(function(d){
        var hist = d&&d.hist ? d.hist : null;
        if(hist && hist.length >= 65){
          // Find or create stock object
          var mkt = s.isTW ? 'tw' : 'us';
          var existing = (STOCKS[mkt]||[]).find(function(x){return x.symbol===s.symbol;});
          if(existing){
            // Update sparkHist
            if(!existing.sparkHist) existing.sparkHist = hist.map(function(h){return h.c;});
            // Run backtest if not done
            if(BT_STATUS[s.symbol] !== 'done'){
              var mktH = s.isTW ? MARKET_HIST.tw : MARKET_HIST.us;
              var btResult = runBacktest(hist, existing.q, mktH);
              if(btResult){
                BT[s.symbol] = btResult;
                BT_STATUS[s.symbol] = 'done';
                refreshBTLabel(s.symbol);
              }
            }
          }
        }
        setTimeout(next, 100);
      })
      .catch(function(){ setTimeout(next, 100); });
  }
  next();
}

function updateScanBar(){
  var bar = document.getElementById('scan-bar');
  if(!bar) return;
  var f = FULL_SCAN;
  if(!f.running && !f.completed){ bar.style.display='none'; return; }
  bar.style.display = 'block';
  var pct = f.total>0 ? Math.round(f.done/f.total*100) : 0;
  var etaStr = '';
  if(f.running && f.etaSec>0){
    if(f.etaSec>=60) etaStr = '約'+Math.ceil(f.etaSec/60)+'分鐘';
    else etaStr = '約'+f.etaSec+'秒';
  }
  var inner = document.getElementById('scan-bar-inner');
  var text = document.getElementById('scan-bar-text');
  if(inner) inner.style.width = pct+'%';
  if(text){
    if(f.completed){
      text.textContent = '✅ 全量掃描完成 台股'+f.twTotal+'支 + 美股'+f.usTotal+'支 = '+f.total+'支';
    } else {
      var mktStr = f.currentMkt==='tw'
        ? '🇹🇼 台股 '+f.twDone+'/'+f.twTotal
        : '🇺🇸 美股 '+f.usDone+'/'+f.usTotal;
      text.textContent = '🔍 ' + mktStr + ' · 總進度'+f.done+'/'+f.total+' ('+pct+'%) '+f.current+(etaStr?' · '+etaStr:'');
    }
  }
}

function startRefresh(){
  setTimeout(initBgScanQueue, 5000);
  setInterval(function(){
    if(isRefreshing) return;
    refreshCD--;
    if(refreshCD<=0){refreshCD=120;refreshAll();}
    updateLupd();
    // 背景掃描：每30秒掃一批
    if(Date.now()-BG_SCAN.lastScan>30000) bgScanNext();
    if(FULL_SCAN.running) updateScanBar();
  }, 1000);
}

function spark52(s, pos){
  var W=90, H=32, p=3;
  var pts;
  var col = pos?'#22c55e':'#ef4444';

  // 優先用真實52週歷史（從報價直接取得）
  if(s && s.sparkHist && s.sparkHist.length > 10){
    var raw = s.sparkHist;
    // sparkHist 可能是數字陣列或 {c} 物件陣列
    var rawPts = typeof raw[0] === 'object' ? raw.map(function(d){return d.c;}) : raw;
    var step = Math.max(1, Math.floor(rawPts.length/40));
    pts = [];
    for(var k=0;k<rawPts.length;k+=step) pts.push(rawPts[k]);
    if(pts[pts.length-1]!==rawPts[rawPts.length-1]) pts.push(rawPts[rawPts.length-1]);
  } else {
    // 回測前：用52週高低點 + 今日價格畫一條有意義的折線
    var q = s ? s.q : null;
    if(q && q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh && q.regularMarketPrice){
      var low=q.fiftyTwoWeekLow, high=q.fiftyTwoWeekHigh, cur=q.regularMarketPrice;
      var chg = q.regularMarketChangePercent || 0;
      // 產生20個點：模擬從年初到現在的走勢
      // 根據52週位置決定整體趨勢形狀
      var posRatio = (cur-low)/(high-low||1); // 0=年低, 1=年高
      var seed=0,sym2=s.symbol||'';
      for(var si=0;si<sym2.length;si++) seed+=sym2.charCodeAt(si);
      var freq=1.5+(seed%7)*0.3, phase=(seed%13)*0.5, amp=(high-low)*(0.04+(seed%5)*0.01);
      var startRatio=posRatio>0.5?Math.max(0,posRatio-0.4):Math.min(1,posRatio+0.3);
      pts=[];
      for(var j=0;j<20;j++){
        pts.push(low+(high-low)*(startRatio+(posRatio-startRatio)*(j/19))+Math.sin(j*freq+phase)*amp);
      }
      pts.push(cur);
    } else {
      pts = pos?[18,22,20,26,24,30,28,34,32,37,40,38,44]:[44,42,45,39,41,36,38,32,34,29,26,28,23];
    }
  }

  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1;
  var co=pts.map(function(v,i){return[p+(i/(pts.length-1))*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)];});
  var line=co.map(function(c,i){return(i===0?'M':'L')+c[0]+','+c[1];}).join(' ');
  var fill=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';
  var gid='sg'+(s?s.symbol:'x');
  return'<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+fill+'" fill="url(#'+gid+')" /><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function spark(s, pos){
  var W=90, H=32, p=3;
  var pts;
  // 優先用真實52週歷史（回測載入後）
  if(s && s.sparkHist && s.sparkHist.length > 10){
    // 取最近52週，縮減到30個點顯示
    var rawPts = s.sparkHist;
    var step = Math.max(1, Math.floor(rawPts.length/30));
    pts = [];
    for(var k=0;k<rawPts.length;k+=step) pts.push(rawPts[k]);
    if(pts[pts.length-1]!==rawPts[rawPts.length-1]) pts.push(rawPts[rawPts.length-1]);
  } else {
    // 回測尚未完成：用52週高低點畫近似走勢
    var q = s ? s.q : null;
    if(q && q.fiftyTwoWeekLow && q.fiftyTwoWeekHigh){
      var low=q.fiftyTwoWeekLow, high=q.fiftyTwoWeekHigh, cur=q.regularMarketPrice||low;
      var posRatio = (cur-low)/(high-low||1);
      pts = [];
      // 產生20個點模擬走勢：從年低點到現在位置
      for(var j=0;j<20;j++){
        var t = j/19;
        var noise = Math.sin(j*1.8)*0.03 + Math.cos(j*3.1)*0.02;
        pts.push(low + (high-low)*(posRatio*t + noise));
      }
    } else {
      pts = pos?[18,21,19,25,23,29,27,33,31,36,39,37,43]:[43,41,44,38,40,35,37,31,33,28,25,27,22];
    }
  }
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1;
  var co=pts.map(function(v,i){return[p+(i/(pts.length-1))*(W-2*p),p+(1-(v-mn)/rng)*(H-2*p)];});
  var line=co.map(function(c,i){return(i===0?'M':'L')+c[0]+','+c[1];}).join(' ');
  var fill=line+' L'+co[co.length-1][0]+','+H+' L'+co[0][0]+','+H+' Z';
  var col=pos?'#22c55e':'#ef4444';
  return'<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="sg'+s.symbol+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+fill+'" fill="url(#sg'+s.symbol+')" /><path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function updatePerfEngine(){
  try{
    var snapKeys=Object.keys(localStorage).filter(function(k){return k.startsWith('qx_daily_');}).sort();
    if(snapKeys.length<2) return;
    var outcomes=[];
    for(var i=0;i<snapKeys.length-2;i++){
      var snap=JSON.parse(localStorage.getItem(snapKeys[i])||'{}');
      var futureSnap=JSON.parse(localStorage.getItem(snapKeys[Math.min(i+2,snapKeys.length-1)])||'{}');
      if(!snap.tw||!futureSnap.tw) continue;
      snap.tw.forEach(function(s){
        var future=(futureSnap.tw||[]).find(function(f){return f.sym===s.sym;});
        if(!future||!s.price||!future.price) return;
        var actualRet=(future.price-s.price)/s.price*100;
        var predicted=(s.grade==='strong_buy'||s.grade==='buy')?'up':'down';
        var actual=actualRet>0?'up':'down';
        outcomes.push({sym:s.sym,correct:predicted===actual,actualRet:actualRet,grade:s.grade||''});
      });
    }
    PERF_ENGINE.outcomes=outcomes;
    if(outcomes.length<5) return;
    var recent=outcomes.slice(-30);
    var acc=recent.filter(function(o){return o.correct;}).length/recent.length;
    PERF_ENGINE.recentAcc=acc;
    var rets=outcomes.map(function(o){return o.actualRet;});
    var mean=rets.reduce(function(a,b){return a+b;})/rets.length;
    var std=Math.sqrt(rets.reduce(function(a,r){return a+Math.pow(r-mean,2);},0)/rets.length);
    var sharpe=std>0?mean/std:0;
    var equity=[100];
    outcomes.forEach(function(o){equity.push(equity[equity.length-1]*(1+o.actualRet/1000));});
    var peak=equity[0],maxDD=0;
    equity.forEach(function(e){peak=Math.max(peak,e);maxDD=Math.min(maxDD,(e-peak)/peak);});
    var posR=rets.filter(function(r){return r>0;});
    var negR=rets.filter(function(r){return r<0;});
    var pf=negR.length?posR.reduce(function(a,b){return a+b;},0)/Math.abs(negR.reduce(function(a,b){return a+b;},0)+0.001):2;
    PERF_ENGINE.profitFactor=+pf.toFixed(2);
    PERF_ENGINE.sharpe=+sharpe.toFixed(2);
    PERF_ENGINE.maxDD=+maxDD.toFixed(3);
    if(sharpe<0.3||acc<0.45||pf<1.0) PERF_ENGINE.health='BAD';
    else if(maxDD<-0.15||acc<0.50) PERF_ENGINE.health='RISKY';
    else if(acc<0.55||pf<1.2) PERF_ENGINE.health='WEAK';
    else PERF_ENGINE.health='GOOD';
    var targetBtW=acc>=0.65?0.65:acc>=0.60?0.58:acc>=0.55?0.50:acc>=0.50?0.42:0.35;
    var confidence=Math.min(1.0,outcomes.length/30);
    PERF_ENGINE.btWeight=PERF_ENGINE.btWeight*(1-confidence)+targetBtW*confidence;
    PERF_ENGINE.liveWeight=1-PERF_ENGINE.btWeight;
    dbg('績效引擎: acc='+Math.round(acc*100)+'% health='+PERF_ENGINE.health);
  }catch(e){dbg('績效引擎錯誤:'+e.message,'error');}
}
