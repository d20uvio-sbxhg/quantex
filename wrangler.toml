name = "quantex-api"
main = "worker.js"
compatibility_date = "2026-04-29"

# ════════ KV 綁定(雲端 ML 模型儲存)════════
# ⚠️ 部署前請先填入正確的 id!
# 取得方式:
#   1. https://dash.cloudflare.com → Workers & Pages → KV
#   2. 點 QUANTEX_ML_KV
#   3. 複製 Namespace ID(32 字元 hex,例如 abcd1234ef56...)
#   4. 把下方 "貼這裡" 換成那個 ID
[[kv_namespaces]]
binding = "QUANTEX_KV"
id = "貼這裡"
