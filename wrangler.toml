name = "quantex-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV 儲存(binding 名稱 QUANTEX_KV → 對應 namespace QUANTEX_ML_KV)
kv_namespaces = [
  { binding = "QUANTEX_KV", id = "e2d0eedd4f3a46af8acc3f94e03b1f75" }
]

# 環境變數:GEMINI_API_KEY 已設為 Secret,不需在這裡

# v2.20: Cron Triggers — 雲端自主跑 AutoBT + 產生 OOS(路線B)
# 每 30 分鐘觸發一次,每次處理 batchSize=6 支
# 改為 */30(原 */10)原因:v2.20 雲端 walk-forward 會額外寫 OOS,
#   */10 在穩態下光是回測結果寫入就 ~1296/天(超限),改 */30 才安全。
[triggers]
crons = ["*/30 * * * *"]

# 規模參考(v2.20 解法Y, batchSize=6, */30):
# - 全池 705 支(TW179 + US526 去重)→ 每天約 288 支 → 2.4 天跑完一圈
# - 免費版 Workers:100,000 requests/day(夠用)
# - KV 寫入估算:約 430~630/天(43~63%)→ 安全
#     (288 回測結果 + 144 queue/progress/lasttick + OOS 去重後遞減)
# - 免費版 KV 寫入上限 1,000/day
# - 若想跑更快(縮短輪轉/加快 OOS 累積),升級 paid $5/mo(1M writes/day)
#     升級後可把 crons 改回 */10、batchSize 拉高
